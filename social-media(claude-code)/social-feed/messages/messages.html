<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nexus Social — Messages. Chat with your connections." />
  <title>Messages — Nexus Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    /* Messages-specific layout */
    .messages-layout {
      display: flex;
      flex: 1;
      height: calc(100vh - var(--header-h));
      overflow: hidden;
    }
    .messages-panel {
      width: 360px;
      flex-shrink: 0;
      border-right: 1px solid var(--clr-border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .messages-panel__header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .messages-panel__title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--clr-text);
    }
    .messages-panel__search {
      padding: 12px 16px;
      border-bottom: 1px solid var(--clr-border);
      flex-shrink: 0;
    }
    .messages-panel__search input {
      width: 100%;
      background: var(--clr-surface-2);
      border: 1.5px solid var(--clr-border);
      border-radius: 9999px;
      color: var(--clr-text);
      padding: 8px 16px;
      font-size: 0.875rem;
    }
    .messages-panel__search input:focus {
      border-color: var(--clr-accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .messages-panel__list {
      overflow-y: auto;
      flex: 1;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .chat-header__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header__name { font-weight: 700; color: var(--clr-text); font-size: 0.9375rem; }
    .chat-header__status { font-size: 0.75rem; color: var(--clr-success); }
    .chat-header__actions { margin-left: auto; display: flex; gap: 8px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }
    .chat-msg--mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .chat-msg__avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-msg__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-msg__bubble {
      background: var(--clr-surface-2);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 0.9375rem;
      color: var(--clr-text);
      line-height: 1.5;
      border: 1px solid var(--clr-border);
    }
    .chat-msg--mine .chat-msg__bubble {
      background: var(--clr-accent);
      border-color: var(--clr-accent);
    }
    .chat-msg__time {
      font-size: 0.6875rem;
      color: var(--clr-text-3);
      margin-top: 4px;
      text-align: right;
    }
    .chat-msg--mine .chat-msg__time { text-align: left; }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--clr-border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--clr-surface-2);
      border: 1.5px solid var(--clr-border);
      border-radius: 24px;
      color: var(--clr-text);
      padding: 10px 16px;
      font-size: 0.9375rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
    }
    .chat-input:focus {
      border-color: var(--clr-accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .chat-send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--clr-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: background 120ms;
    }
    .chat-send-btn:hover { background: var(--clr-accent-hover); }
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
    }

    @media (max-width: 900px) {
      .messages-panel { width: 280px; }
    }
    @media (max-width: 650px) {
      .messages-panel { width: 100%; }
      .chat-area { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="../components/components.js"></script>

  <script>
  (function () {
    const e = React.createElement;
    const { TopHeader, SidebarNav, MobileBottomNav } = window.NexusComponents;

    const THREADS = [
      { id: 1, name: 'Aria Chen',    handle: '@aria_designs', avatar: 'https://i.pravatar.cc/80?img=47', online: true,  preview: 'Loved your latest post! 🔥',          time: '2m', unread: true  },
      { id: 2, name: 'Marcus Webb',  handle: '@marcuswebb',   avatar: 'https://i.pravatar.cc/80?img=12', online: true,  preview: 'Can you share the Figma link?',       time: '14m', unread: true },
      { id: 3, name: 'Lena Kovacs',  handle: '@lenakovacs',   avatar: 'https://i.pravatar.cc/80?img=23', online: false, preview: 'See you at the conference!',           time: '1h', unread: false },
      { id: 4, name: 'Dev Sharma',   handle: '@dev_builds',   avatar: 'https://i.pravatar.cc/80?img=61', online: false, preview: 'That\'s exactly what I was thinking.',time: '3h', unread: false },
      { id: 5, name: 'Sofia Reyes',  handle: '@sofiareyes',   avatar: 'https://i.pravatar.cc/80?img=56', online: true,  preview: 'The research paper is linked below.',  time: '6h', unread: false },
      { id: 6, name: 'Zara Okafor',  handle: '@zara_codes',   avatar: 'https://i.pravatar.cc/80?img=32', online: false, preview: 'Thanks for the review!',               time: '1d', unread: false },
    ];

    const MESSAGES_ARIA = [
      { id: 1, mine: false, text: 'Hey! Loved your latest post about the design system. Really inspiring stuff 🔥', time: '10:02 AM' },
      { id: 2, mine: true,  text: 'Thanks so much! Took forever to get the token architecture right but it was worth it.', time: '10:04 AM' },
      { id: 3, mine: false, text: 'Are you planning to open source it? I\'d love to contribute!', time: '10:05 AM' },
      { id: 4, mine: true,  text: 'Yes! I\'m publishing it on GitHub next week. I\'ll tag you when it\'s live 🚀', time: '10:06 AM' },
      { id: 5, mine: false, text: 'Amazing! Can\'t wait. Also — are you going to the design conference in March?', time: '10:08 AM' },
      { id: 6, mine: true,  text: 'I\'m thinking about it. Is it worth the trip?', time: '10:09 AM' },
      { id: 7, mine: false, text: 'Definitely. Last year\'s was incredible. Some of the workshops were absolutely mind-blowing.', time: '10:10 AM' },
    ];

    function ThreadItem({ thread, active, onClick }) {
      return e('button', {
        className: 'message-thread' + (active ? ' active' : ''),
        onClick,
        'aria-current': active ? 'true' : undefined,
        'aria-label': `${thread.name} — ${thread.preview} — ${thread.time}${thread.unread ? ' — unread' : ''}`
      },
        e('div', { className: 'message-thread__avatar' },
          e('img', { src: thread.avatar, alt: `${thread.name}'s avatar`, width: 48, height: 48, loading: 'lazy' }),
          thread.online
            ? e('span', { className: 'online-dot', 'aria-label': 'Online', role: 'img' })
            : null
        ),
        e('div', { className: 'message-thread__content' },
          e('div', { className: 'message-thread__header' },
            e('span', { className: 'message-thread__name' }, thread.name),
            e('span', { className: 'message-thread__time' }, thread.time)
          ),
          e('div', { className: 'message-thread__preview' }, thread.preview)
        ),
        thread.unread
          ? e('span', { className: 'message-thread__unread', 'aria-label': 'Unread message' })
          : null
      );
    }

    function ChatMessage({ msg }) {
      return e('div', {
        className: 'chat-msg' + (msg.mine ? ' chat-msg--mine' : ''),
        'aria-label': `${msg.mine ? 'You' : 'Aria Chen'} at ${msg.time}: ${msg.text}`
      },
        !msg.mine
          ? e('div', { className: 'chat-msg__avatar', 'aria-hidden': 'true' },
              e('img', { src: 'https://i.pravatar.cc/80?img=47', alt: '', width: 32, height: 32 })
            )
          : null,
        e('div', null,
          e('div', { className: 'chat-msg__bubble' }, msg.text),
          e('div', { className: 'chat-msg__time', 'aria-hidden': 'true' }, msg.time)
        )
      );
    }

    function MessagesPage() {
      const [activeThread, setActiveThread] = React.useState(THREADS[0]);

      return e(React.Fragment, null,
        e(TopHeader, { activePage: 'messages' }),

        e('div', { className: 'page-shell', style: { overflow: 'hidden' } },
          e(SidebarNav, { activePage: 'messages' }),

          e('main', {
            id: 'main-content',
            className: 'messages-layout',
            role: 'main',
            'aria-label': 'Messages'
          },
            /* Thread list panel */
            e('div', { className: 'messages-panel', role: 'navigation', 'aria-label': 'Message threads' },
              e('div', { className: 'messages-panel__header' },
                e('h1', { className: 'messages-panel__title' }, 'Messages'),
                e('button', {
                  className: 'icon-btn',
                  'aria-label': 'Compose new message',
                  title: 'New message'
                }, '✏')
              ),
              e('div', { className: 'messages-panel__search' },
                e('label', { htmlFor: 'msg-search', className: 'visually-hidden' }, 'Search messages'),
                e('input', {
                  id: 'msg-search',
                  type: 'search',
                  placeholder: 'Search messages…',
                  'aria-label': 'Search messages'
                })
              ),
              e('div', { className: 'messages-panel__list', role: 'list', 'aria-label': 'Conversations' },
                THREADS.map(thread =>
                  e(ThreadItem, {
                    key: thread.id,
                    thread,
                    active: activeThread.id === thread.id,
                    onClick: () => setActiveThread(thread)
                  })
                )
              )
            ),

            /* Chat area */
            e('div', {
              className: 'chat-area',
              role: 'region',
              'aria-label': `Chat with ${activeThread.name}`
            },
              e('div', { className: 'chat-header' },
                e('div', { className: 'chat-header__avatar' },
                  e('img', { src: activeThread.avatar, alt: `${activeThread.name}'s avatar`, width: 40, height: 40 })
                ),
                e('div', null,
                  e('div', { className: 'chat-header__name' }, activeThread.name),
                  e('div', { className: 'chat-header__status' },
                    activeThread.online ? '● Online' : 'Offline'
                  )
                ),
                e('div', { className: 'chat-header__actions' },
                  e('button', { className: 'icon-btn', 'aria-label': 'Voice call', title: 'Voice call' }, '📞'),
                  e('button', { className: 'icon-btn', 'aria-label': 'Video call', title: 'Video call' }, '📹'),
                  e('button', { className: 'icon-btn', 'aria-label': 'Thread info', title: 'Info' }, 'ℹ')
                )
              ),

              e('div', {
                className: 'chat-messages',
                role: 'log',
                'aria-label': 'Conversation messages',
                'aria-live': 'polite'
              },
                MESSAGES_ARIA.map(msg => e(ChatMessage, { key: msg.id, msg }))
              ),

              e('div', { className: 'chat-input-area' },
                e('button', { className: 'icon-btn', 'aria-label': 'Add attachment', title: 'Attach' }, '📎'),
                e('label', { htmlFor: 'chat-input', className: 'visually-hidden' }, 'Type a message'),
                e('textarea', {
                  id: 'chat-input',
                  className: 'chat-input',
                  placeholder: 'Write a message…',
                  rows: 1,
                  'aria-label': 'Message input'
                }),
                e('button', { className: 'icon-btn', 'aria-label': 'Add emoji', title: 'Emoji' }, '😊'),
                e('button', {
                  className: 'chat-send-btn',
                  'aria-label': 'Send message'
                }, '➤')
              )
            )
          )
        ),

        e(MobileBottomNav, { activePage: 'messages' })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(e(MessagesPage));
  })();
  </script>
</body>
</html>
