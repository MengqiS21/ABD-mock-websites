<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Tribune – Article</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const relatedStories = [
  { eyebrow: 'Economy', headline: 'How Trade Bloc Formation Is Redrawing Supply-Chain Maps', author: 'Nadia Hoffman', time: '3 h ago' },
  { eyebrow: 'Politics', headline: 'The Geopolitical Cost of Economic Decoupling', author: 'Marcus Reid', time: '1 day ago' },
  { eyebrow: 'Technology', headline: 'Semiconductor Nationalism and the Race for Chip Sovereignty', author: 'David Chen', time: '2 days ago' },
];

function ArticlePage() {
  return (
    <Tribune.SiteShell active="index.html">
      {/* ── Breadcrumb ── */}
      <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', fontSize: '0.72rem', color: 'var(--muted)', marginBottom: '1.5rem' }}>
        <a href="index.html" style={{ color: 'var(--muted)', textDecoration: 'none' }}>Home</a>
        <span>›</span>
        <a href="world.html" style={{ color: 'var(--muted)', textDecoration: 'none' }}>World</a>
        <span>›</span>
        <span style={{ color: 'var(--ink)' }}>Article</span>
      </div>

      {/* ── Article + Sidebar ── */}
      <div style={{ display: 'grid', gap: '3rem', gridTemplateColumns: '2fr 1fr', alignItems: 'start' }}>
        {/* ── Main article ── */}
        <article>
          {/* Header */}
          <header style={{ borderTop: '3px solid var(--ink)', paddingTop: '1rem', marginBottom: '1.75rem' }}>
            <span className="section-label">World · Economy</span>
            <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 'clamp(1.8rem, 4vw, 2.8rem)', fontWeight: 900, lineHeight: 1.12, color: 'var(--ink)', margin: '0.5rem 0 0.9rem' }}>
              The New World Order Is Being Written in Trade Corridors, Not Capitals
            </h1>
            <p style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: '1.15rem', color: 'var(--ink-2)', lineHeight: 1.6, marginBottom: '1.25rem', fontWeight: 300 }}>
              As formal diplomacy stagnates, multinational corporations, port authorities, and regional blocs are quietly
              redrawing the map of economic power—creating facts on the ground that no treaty can easily undo.
            </p>

            {/* Byline bar */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', padding: '1rem 0', borderTop: '1px solid var(--rule)', borderBottom: '1px solid var(--rule)', flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                <div style={{ width: '2.5rem', height: '2.5rem', borderRadius: '50%', background: 'var(--ink)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontFamily: "'Playfair Display', serif", fontWeight: 700 }}>AD</div>
                <div>
                  <div style={{ fontSize: '0.82rem', fontWeight: 600, color: 'var(--ink)' }}>Amara Diallo</div>
                  <div style={{ fontSize: '0.7rem', color: 'var(--muted)' }}>World Affairs Correspondent</div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                <div style={{ width: '2.5rem', height: '2.5rem', borderRadius: '50%', background: '#2d3142', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontFamily: "'Playfair Display', serif", fontWeight: 700 }}>JO</div>
                <div>
                  <div style={{ fontSize: '0.82rem', fontWeight: 600, color: 'var(--ink)' }}>James Okoye</div>
                  <div style={{ fontSize: '0.7rem', color: 'var(--muted)' }}>Economic Affairs Editor</div>
                </div>
              </div>
              <div style={{ marginLeft: 'auto', textAlign: 'right' }}>
                <div style={{ fontSize: '0.72rem', color: 'var(--muted)' }}>March 1, 2026 · 45 min ago</div>
                <div style={{ fontSize: '0.72rem', color: 'var(--muted)' }}>12 min read</div>
              </div>
            </div>
          </header>

          {/* Hero image placeholder */}
          <div style={{ background: 'linear-gradient(135deg, #1a2744 0%, #2d3142 100%)', borderRadius: '3px', height: '320px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '0.75rem' }}>
            <span style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.78rem', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Photo · AP / Reuters</span>
          </div>
          <p style={{ fontSize: '0.72rem', color: 'var(--muted)', fontStyle: 'italic', marginBottom: '1.75rem' }}>
            Shipping containers at the Port of Rotterdam, one of several major hubs seeing route realignment as trade patterns shift. <em>AP Photo / Stefan Vrancken</em>
          </p>

          {/* Body */}
          <div className="article-body">
            <p>
              ROTTERDAM — In a glass-walled conference room overlooking the largest port in Europe, a logistics director
              pulled up a map she had not been allowed to share publicly three years ago. "This is where the freight was
              moving in 2021," she said, pointing to thick red lines threading from Asian factories through European
              distribution hubs. "And this is where it moves now." The new map looked like a different planet.
            </p>
            <p>
              The shift she was describing—away from integrated global supply chains toward a splintered network of
              regionalized corridors—is the defining economic story of this decade. It is also, increasingly, a
              geopolitical one. Decisions once made by trade negotiators in Geneva are now made by logistics executives
              in Singapore, Houston, and Hamburg, often in consultation with governments hungry for leverage that
              traditional diplomacy can no longer provide.
            </p>

            <blockquote>
              "The world didn't deglobalize. It reglobalized around different centers of gravity, and nobody held a summit about it."
              <br /><em style={{ fontSize: '0.85rem', color: 'var(--muted)' }}>— Dr. Isabelle Fontaine, Geneva Trade Research Institute</em>
            </blockquote>

            <h2>The Corridor Economy</h2>
            <p>
              The numbers tell a story that political headlines have largely missed. Cross-border trade volumes have
              remained robust—even growing in absolute terms—but the composition has changed dramatically. Trade between
              what analysts call "like-aligned" economies, those sharing regulatory frameworks, security partnerships,
              or ideological orientation, has grown at nearly twice the rate of broader global commerce since 2022.
            </p>
            <p>
              This clustering effect has given rise to what economists call the "corridor economy": dense, high-frequency
              trade flows along specific geographic and political axes, increasingly insulated from disruption and
              increasingly structured around shared standards that exclude third parties.
            </p>
            <p>
              The Indo-Pacific Economic Framework, the Trans-Saharan Logistics Compact, and the EU's newly ratified
              Digital Sovereignty Act each represent a piece of this architecture. None of them required a global
              consensus. All of them are creating durable facts about how goods, data, and capital move across borders.
            </p>

            <h2>Who Benefits, and Who Is Left Out</h2>
            <p>
              The implications for smaller or non-aligned economies are severe. Nations that built their development
              strategies around access to multiple large markets now face pressure to choose sides—or find their
              participation in key supply chains diminished by default. Several African and Southeast Asian governments
              have described the situation in private diplomatic communications as "alignment by attrition."
            </p>
            <p>
              For the multinational corporations driving these decisions, the calculus is more straightforward.
              Geopolitical risk assessment has become a standard line item in supply-chain budgets. The question is
              no longer whether to restructure, but how fast—and at what cost to efficiency.
            </p>
            <p>
              The Rotterdam logistics director asked not to be named because her company maintains contracts across
              competing corridors. "We are not ideological," she said. "We go where the volume goes. But the volume
              is increasingly following the flags."
            </p>
          </div>

          {/* Tags */}
          <div style={{ marginTop: '2rem', paddingTop: '1.25rem', borderTop: '1px solid var(--rule)', display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {['Global Trade', 'Geopolitics', 'Supply Chains', 'World Economy', 'Europe'].map(tag => (
              <span key={tag} style={{ fontSize: '0.68rem', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '0.3rem 0.7rem', border: '1px solid var(--rule)', borderRadius: '2px', color: 'var(--muted)', cursor: 'pointer' }}>
                {tag}
              </span>
            ))}
          </div>
        </article>

        {/* ── Sidebar ── */}
        <aside style={{ position: 'sticky', top: '1.5rem', display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
          {/* Subscribe nudge */}
          <div style={{ background: 'var(--ink)', color: '#fff', borderRadius: '3px', padding: '1.5rem' }}>
            <div style={{ fontSize: '0.62rem', fontWeight: 800, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--gold)', marginBottom: '0.5rem' }}>Tribune Access</div>
            <p style={{ fontFamily: "'Playfair Display', serif", fontSize: '1.05rem', fontWeight: 600, lineHeight: 1.35, marginBottom: '0.75rem' }}>
              You've read 3 of 5 free articles this month.
            </p>
            <p style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.55)', marginBottom: '1.1rem' }}>
              Subscribe for unlimited access to The Tribune's award-winning journalism.
            </p>
            <a href="subscribe.html" style={{ display: 'block', textAlign: 'center', background: 'var(--red)', color: '#fff', fontSize: '0.75rem', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '0.75rem', borderRadius: '2px', textDecoration: 'none' }}>
              Subscribe from $4/week
            </a>
          </div>

          {/* Related stories */}
          <div>
            <div className="section-header">
              <h3 className="section-title" style={{ fontSize: '1rem' }}>Related</h3>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
              {relatedStories.map(s => (
                <Tribune.StoryCard key={s.headline} {...s} href="article.html" />
              ))}
            </div>
          </div>

          {/* Newsletter */}
          <div style={{ background: 'var(--cream)', border: '1px solid var(--rule)', borderRadius: '3px', padding: '1.25rem' }}>
            <div className="section-label" style={{ marginBottom: '0.5rem' }}>Newsletter</div>
            <p style={{ fontFamily: "'Playfair Display', serif", fontSize: '0.95rem', fontWeight: 600, lineHeight: 1.35, marginBottom: '0.75rem' }}>
              The Weekly Trade Desk
            </p>
            <p style={{ fontSize: '0.78rem', color: 'var(--muted)', marginBottom: '0.85rem' }}>
              Global commerce analysis every Friday morning.
            </p>
            <input type="email" placeholder="Your email" style={{ width: '100%', padding: '0.55rem 0.75rem', fontSize: '0.82rem', border: '1px solid var(--rule)', borderRadius: '2px', marginBottom: '0.5rem', background: '#fff' }} />
            <button style={{ width: '100%', background: 'var(--ink)', color: '#fff', fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '0.6rem', border: 'none', borderRadius: '2px', cursor: 'pointer' }}>
              Subscribe Free
            </button>
          </div>
        </aside>
      </div>
    </Tribune.SiteShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArticlePage />);
</script>
</body>
</html>
