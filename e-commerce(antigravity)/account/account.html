<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | Your Account</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const AccountCard = ({ icon, title, desc, link }) => (
            <a href={link} className="bg-white p-6 rounded-system-md shadow-sm border border-gray-200 hover:bg-gray-50 flex items-start gap-4 transition-colors focus:outline-none focus:ring-2 focus:ring-navy">
                <div className="w-16 h-16 flex items-center justify-center bg-gray-100 rounded-full flex-shrink-0">
                    <span className="text-2xl">{icon}</span>
                </div>
                <div>
                    <h2 className="text-xl font-medium text-gray-900 mb-1">{title}</h2>
                    <p className="text-sm text-gray-500">{desc}</p>
                </div>
            </a>
        );

        const App = () => {
            return (
                <React.Fragment>
                    <Header />
                    <NavBar />

                    <main className="flex-grow container mx-auto px-4 py-8 max-w-5xl">
                        <h1 className="text-3xl font-normal mb-8 text-gray-900">Your Account</h1>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <AccountCard
                                icon="📦" title="Your Orders"
                                desc="Track, return, or buy things again"
                                link="../orders/orders.html"
                            />
                            <AccountCard
                                icon="🔒" title="Login & security"
                                desc="Edit login, name, and mobile number"
                                link="#"
                            />
                            <AccountCard
                                icon="⭐" title="Prime"
                                desc="View benefits and payment settings"
                                link="#"
                            />
                            <AccountCard
                                icon="📍" title="Your Addresses"
                                desc="Edit addresses for orders and gifts"
                                link="#"
                            />
                            <AccountCard
                                icon="💳" title="Your Payments"
                                desc="Manage payment methods and settings"
                                link="#"
                            />
                            <AccountCard
                                icon="💬" title="Contact Us"
                                desc="Contact our customer service team"
                                link="../contact/contact.html"
                            />
                        </div>
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
