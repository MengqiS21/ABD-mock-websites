<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | Shopping Cart</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">

    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const CartItem = ({ title, image, price, inStock = true }) => {
            const [quantity, setQuantity] = React.useState(1);

            if (quantity === 0) return null;

            return (
                <article className="flex flex-col sm:flex-row gap-4 py-4 border-b">
                    <div className="w-full sm:w-48 bg-gray-100 flex items-center justify-center p-2 rounded shrink-0">
                        <img src={image} alt={title} className="max-w-full h-auto mix-blend-multiply" loading="lazy" />
                    </div>
                    <div className="flex-1">
                        <div className="flex justify-between items-start">
                            <h2 className="text-lg font-medium text-gray-900 leading-tight pr-4">
                                <a href="../products/detail.html" className="hover:underline focus:outline-none focus:ring-2 focus:ring-blue-600 rounded px-1" aria-label={title}>
                                    {title}
                                </a>
                            </h2>
                            <p className="text-xl font-bold text-gray-900">${price}</p>
                        </div>
                        <p className={`text-sm font-bold mt-1 ${inStock ? 'text-green-700' : 'text-red-600'}`}>
                            {inStock ? 'In Stock' : 'Currently Unavailable'}
                        </p>
                        <p className="text-xs text-gray-500 mt-1">Eligible for FREE Shipping</p>

                        <div className="flex items-center gap-4 mt-4 text-sm">
                            <label className="sr-only">Quantity</label>
                            <select
                                value={quantity}
                                onChange={(e) => setQuantity(Number(e.target.value))}
                                className="bg-gray-100 border border-gray-300 text-gray-900 rounded-md focus:ring-navy focus:border-navy block p-2 shadow-sm" aria-label="Item Quantity"
                            >
                                <option value="0">0 (Delete)</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                            <div className="w-px h-4 bg-gray-300"></div>
                            <button type="button" onClick={() => setQuantity(0)} className="text-blue-600 hover:text-blue-800 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-600 rounded px-1 text-sm">Delete</button>
                            <div className="w-px h-4 bg-gray-300 hidden sm:block"></div>
                            <button type="button" className="text-blue-600 hover:text-blue-800 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-600 rounded px-1 text-sm hidden sm:block">Save for later</button>
                        </div>
                    </div>
                </article>
            );
        };

        const App = () => {
            return (
                <React.Fragment>
                    <Header />

                    <main className="flex-grow container mx-auto px-4 py-8">
                        <div className="flex flex-col lg:flex-row gap-6">

                            <div className="flex-1 bg-white p-6 rounded-system-lg shadow-sm">
                                <div className="flex justify-between items-end border-b pb-4 mb-6">
                                    <h1 className="text-3xl font-normal text-gray-900">Shopping Cart</h1>
                                    <span className="text-sm text-gray-500 hidden sm:inline">Price</span>
                                </div>

                                <div className="space-y-6">
                                    <CartItem
                                        title="Wireless Noise Cancelling Headphones"
                                        image="https://via.placeholder.com/150?text=Headphones"
                                        price="199.99"
                                        inStock={true}
                                    />
                                    <CartItem
                                        title="Smart Home Speaker"
                                        image="https://via.placeholder.com/150?text=Speaker"
                                        price="49.00"
                                        inStock={true}
                                    />
                                </div>

                                <div className="flex justify-end pt-4">
                                    <p className="text-lg">Subtotal (2 items): <span className="font-bold text-gray-900">$248.99</span></p>
                                </div>
                            </div>

                            <div className="w-full lg:w-80">
                                <div className="bg-white p-6 rounded-system-lg shadow-sm border border-gray-100 sticky top-24">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-sm text-gray-600">Subtotal (2 items):</span>
                                        <span className="font-bold">$248.99</span>
                                    </div>
                                    <div className="flex items-center mb-6">
                                        <input id="gift-checkbox" type="checkbox" className="h-4 w-4 text-navy border-gray-300 rounded focus:ring-navy" />
                                        <label htmlFor="gift-checkbox" className="ml-2 block text-sm text-gray-900">
                                            This order contains a gift
                                        </label>
                                    </div>

                                    <button className="w-full bg-cta hover:bg-cta-hover text-black font-semibold py-3 px-4 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cta transition-colors">
                                        Proceed to checkout
                                    </button>
                                </div>
                            </div>

                        </div>
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
