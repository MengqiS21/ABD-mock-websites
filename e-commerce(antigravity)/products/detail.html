<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | Wireless Noise Cancelling Headphones</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">

    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const ProductDetail = () => {
            const [mainImgUrl, setMainImgUrl] = React.useState('https://via.placeholder.com/500?text=Headphones+1');

            return (
                <div className="bg-white shadow-sm p-4 md:p-8 rounded-system-md mt-6">
                    <div className="flex flex-col md:flex-row gap-8">
                        {/* Image Gallery Column */}
                        <div className="w-full md:w-1/2 lg:w-2/5 flex flex-col md:flex-row gap-4">
                            {/* Thumbnails */}
                            <div className="flex md:flex-col order-2 md:order-1 gap-2 overflow-x-auto md:overflow-y-auto max-h-96 w-full md:w-16 flex-shrink-0">
                                {[1, 2, 3, 4].map((i) => (
                                    <button
                                        key={i}
                                        onClick={() => setMainImgUrl(`https://via.placeholder.com/500?text=Headphones+${i}`)}
                                        className="h-14 w-14 border-2 border-transparent hover:border-cta focus:border-cta focus:outline-none rounded overflow-hidden flex-shrink-0 transition-colors"
                                        aria-label={`View image ${i}`}
                                    >
                                        <img src={`https://via.placeholder.com/100?text=${i}`} alt={`Thumbnail ${i}`} className="w-full h-full object-cover" />
                                    </button>
                                ))}
                            </div>

                            {/* Main Image */}
                            <div className="flex-1 order-1 md:order-2 bg-gray-50 flex items-center justify-center p-4 rounded-system-md min-h-80 border border-gray-100">
                                <img src={mainImgUrl} alt="Wireless Noise Cancelling Headphones - Main View" className="max-w-full h-auto max-h-96 object-contain mix-blend-multiply" />
                            </div>
                        </div>

                        {/* Product Info Column */}
                        <div className="w-full md:w-1/2 lg:w-3/5 flex flex-col lg:flex-row gap-8">
                            <div className="flex-1">
                                <h1 className="text-2xl font-medium text-gray-900 leading-tight mb-2">
                                    Wireless Noise Cancelling Headphones, Bluetooth Over-Ear Headphones with Mic
                                </h1>
                                <a href="#" className="text-sm text-blue-600 hover:underline hover:text-blue-800">Visit the Sonic Store</a>

                                <div className="text-sm text-yellow-500 my-2 flex items-center gap-4 border-b border-gray-200 pb-2" aria-label="Rated 4.5 out of 5 stars">
                                    <div>★★★★<span className="text-gray-300">★</span> <span className="text-blue-600 ml-1 hover:underline text-xs">1,204 ratings</span></div>
                                </div>

                                <div className="text-3xl font-medium my-4">
                                    <span className="text-lg align-top">$</span>199<span className="text-lg align-top">99</span>
                                </div>

                                <div className="mb-6">
                                    <p className="font-bold text-gray-900 mb-1">About this item:</p>
                                    <ul className="list-disc pl-5 space-y-1 text-sm text-gray-700">
                                        <li>Industry-leading noise cancellation.</li>
                                        <li>Up to 30-hour battery life with quick charging.</li>
                                        <li>Touch sensor controls to pause play skip tracks, control volume.</li>
                                        <li>Speak-to-chat technology automatically reduces volume during conversations.</li>
                                    </ul>
                                </div>
                            </div>

                            {/* Buying Action Box */}
                            <div className="w-full lg:w-64 border border-gray-200 rounded-system-md p-4 bg-white flex flex-col shadow-sm">
                                <div className="text-xl font-bold mb-2">$199.99</div>
                                <div className="text-sm text-gray-600 mb-4 flex flex-col gap-1">
                                    <span>FREE delivery <strong>Thursday</strong></span>
                                    <span>Or fastest delivery <strong>Tomorrow</strong>. Order within 2 hrs 30 mins</span>
                                </div>
                                <h3 className="text-green-700 font-bold mb-4">In Stock</h3>

                                <div className="flex items-center gap-2 mb-4">
                                    <label htmlFor="qty-select" className="text-sm block text-gray-900">Qty:</label>
                                    <select id="qty-select" className="bg-gray-100 border border-gray-300 text-gray-900 rounded-md focus:ring-navy focus:border-navy p-1 shadow-sm w-16" aria-label="Item Quantity">
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                    </select>
                                </div>

                                <button className="w-full bg-cta hover:bg-cta-hover text-black font-semibold py-2 px-4 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cta transition-colors mb-2">
                                    Add to Cart
                                </button>
                                <button className="w-full bg-[#ffa41c] hover:bg-[#fa8900] text-black font-semibold py-2 px-4 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#ffa41c] transition-colors">
                                    Buy Now
                                </button>

                                <div className="text-xs text-gray-500 mt-4 flex justify-center gap-1">
                                    <span>Secure transaction</span>
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        const App = () => {
            return (
                <React.Fragment>
                    <Header />
                    <NavBar />

                    <main className="flex-grow container mx-auto px-4 py-4">
                        <nav aria-label="Breadcumb" className="text-xs text-gray-500 mt-2 mb-2">
                            <ol className="flex space-x-2">
                                <li><a href="../index.html" className="hover:underline">Home</a></li>
                                <li><span>›</span></li>
                                <li><a href="products.html" className="hover:underline">Electronics</a></li>
                                <li><span>›</span></li>
                                <li><a href="#" className="hover:underline">Headphones</a></li>
                            </ol>
                        </nav>

                        <ProductDetail />
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
