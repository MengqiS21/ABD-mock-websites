<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | Today's Deals</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/DealCard.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const App = () => {
            return (
                <React.Fragment>
                    <Header />
                    <NavBar />

                    <main className="flex-grow container mx-auto px-4 py-8">
                        <h1 className="text-3xl font-bold mb-6">Today's Deals</h1>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            <DealCard
                                title="Up to 40% off Laptops"
                                imagePlaceholder="https://via.placeholder.com/300?text=Laptop"
                                discount={40}
                                dealDesc="Computers & Accessories"
                                link="../products/products.html"
                            />
                            <DealCard
                                title="Up to 50% off Smart Home"
                                imagePlaceholder="https://via.placeholder.com/300?text=Smart+Home"
                                discount={50}
                                dealDesc="Smart Home Devices"
                                link="../products/products.html"
                            />
                            <DealCard
                                title="Save on Kitchen Essentials"
                                imagePlaceholder="https://via.placeholder.com/300?text=Blender"
                                discount={25}
                                dealDesc="Home & Kitchen"
                                link="../products/products.html"
                            />
                            <DealCard
                                title="Up to 30% off Apparel"
                                imagePlaceholder="https://via.placeholder.com/300?text=Jacket"
                                discount={30}
                                dealDesc="Fashion"
                                link="../products/products.html"
                            />
                        </div>
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
