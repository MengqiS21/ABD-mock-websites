<!-- Base Global Header Snippet -->
<header class="bg-[#1a1f2c] text-white sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <!-- Logo -->
        <a href="/"
            class="text-2xl font-bold hover:text-gray-300 focus:outline-none focus:ring-2 focus:ring-[#ffd814] rounded px-2 py-1"
            aria-label="E-Market Home">
            E-Market
        </a>

        <!-- Search Bar (Desktop) -->
        <div class="hidden md:flex flex-1 max-w-3xl mx-6">
            <form class="flex w-full" role="search" aria-label="Site Search">
                <input type="text"
                    class="w-full px-4 py-2 rounded-l-md text-black focus:outline-none focus:ring-2 focus:ring-[#ffd814] border-none"
                    placeholder="Search products, brands and more..." aria-label="Search query" />
                <button type="submit"
                    class="bg-[#ffd814] hover:bg-[#f7ca00] text-black px-6 py-2 rounded-r-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#ffd814] focus:ring-offset-[#1a1f2c]"
                    aria-label="Submit search">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Right Nav -->
        <nav class="flex items-center space-x-1 md:space-x-4">
            <a href="/account/"
                class="flex flex-col items-start hover:border-white border border-transparent p-2 rounded focus:outline-none focus:ring-2 focus:ring-[#ffd814]"
                aria-label="Sign in to your account">
                <span class="text-xs text-gray-300">Hello, sign in</span>
                <span class="text-sm font-bold whitespace-nowrap">Account & Lists</span>
            </a>
            <a href="/orders/"
                class="hidden md:flex flex-col items-start hover:border-white border border-transparent p-2 rounded focus:outline-none focus:ring-2 focus:ring-[#ffd814]"
                aria-label="Returns and Orders">
                <span class="text-xs text-gray-300">Returns</span>
                <span class="text-sm font-bold whitespace-nowrap">& Orders</span>
            </a>
            <a href="/cart/cart.html"
                class="flex items-end hover:border-white border border-transparent p-2 rounded focus:outline-none focus:ring-2 focus:ring-[#ffd814]"
                aria-label="0 items in Shopping Cart">
                <div class="relative flex items-center">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                    <span class="absolute -top-1 left-4 text-[#ffd814] font-bold">0</span>
                    <span class="text-sm font-bold hidden md:inline ml-1 mb-1">Cart</span>
                </div>
            </a>
        </nav>
    </div>

    <!-- Secondary Navigation -->
    <div class="bg-[#232f3e] text-sm py-2 px-4 shadow-sm">
        <nav class="container mx-auto flex space-x-4 overflow-x-auto items-center" aria-label="Secondary Navigation">
            <button
                class="flex items-center font-bold hover:text-[#ffd814] focus:outline-none focus:ring-2 focus:ring-[#ffd814] rounded px-1"
                aria-label="Open Menu">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
                All
            </button>
            <a href="/deals/"
                class="hover:text-gray-300 whitespace-nowrap border border-transparent hover:border-white rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#ffd814]">Today's
                Deals</a>
            <a href="/products/products.html"
                class="hover:text-gray-300 whitespace-nowrap border border-transparent hover:border-white rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#ffd814]">Customer
                Service</a>
            <a href="/contact/"
                class="hover:text-gray-300 whitespace-nowrap border border-transparent hover:border-white rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#ffd814]">Registry</a>
            <a href="#"
                class="hover:text-gray-300 whitespace-nowrap border border-transparent hover:border-white rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#ffd814]">Gift
                Cards</a>
            <a href="#"
                class="hover:text-gray-300 whitespace-nowrap border border-transparent hover:border-white rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#ffd814]">Sell</a>
        </nav>
    </div>
</header>
