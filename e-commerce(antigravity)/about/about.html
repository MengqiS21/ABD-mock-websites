<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | About Us</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const App = () => {
            return (
                <React.Fragment>
                    <Header />
                    <NavBar />

                    <main className="flex-grow bg-white">
                        {/* Hero about section */}
                        <section className="bg-navy text-white py-20 px-4 text-center">
                            <h1 className="text-4xl md:text-5xl font-bold mb-4">About E-Market</h1>
                            <p className="text-xl max-w-2xl mx-auto text-gray-300">
                                We are guided by four principles: customer obsession rather than competitor focus, passion for invention, commitment to operational excellence, and long-term thinking.
                            </p>
                        </section>

                        <section className="py-16 px-4 container mx-auto max-w-5xl">
                            <div className="flex flex-col md:flex-row gap-12 items-center mb-16">
                                <div className="md:w-1/2">
                                    <h2 className="text-3xl font-bold mb-4 text-gray-900">Who We Are</h2>
                                    <p className="text-gray-700 leading-relaxed mb-4">
                                        E-Market surrounds you with incredible deals on thousands of your favorite products. From electronics and fashion to home essentials, we partner with top brands and independent sellers to provide a seamless marketplace.
                                    </p>
                                    <p className="text-gray-700 leading-relaxed">
                                        Our robust logistics network guarantees fast, reliable shipping around the globe. We aren't just selling products—we're delivering convenience to your doorstep.
                                    </p>
                                </div>
                                <div className="md:w-1/2">
                                    <div className="bg-gray-200 aspect-video rounded-system-md flex items-center justify-center p-4 overflow-hidden shadow-md">
                                        <img src="https://via.placeholder.com/600x400?text=Warehouse+Operations" alt="E-Market warehouse operations" className="w-full h-full object-cover mix-blend-multiply" />
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🌍</div>
                                    <h3 className="font-bold text-lg mb-2 text-gray-900">Global Reach</h3>
                                    <p className="text-gray-600">Delivering to over 100 countries worldwide with localized support and seamless customs handling.</p>
                                </div>
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🌱</div>
                                    <h3 className="font-bold text-lg mb-2 text-gray-900">Sustainability</h3>
                                    <p className="text-gray-600">Committed to reaching net-zero carbon by 2040 and revolutionizing our packaging solutions.</p>
                                </div>
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🤝</div>
                                    <h3 className="font-bold text-lg mb-2 text-gray-900">Small Businesses</h3>
                                    <p className="text-gray-600">Over half of our sales come from independent sellers, empowering small merchants to scale.</p>
                                </div>
                            </div>
                        </section>
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
