<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market | Contact Us</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1f2c', 800: '#232f3e', 900: '#131a22' },
                        cta: { DEFAULT: '#ffd814', hover: '#f7ca00' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body id="top" class="bg-gray-100 flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel" src="../components/Header.js"></script>
    <script type="text/babel" src="../components/NavBar.js"></script>
    <script type="text/babel" src="../components/Footer.js"></script>

    <script type="text/babel">
        const App = () => {
            return (
                <React.Fragment>
                    <Header />
                    <NavBar />

                    <main className="flex-grow container mx-auto px-4 py-12 max-w-4xl">
                        <h1 className="text-3xl font-bold mb-8 text-gray-900 text-center">Contact Us</h1>

                        <div className="bg-white shadow-sm p-8 rounded-system-md border border-gray-100 max-w-2xl mx-auto">
                            <p className="text-gray-700 mb-6">If you need help with an order, please visit the <a href="../orders/orders.html" className="text-blue-600 hover:underline">Your Orders</a> page. For direct assistance, fill out the form below.</p>

                            <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                                <div>
                                    <label htmlFor="topic" className="block text-sm font-medium text-gray-700 mb-1">What can we help you with?</label>
                                    <select id="topic" className="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-md focus:ring-navy focus:border-navy block p-2.5 outline-none">
                                        <option>A delivery, order or return</option>
                                        <option>Prime</option>
                                        <option>Payment charges or gift cards</option>
                                        <option>Login, address, security & privacy</option>
                                        <option>Something else</option>
                                    </select>
                                </div>

                                <div>
                                    <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                                    <input type="email" id="email" className="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-md focus:ring-navy focus:border-navy block p-2.5 outline-none" required />
                                </div>

                                <div>
                                    <label htmlFor="message" className="block text-sm font-medium text-gray-700 mb-1">Message</label>
                                    <textarea id="message" rows="5" className="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-md focus:ring-navy focus:border-navy block p-2.5 outline-none" placeholder="Please provide details..." required></textarea>
                                </div>

                                <button type="submit" className="w-full bg-cta hover:bg-cta-hover text-black font-bold py-3 px-4 rounded-system-md shadow-sm focus:outline-none focus:ring-4 focus:ring-yellow-300 transition-colors">
                                    Send Message
                                </button>
                            </form>
                        </div>

                        <div className="mt-12 grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto text-center">
                            <div className="bg-white p-6 rounded-system-md shadow-sm border border-gray-100">
                                <span className="text-2xl block mb-2">📞</span>
                                <h3 className="font-bold text-gray-900">Call Us</h3>
                                <p className="text-gray-600 mb-2">Available 24/7</p>
                                <a href="tel:1-800-000-0000" className="text-blue-600 font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-600 rounded px-1">1-800-000-0000</a>
                            </div>
                            <div className="bg-white p-6 rounded-system-md shadow-sm border border-gray-100">
                                <span className="text-2xl block mb-2">💬</span>
                                <h3 className="font-bold text-gray-900">Live Chat</h3>
                                <p className="text-gray-600 mb-2">Chat with a specialist</p>
                                <button className="text-blue-600 font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-600 rounded px-1">Start Chat</button>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </React.Fragment>
            );
        };

        setTimeout(() => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }, 100);
    </script>
</body>

</html>
