<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subjects – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links = [
        {label:'Courses',href:basePath+'courses/courses.html'},
        {label:'Subjects',href:basePath+'subjects/subjects.html',active:true},
        {label:'Curriculum',href:basePath+'curriculum/curriculum.html'},
        {label:'Plans',href:basePath+'plans/plans.html'},
        {label:'Enterprise',href:basePath+'enterprise/enterprise.html'},
        {label:'Dashboard',href:basePath+'dashboard/dashboard.html'},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 rounded-lg">{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-10" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-8">
          <div>
            <a href={basePath+'index.html'} className="flex items-center gap-2 mb-3">
              <div className="w-7 h-7 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-xs">E</span></div>
              <span className="text-white font-bold">EduPortal</span>
            </a>
          </div>
          {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html'],['Curriculum',basePath+'curriculum/curriculum.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]},
            {t:'Company',ls:[['About','#'],['Careers','#']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-6 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    const grades = ['All Grades','K–2','3–5','6–8','9–12','College','Professional'];

    const subjects = [
      {name:'Mathematics',    icon:'📐',count:1240,color:'from-blue-500 to-blue-700',   desc:'Algebra, Geometry, Calculus, Statistics'},
      {name:'Science',        icon:'🔬',count:980, color:'from-green-500 to-teal-600',  desc:'Biology, Chemistry, Physics, Earth Science'},
      {name:'English & ELA',  icon:'📖',count:870, color:'from-purple-500 to-purple-700',desc:'Reading, Writing, Grammar, Literature'},
      {name:'History',        icon:'🏛️',count:640, color:'from-amber-500 to-orange-600',desc:'World History, US History, Civics'},
      {name:'Computer Science',icon:'💻',count:520,color:'from-indigo-500 to-blue-600', desc:'Programming, Data Structures, AI/ML'},
      {name:'World Languages',icon:'🌍',count:730, color:'from-teal-500 to-cyan-600',   desc:'Spanish, French, Mandarin, Arabic, more'},
      {name:'Arts & Music',   icon:'🎨',count:480, color:'from-pink-500 to-rose-600',   desc:'Visual Arts, Music Theory, Performance'},
      {name:'Social Studies', icon:'🗺️',count:560, color:'from-orange-500 to-red-600',  desc:'Economics, Geography, Sociology'},
      {name:'Physical Ed.',   icon:'⚽',count:210, color:'from-lime-500 to-green-600',  desc:'Health, Fitness, Sports Science'},
      {name:'Business',       icon:'💼',count:390, color:'from-slate-500 to-slate-700', desc:'Finance, Entrepreneurship, Marketing'},
      {name:'Engineering',    icon:'⚙️',count:310, color:'from-cyan-500 to-blue-600',   desc:'Mechanical, Electrical, Software Engineering'},
      {name:'Health & Medicine',icon:'🏥',count:275,color:'from-red-500 to-rose-600',   desc:'Anatomy, Nursing, Public Health'},
    ];

    const App = () => {
      const [activeGrade, setActiveGrade] = useState('All Grades');
      const [search, setSearch] = useState('');
      const filtered = subjects.filter(s=>!search || s.name.toLowerCase().includes(search.toLowerCase()) || s.desc.toLowerCase().includes(search.toLowerCase()));

      return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content">
            {/* Hero */}
            <div className="gradient-hero text-white py-14">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center">
                <nav aria-label="Breadcrumb" className="text-sm text-blue-200 mb-5 flex justify-center gap-2">
                  <a href={BP+'index.html'} className="hover:text-white">Home</a>
                  <span aria-hidden="true">›</span>
                  <span className="text-white" aria-current="page">Subjects</span>
                </nav>
                <h1 className="text-4xl sm:text-5xl font-extrabold mb-4">Explore All Subjects</h1>
                <p className="text-blue-100 text-lg mb-8 max-w-2xl mx-auto">From K–12 to college and beyond — find expert-crafted content for every subject and learning level.</p>
                <div className="relative max-w-xl mx-auto">
                  <input type="search" value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Search subjects (Math, Science, English…)"
                    className="w-full pl-12 pr-5 py-3.5 text-gray-900 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-white shadow-lg"
                    aria-label="Search subjects"/>
                  <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                  </svg>
                </div>
              </div>
            </div>

            {/* Grade filter */}
            <div className="bg-white border-b border-gray-200 sticky top-16 z-40">
              <div className="max-w-7xl mx-auto px-4 sm:px-6">
                <div className="flex items-center gap-1 overflow-x-auto py-3 h-scroll" role="tablist" aria-label="Filter by grade level">
                  {grades.map(g=>(
                    <button key={g} role="tab" aria-selected={activeGrade===g} onClick={()=>setActiveGrade(g)}
                      className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 ${activeGrade===g?'bg-blue-600 text-white':'text-gray-700 hover:bg-gray-100'}`}>
                      {g}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-12">
              {/* Stats row */}
              <div className="grid grid-cols-3 gap-4 mb-10">
                {[{n:'12',l:'Subjects'},  {n:'5,200+',l:'Courses'},  {n:'48M+',l:'Lessons taken'}].map(s=>(
                  <div key={s.l} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 text-center">
                    <div className="text-3xl font-extrabold text-blue-600">{s.n}</div>
                    <div className="text-sm text-gray-500 mt-1">{s.l}</div>
                  </div>
                ))}
              </div>

              {/* Subject grid */}
              <h2 className="text-2xl font-bold text-gray-900 mb-6">
                {filtered.length} Subject{filtered.length!==1?'s':''} available
              </h2>
              <div className="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                {filtered.map(sub=>(
                  <a key={sub.name} href={BP+'curriculum/curriculum.html'}
                    className="card bg-white rounded-2xl overflow-hidden group focus-visible:ring-2 focus-visible:ring-blue-500">
                    <div className={`h-24 bg-gradient-to-br ${sub.color} flex items-center justify-center text-5xl`} aria-hidden="true">
                      {sub.icon}
                    </div>
                    <div className="p-5">
                      <h3 className="font-bold text-gray-900 mb-1 group-hover:text-blue-600 transition-colors">{sub.name}</h3>
                      <p className="text-xs text-gray-500 mb-3 leading-snug">{sub.desc}</p>
                      <div className="flex items-center justify-between">
                        <span className="text-xs font-semibold text-gray-500">{sub.count.toLocaleString()} resources</span>
                        <span className="text-blue-600 text-xs font-semibold group-hover:underline">Explore →</span>
                      </div>
                    </div>
                  </a>
                ))}
              </div>

              {filtered.length === 0 && (
                <div className="text-center py-20 text-gray-400">
                  <div className="text-5xl mb-4">🔍</div>
                  <p className="font-medium text-lg">No subjects found for "{search}"</p>
                  <button onClick={()=>setSearch('')} className="mt-3 text-blue-600 text-sm hover:underline">Clear search</button>
                </div>
              )}

              {/* CTA */}
              <div className="mt-14 bg-gradient-to-r from-blue-600 to-purple-600 rounded-3xl p-10 text-white text-center">
                <h2 className="text-2xl font-bold mb-3">Can't find your subject?</h2>
                <p className="text-blue-100 mb-6">We're constantly adding new content. Tell us what you need.</p>
                <button className="px-7 py-3 bg-white text-blue-700 font-bold rounded-xl hover:bg-blue-50 transition-colors focus-visible:ring-2 focus-visible:ring-white">
                  Request a subject
                </button>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
