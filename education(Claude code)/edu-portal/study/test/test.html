<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice Test – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const BP = '../../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Study',      href:basePath+'study/study.html'},
        {label:'Flashcards', href:basePath+'study/flashcards/flashcards.html'},
        {label:'Test',       href:basePath+'study/test/test.html',active:true},
        {label:'Match',      href:'#'},
        {label:'Create',     href:'#',highlight:true},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.highlight?'bg-blue-600 text-white hover:bg-blue-700':l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-8" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-6">
          {[{t:'Study Tools',ls:[['Study Hub',basePath+'study/study.html'],['Flashcards',basePath+'study/flashcards/flashcards.html'],['Tests',basePath+'study/test/test.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-5 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
        </div>
      </footer>
    );

    /* ── Quiz Data ── */
    const questions = [
      {
        q:'Which process produces genetically identical daughter cells?',
        options:['Meiosis','Mitosis','Fertilization','Mutation'],
        correct:1,
        explanation:'Mitosis produces two genetically identical daughter cells from one parent cell. It is used for growth, repair, and asexual reproduction.'
      },
      {
        q:'What is the function of the centromere?',
        options:['Stores genetic information','Joins sister chromatids','Produces ribosomes','Controls cell membrane'],
        correct:1,
        explanation:'The centromere is the region that joins two sister chromatids and serves as the attachment point for spindle fibers during cell division.'
      },
      {
        q:'During which phase do chromosomes align at the cell\'s equatorial plate?',
        options:['Prophase','Anaphase','Metaphase','Telophase'],
        correct:2,
        explanation:'During Metaphase, chromosomes align along the metaphase plate (the cell\'s equatorial plane), held by spindle fibers attached to their centromeres.'
      },
      {
        q:'How many daughter cells result from one complete meiosis cycle?',
        options:['2','4','8','1'],
        correct:1,
        explanation:'Meiosis produces 4 non-identical haploid daughter cells (gametes) through two rounds of division: Meiosis I and Meiosis II.'
      },
      {
        q:'What is the term for the thread-like structures that carry genetic information?',
        options:['Ribosomes','Chromosomes','Mitochondria','Vacuoles'],
        correct:1,
        explanation:'Chromosomes are thread-like structures found in the cell nucleus, made of DNA and proteins. Humans have 46 chromosomes (23 pairs).'
      },
      {
        q:'During anaphase, what happens to sister chromatids?',
        options:['They duplicate','They align at the equator','They are pulled to opposite poles','They dissolve'],
        correct:2,
        explanation:'During Anaphase, spindle fibers shorten and pull sister chromatids apart, moving them to opposite poles of the cell.'
      },
    ];

    /* ── Timer hook ── */
    const useTimer = (initial, running) => {
      const [time, setTime] = useState(initial);
      useEffect(()=>{
        if(!running) return;
        const id = setInterval(()=>setTime(t=>Math.max(0,t-1)), 1000);
        return ()=>clearInterval(id);
      },[running]);
      return time;
    };

    const fmtTime = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

    const App = () => {
      const [phase, setPhase] = useState('intro'); // intro | testing | results
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState({});
      const [selected, setSelected] = useState(null);
      const [showExplain, setShowExplain] = useState(false);
      const timeLeft = useTimer(600, phase==='testing');

      const q = questions[current];
      const correctCount = Object.entries(answers).filter(([i,a])=>questions[parseInt(i)].correct===a).length;
      const pct = Math.round((correctCount/questions.length)*100);

      const handleAnswer = (optIdx) => {
        setSelected(optIdx);
        setShowExplain(true);
        setAnswers(prev=>({...prev, [current]: optIdx}));
      };

      const goNext = () => {
        if(current < questions.length-1) {
          setCurrent(c=>c+1);
          setSelected(null);
          setShowExplain(false);
        } else {
          setPhase('results');
        }
      };

      const restart = () => {
        setPhase('intro');
        setCurrent(0);
        setAnswers({});
        setSelected(null);
        setShowExplain(false);
      };

      /* ── Intro screen ── */
      if(phase==='intro') return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="min-h-screen flex items-center justify-center py-16 px-4">
            <div className="bg-white rounded-3xl shadow-lg border border-gray-200 p-10 max-w-lg w-full">
              <div className="text-center mb-8">
                <div className="text-5xl mb-4" aria-hidden="true">📝</div>
                <h1 className="text-2xl font-extrabold text-gray-900 mb-2">Biology: Cell Division Practice Test</h1>
                <p className="text-gray-500">Test your knowledge with {questions.length} questions. Take your time — explanations are provided after each answer.</p>
              </div>
              <div className="grid grid-cols-3 gap-4 mb-8 text-center">
                {[{n:`${questions.length}`,l:'Questions'},{n:'10 min',l:'Time limit'},{n:'Multiple choice',l:'Format'}].map(s=>(
                  <div key={s.l} className="bg-blue-50 rounded-xl p-4">
                    <div className="font-bold text-blue-700">{s.n}</div>
                    <div className="text-xs text-blue-600 mt-0.5">{s.l}</div>
                  </div>
                ))}
              </div>
              <ul className="space-y-2 mb-8 text-sm text-gray-600">
                {['Based on: Cell Division & Mitosis study set','Immediate feedback after each answer','Review correct answers at the end','Use results to focus your studying'].map(i=>(
                  <li key={i} className="flex items-center gap-2"><span className="text-green-500" aria-hidden="true">✓</span>{i}</li>
                ))}
              </ul>
              <button onClick={()=>setPhase('testing')}
                className="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-colors text-lg focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2">
                Start test
              </button>
              <div className="flex gap-3 mt-4">
                <a href={BP+'study/flashcards/flashcards.html'}
                  className="flex-1 py-3 text-center text-sm font-semibold text-gray-700 border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">
                  Review flashcards first
                </a>
                <a href={BP+'study/study.html'}
                  className="flex-1 py-3 text-center text-sm font-semibold text-gray-700 border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">
                  Back to study hub
                </a>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );

      /* ── Results screen ── */
      if(phase==='results') return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="max-w-2xl mx-auto px-4 sm:px-6 py-12">
            <div className="bg-white rounded-3xl shadow-lg border border-gray-200 p-8 mb-6 text-center">
              <div className="text-5xl mb-4" aria-hidden="true">{pct>=80?'🏆':pct>=60?'👍':'📚'}</div>
              <h1 className="text-3xl font-extrabold text-gray-900 mb-2">Test Complete!</h1>
              <div className={`text-6xl font-extrabold mt-4 mb-2 ${pct>=80?'text-green-600':pct>=60?'text-yellow-600':'text-red-500'}`}>{pct}%</div>
              <p className="text-gray-500">{correctCount} of {questions.length} correct</p>
              <div className="w-full bg-gray-200 rounded-full h-3 mt-6 mb-2">
                <div className={`h-3 rounded-full transition-all duration-700 ${pct>=80?'bg-green-500':pct>=60?'bg-yellow-500':'bg-red-500'}`} style={{width:`${pct}%`}}/>
              </div>
              <p className="text-sm text-gray-400">{pct>=80?'Excellent work! You have mastered this material.':pct>=60?'Good progress! Review the missed questions to improve.':'Keep studying! Review your flashcards and try again.'}</p>
            </div>

            {/* Question review */}
            <h2 className="text-lg font-bold text-gray-900 mb-4">Question review</h2>
            <div className="space-y-4 mb-8">
              {questions.map((q,i)=>{
                const userAns = answers[i];
                const correct = q.correct === userAns;
                return (
                  <div key={i} className={`bg-white rounded-2xl border p-5 ${correct?'border-green-200':'border-red-200'}`}>
                    <div className="flex items-start gap-3 mb-3">
                      <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${correct?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`} aria-hidden="true">
                        {correct?'✓':'✗'}
                      </span>
                      <p className="text-sm font-semibold text-gray-900">{q.q}</p>
                    </div>
                    {!correct && (
                      <p className="text-xs text-gray-600 ml-9 mb-2">
                        Your answer: <span className="text-red-600 font-medium">{q.options[userAns]}</span> ·
                        Correct: <span className="text-green-600 font-medium">{q.options[q.correct]}</span>
                      </p>
                    )}
                    <p className="text-xs text-gray-500 ml-9 bg-gray-50 rounded-lg p-3 leading-relaxed">{q.explanation}</p>
                  </div>
                );
              })}
            </div>

            <div className="flex gap-3">
              <button onClick={restart} className="flex-1 py-3.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500">
                Try again
              </button>
              <a href={BP+'study/flashcards/flashcards.html'} className="flex-1 py-3.5 text-center border border-gray-300 text-gray-700 font-semibold rounded-xl hover:bg-gray-50 transition-colors">
                Review flashcards
              </a>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );

      /* ── Test screen ── */
      return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
            {/* Test header */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="font-bold text-gray-900">Cell Division Practice Test</h1>
                <p className="text-sm text-gray-500">Question {current+1} of {questions.length}</p>
              </div>
              <div className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold ${timeLeft<120?'bg-red-100 text-red-700':'bg-blue-50 text-blue-700'}`} aria-label={`Time remaining: ${fmtTime(timeLeft)}`} aria-live="polite">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {fmtTime(timeLeft)}
              </div>
            </div>

            {/* Progress */}
            <div className="bg-gray-200 rounded-full h-2 mb-8" role="progressbar" aria-valuenow={current+1} aria-valuemin={1} aria-valuemax={questions.length} aria-label="Test progress">
              <div className="bg-blue-500 h-2 rounded-full transition-all duration-300" style={{width:`${((current+1)/questions.length)*100}%`}}/>
            </div>

            {/* Question card */}
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 mb-6">
              <p className="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-4">Question {current+1}</p>
              <p className="text-xl font-bold text-gray-900 mb-8 leading-snug">{q.q}</p>

              <div className="space-y-3" role="group" aria-label="Answer options">
                {q.options.map((opt,i)=>{
                  let cls='w-full text-left flex items-center gap-4 p-4 rounded-xl border-2 transition-all focus-visible:ring-2 focus-visible:ring-blue-500 ';
                  if(showExplain) {
                    if(i===q.correct) cls+='border-green-400 bg-green-50 text-green-800';
                    else if(i===selected&&i!==q.correct) cls+='border-red-400 bg-red-50 text-red-800';
                    else cls+='border-gray-100 text-gray-400';
                  } else if(selected===i) {
                    cls+='border-blue-500 bg-blue-50 text-blue-900';
                  } else {
                    cls+='border-gray-200 text-gray-800 hover:border-blue-300 hover:bg-blue-50';
                  }
                  const label = String.fromCharCode(65+i);
                  return (
                    <button key={i} onClick={()=>!showExplain&&handleAnswer(i)} disabled={showExplain}
                      className={cls} aria-label={`Option ${label}: ${opt}`}>
                      <span className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm font-bold flex-shrink-0 ${showExplain&&i===q.correct?'border-green-500 bg-green-500 text-white':showExplain&&i===selected&&i!==q.correct?'border-red-500 bg-red-500 text-white':'border-current'}`} aria-hidden="true">
                        {showExplain&&i===q.correct?'✓':showExplain&&i===selected&&i!==q.correct?'✗':label}
                      </span>
                      <span className="text-sm font-medium">{opt}</span>
                    </button>
                  );
                })}
              </div>

              {showExplain && (
                <div className={`mt-6 p-4 rounded-xl ${selected===q.correct?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`} role="alert">
                  <p className="font-semibold text-sm mb-1 text-gray-900">{selected===q.correct?'✓ Correct!':'✗ Not quite.'}</p>
                  <p className="text-sm text-gray-700 leading-relaxed">{q.explanation}</p>
                </div>
              )}
            </div>

            {/* Next button */}
            {showExplain && (
              <button onClick={goNext}
                className="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-colors text-lg focus-visible:ring-2 focus-visible:ring-blue-500">
                {current < questions.length-1 ? 'Next question →' : 'See results'}
              </button>
            )}
            {!showExplain && (
              <button disabled className="w-full py-4 bg-gray-100 text-gray-400 font-bold rounded-2xl cursor-not-allowed text-lg">
                Select an answer to continue
              </button>
            )}

            {/* Question nav dots */}
            <div className="flex justify-center gap-2 mt-6" aria-label="Question navigation" role="group">
              {questions.map((_,i)=>(
                <button key={i} onClick={()=>{setCurrent(i);setSelected(answers[i]??null);setShowExplain(i in answers);}}
                  className={`w-3 h-3 rounded-full transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 ${i===current?'bg-blue-600':i in answers?answers[i]===questions[i].correct?'bg-green-400':'bg-red-400':'bg-gray-300'}`}
                  aria-label={`Go to question ${i+1}`} aria-current={i===current?'true':undefined}/>
              ))}
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
