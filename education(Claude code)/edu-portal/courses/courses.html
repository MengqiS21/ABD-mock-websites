<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',100:'#DBEAFE',500:'#3B82F6',600:'#2563EB',700:'#1D4ED8'},secondary:{50:'#F5F3FF',600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({ navMode='category', basePath='' }) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchVal, setSearchVal] = useState('');
      const catLinks = [
        {label:'Courses',    href:basePath+'courses/courses.html'},
        {label:'Subjects',   href:basePath+'subjects/subjects.html'},
        {label:'Curriculum', href:basePath+'curriculum/curriculum.html'},
        {label:'Plans',      href:basePath+'plans/plans.html'},
        {label:'Enterprise', href:basePath+'enterprise/enterprise.html'},
        {label:'Dashboard',  href:basePath+'dashboard/dashboard.html'},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5" aria-label="Primary navigation">
                {catLinks.map(l=>(
                  <a key={l.label} href={l.href}
                    className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.label==='Courses'?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>
                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="flex-1 hidden sm:block">
                <div className="relative max-w-md mx-auto">
                  <input type="search" value={searchVal} onChange={e=>setSearchVal(e.target.value)}
                    placeholder="Search 12,000+ courses…"
                    className="w-full pl-10 pr-4 py-2 text-sm border border-gray-300 rounded-full bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    aria-label="Search courses"/>
                  <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                  </svg>
                </div>
              </div>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&(
              <nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
                {catLinks.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">{l.label}</a>)}
                <div className="pt-3 px-2 flex flex-col gap-2">
                  <a href={basePath+'account/account.html'} className="py-2.5 text-center text-sm font-medium text-gray-700 border border-gray-300 rounded-lg">Log in</a>
                  <a href={basePath+'plans/plans.html'} className="py-2.5 text-center text-sm font-semibold text-white bg-blue-600 rounded-lg">Start free</a>
                </div>
              </nav>
            )}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-10" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6">
          <div className="flex flex-wrap gap-8 mb-8">
            <div>
              <a href={basePath+'index.html'} className="flex items-center gap-2 mb-3">
                <div className="w-7 h-7 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-xs">E</span></div>
                <span className="text-white font-bold">EduPortal</span>
              </a>
              <p className="text-xs text-gray-500 max-w-xs">Empowering learners worldwide.</p>
            </div>
            {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html'],['Study Tools',basePath+'study/study.html']]},
              {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]},
              {t:'Company',ls:[['About','#'],['Careers','#'],['Contact','#']]}].map(col=>(
              <div key={col.t}>
                <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
                <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white transition-colors">{l}</a></li>)}</ul>
              </div>
            ))}
          </div>
          <div className="pt-6 border-t border-gray-800 flex flex-col sm:flex-row items-center justify-between gap-4">
            <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
            <div className="flex gap-5">{['Privacy','Terms','Cookies'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
          </div>
        </div>
      </footer>
    );

    /* ── Course data ── */
    const allCourses = [
      {id:1,title:'Python for Data Science & AI',   inst:'Dr. Ana Silva',     rating:4.8,reviews:92400,level:'Beginner',   dur:'32h',price:89,  badge:'Bestseller', tags:['Data','Python'],   img:'🐍'},
      {id:2,title:'Machine Learning A–Z',            inst:'Prof. Ken Zhang',   rating:4.9,reviews:140000,level:'Intermediate',dur:'45h',price:119, badge:'Top Rated',  tags:['AI','ML'],         img:'🤖'},
      {id:3,title:'React & TypeScript Masterclass',  inst:'Yuki Tanaka',       rating:4.9,reviews:115000,level:'Intermediate',dur:'38h',price:99,  badge:'Top Rated',  tags:['React','Web'],     img:'⚛️'},
      {id:4,title:'Business Analytics Fundamentals', inst:'Priya Patel',       rating:4.7,reviews:58000, level:'Beginner',   dur:'18h',price:79,  badge:'New',        tags:['Business'],        img:'📊'},
      {id:5,title:'UX Design Masterclass',           inst:'Sofia Mendez',      rating:4.8,reviews:73000, level:'Beginner',   dur:'24h',price:89,  badge:'Trending',   tags:['Design','UX'],     img:'🎨'},
      {id:6,title:'Cybersecurity Fundamentals',      inst:"James O'Brien",     rating:4.6,reviews:44000, level:'Beginner',   dur:'20h',price:79,  badge:'Bestseller', tags:['Security'],        img:'🔐'},
      {id:7,title:'Digital Marketing 2024',          inst:'Camille Durand',    rating:4.7,reviews:67000, level:'All levels',  dur:'28h',price:89,  badge:'Trending',   tags:['Marketing'],       img:'📱'},
      {id:8,title:'AWS Cloud Architecture',          inst:'Ravi Kumar',        rating:4.8,reviews:89000, level:'Intermediate',dur:'40h',price:129, badge:'Bestseller', tags:['Cloud','AWS'],     img:'☁️'},
      {id:9,title:'Statistics for Data Science',    inst:'Dr. Emma Watson',   rating:4.7,reviews:51000, level:'Intermediate',dur:'22h',price:89,  badge:'Top Rated',  tags:['Data','Stats'],    img:'📈'},
      {id:10,title:'Graphic Design Essentials',      inst:'Marco Rossi',       rating:4.6,reviews:38000, level:'Beginner',   dur:'16h',price:69,  badge:'',           tags:['Design'],          img:'🖌️'},
      {id:11,title:'Project Management PMP Prep',   inst:'Linda Chang',       rating:4.8,reviews:62000, level:'All levels',  dur:'30h',price:109, badge:'Bestseller', tags:['Business','PM'],   img:'📋'},
      {id:12,title:'Deep Learning with TensorFlow', inst:'Dr. Raj Patel',     rating:4.9,reviews:78000, level:'Advanced',   dur:'52h',price:149, badge:'Top Rated',  tags:['AI','Deep Learning'],img:'🧠'},
    ];

    const FILTERS = {
      level:  ['All levels','Beginner','Intermediate','Advanced'],
      topic:  ['All topics','Python','AI','React','Business','Design','Security','Marketing','Cloud','Data'],
      sort:   ['Most popular','Highest rated','Newest','Price: low to high'],
    };

    const CourseCard = ({course}) => (
      <a href="../courses/detail.html"
        className="card bg-white rounded-2xl overflow-hidden group focus-visible:ring-2 focus-visible:ring-blue-500">
        <div className="h-40 bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center text-5xl">
          {course.img}
        </div>
        <div className="p-4">
          {course.badge && (
            <span className={`badge text-xs mb-2 ${course.badge==='Bestseller'?'bg-yellow-100 text-yellow-800':course.badge==='Top Rated'?'bg-green-100 text-green-800':'bg-blue-100 text-blue-800'}`}>
              {course.badge}
            </span>
          )}
          <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-1 group-hover:text-blue-600 transition-colors line-clamp-2">{course.title}</h3>
          <p className="text-xs text-gray-500 mb-2">{course.inst}</p>
          <div className="flex items-center gap-1.5 text-xs mb-2">
            <span className="font-bold text-amber-500">{course.rating}</span>
            <span className="text-amber-400" aria-hidden="true">{'★'.repeat(Math.floor(course.rating))}{'☆'.repeat(5-Math.floor(course.rating))}</span>
            <span className="text-gray-400">({(course.reviews/1000).toFixed(0)}K)</span>
          </div>
          <div className="flex items-center justify-between text-xs text-gray-500">
            <span>{course.level} · {course.dur}</span>
            <span className="font-bold text-gray-900 text-base">${course.price}</span>
          </div>
        </div>
      </a>
    );

    const App = () => {
      const [filters, setFilters] = useState({level:'All levels',topic:'All topics',sort:'Most popular'});
      const [searchQ, setSearchQ] = useState('');
      const [mobileFiltersOpen, setMobileFiltersOpen] = useState(false);

      const filtered = allCourses.filter(c=>{
        if(filters.level!=='All levels' && c.level!==filters.level) return false;
        if(filters.topic!=='All topics' && !c.tags.includes(filters.topic)) return false;
        if(searchQ && !c.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
        return true;
      });

      return (
        <>
          <GlobalHeader navMode="category" basePath={BP}/>
          <main id="main-content">
            {/* Page header */}
            <div className="bg-white border-b border-gray-200">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
                <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-3">
                  <ol className="flex items-center gap-2">
                    <li><a href={BP+'index.html'} className="hover:text-blue-600">Home</a></li>
                    <li aria-hidden="true">›</li>
                    <li aria-current="page" className="text-gray-900 font-medium">Courses</li>
                  </ol>
                </nav>
                <h1 className="text-3xl font-bold text-gray-900">Course Marketplace</h1>
                <p className="text-gray-500 mt-1">12,000+ courses taught by real-world experts</p>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
              <div className="flex gap-8">
                {/* Sidebar filters – desktop */}
                <aside className="hidden lg:block w-56 flex-shrink-0" aria-label="Course filters">
                  <div className="sticky top-20 bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-6">
                    <div>
                      <h3 className="font-semibold text-gray-900 text-sm mb-3">Level</h3>
                      {FILTERS.level.map(l=>(
                        <label key={l} className="flex items-center gap-2 py-1.5 cursor-pointer group">
                          <input type="radio" name="level" checked={filters.level===l} onChange={()=>setFilters({...filters,level:l})}
                            className="w-4 h-4 text-blue-600 focus:ring-blue-500"/>
                          <span className="text-sm text-gray-700 group-hover:text-blue-600">{l}</span>
                        </label>
                      ))}
                    </div>
                    <div>
                      <h3 className="font-semibold text-gray-900 text-sm mb-3">Topic</h3>
                      {FILTERS.topic.map(t=>(
                        <label key={t} className="flex items-center gap-2 py-1.5 cursor-pointer group">
                          <input type="radio" name="topic" checked={filters.topic===t} onChange={()=>setFilters({...filters,topic:t})}
                            className="w-4 h-4 text-blue-600 focus:ring-blue-500"/>
                          <span className="text-sm text-gray-700 group-hover:text-blue-600">{t}</span>
                        </label>
                      ))}
                    </div>
                    <button onClick={()=>setFilters({level:'All levels',topic:'All topics',sort:'Most popular'})}
                      className="w-full py-2 text-sm text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition-colors">
                      Clear filters
                    </button>
                  </div>
                </aside>

                {/* Main content */}
                <div className="flex-1 min-w-0">
                  {/* Search + sort bar */}
                  <div className="flex flex-col sm:flex-row gap-3 mb-6">
                    <div className="relative flex-1">
                      <input type="search" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                        placeholder="Search courses…"
                        className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        aria-label="Search within courses"/>
                      <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                      </svg>
                    </div>
                    <div className="flex gap-2 items-center">
                      <label htmlFor="sort-select" className="text-sm text-gray-500 hidden sm:inline">Sort:</label>
                      <select id="sort-select" value={filters.sort} onChange={e=>setFilters({...filters,sort:e.target.value})}
                        className="py-2.5 px-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        {FILTERS.sort.map(s=><option key={s}>{s}</option>)}
                      </select>
                      <button onClick={()=>setMobileFiltersOpen(!mobileFiltersOpen)}
                        className="lg:hidden flex items-center gap-1 py-2.5 px-3 border border-gray-300 rounded-xl text-sm hover:bg-gray-50"
                        aria-expanded={mobileFiltersOpen} aria-label="Toggle filters">
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
                        </svg>
                        Filters
                      </button>
                    </div>
                  </div>

                  {/* Mobile filters panel */}
                  {mobileFiltersOpen && (
                    <div className="lg:hidden mb-6 bg-white rounded-2xl border border-gray-200 p-5 grid grid-cols-2 gap-6">
                      <div>
                        <h3 className="font-semibold text-sm mb-3">Level</h3>
                        {FILTERS.level.map(l=>(
                          <label key={l} className="flex items-center gap-2 py-1.5 cursor-pointer">
                            <input type="radio" name="level-m" checked={filters.level===l} onChange={()=>setFilters({...filters,level:l})} className="w-4 h-4 text-blue-600"/>
                            <span className="text-sm text-gray-700">{l}</span>
                          </label>
                        ))}
                      </div>
                      <div>
                        <h3 className="font-semibold text-sm mb-3">Topic</h3>
                        {FILTERS.topic.slice(0,6).map(t=>(
                          <label key={t} className="flex items-center gap-2 py-1.5 cursor-pointer">
                            <input type="radio" name="topic-m" checked={filters.topic===t} onChange={()=>setFilters({...filters,topic:t})} className="w-4 h-4 text-blue-600"/>
                            <span className="text-sm text-gray-700">{t}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Results count */}
                  <p className="text-sm text-gray-500 mb-5" aria-live="polite">Showing <strong>{filtered.length}</strong> courses</p>

                  {/* Grid */}
                  {filtered.length > 0 ? (
                    <div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-5">
                      {filtered.map(c=><CourseCard key={c.id} course={c}/>)}
                    </div>
                  ) : (
                    <div className="text-center py-20 text-gray-400">
                      <div className="text-5xl mb-4">🔍</div>
                      <p className="font-medium text-lg">No courses found</p>
                      <p className="text-sm mt-1">Try adjusting your filters</p>
                    </div>
                  )}

                  {/* Pagination */}
                  {filtered.length > 0 && (
                    <nav aria-label="Pagination" className="mt-10 flex items-center justify-center gap-2">
                      {[1,2,3,'…',12].map((p,i)=>(
                        <button key={i}
                          className={`w-9 h-9 rounded-lg text-sm font-medium transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 ${p===1?'bg-blue-600 text-white':'text-gray-700 hover:bg-gray-100'}`}
                          aria-label={typeof p==='number'?`Page ${p}`:undefined}
                          aria-current={p===1?'page':undefined}>
                          {p}
                        </button>
                      ))}
                    </nav>
                  )}
                </div>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
