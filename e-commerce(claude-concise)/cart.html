<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora – Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#f97316", dark: "#ea580c", light: "#fff7ed" },
            ink: "#1c1917"
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50 font-sans text-ink antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV = [
      { href: "index.html", label: "Home" },
      { href: "products.html", label: "Shop" },
      { href: "product.html", label: "Product" },
      { href: "cart.html", label: "Cart" },
      { href: "account.html", label: "Account" },
    ];

    function Header({ active = "cart.html" }) {
      const [searchVal, setSearchVal] = useState("");
      return (
        <header className="sticky top-0 z-30 bg-white shadow-sm">
          <div className="bg-ink text-white text-xs py-1.5 text-center tracking-wide">
            Free shipping on orders over $50 &mdash; Use code <span className="font-bold text-orange-400">NEXORA10</span> for 10% off
          </div>
          <div className="mx-auto flex max-w-7xl items-center gap-4 px-4 py-3 sm:px-6">
            <a href="index.html" className="flex items-center gap-1.5 shrink-0">
              <span className="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-black text-sm">N</span>
              <span className="text-xl font-black tracking-tight text-ink">nexora</span>
            </a>
            <div className="flex-1 flex items-center gap-2 rounded-xl border-2 border-stone-200 bg-stone-50 px-3 py-2 focus-within:border-brand transition-colors">
              <svg className="w-4 h-4 text-stone-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              <input className="flex-1 bg-transparent text-sm outline-none placeholder:text-stone-400" placeholder="Search millions of products…" value={searchVal} onChange={e => setSearchVal(e.target.value)} />
            </div>
            <nav className="hidden md:flex items-center gap-1">
              {NAV.map(n => (
                <a key={n.href} href={n.href} className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${active === n.href ? "bg-brand text-white" : "text-stone-600 hover:bg-stone-100"}`}>{n.label}</a>
              ))}
            </nav>
            <a href="cart.html" className="relative shrink-0">
              <svg className="w-6 h-6 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 7h13M7 13H5.4M10 21a1 1 0 1 0 2 0M17 21a1 1 0 1 0 2 0"/></svg>
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-brand text-white text-[10px] font-bold flex items-center justify-center">3</span>
            </a>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="mt-16 bg-ink text-stone-400">
          <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12 grid grid-cols-2 md:grid-cols-4 gap-8">
            {[
              { title: "Shop", links: ["New Arrivals","Best Sellers","Deals","Gift Cards"] },
              { title: "Support", links: ["Help Center","Returns","Track Order","Shipping Info"] },
              { title: "Company", links: ["About Us","Careers","Press","Affiliates"] },
              { title: "Legal", links: ["Privacy Policy","Terms of Use","Cookie Settings","Accessibility"] },
            ].map(col => (
              <div key={col.title}>
                <p className="text-white font-semibold text-sm mb-3">{col.title}</p>
                <ul className="space-y-2">{col.links.map(l => <li key={l}><a href="#" className="text-xs hover:text-white transition-colors">{l}</a></li>)}</ul>
              </div>
            ))}
          </div>
          <div className="border-t border-stone-800">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2">
              <span className="text-xs">© 2026 Nexora Marketplace. All rights reserved.</span>
              <div className="flex gap-3">{["Visa","Mastercard","PayPal","Apple Pay"].map(p => <span key={p} className="text-[10px] bg-stone-800 px-2 py-1 rounded text-stone-300">{p}</span>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    const INITIAL_ITEMS = [
      { id: 1, name: "AirPods Pro Wireless Earbuds", variant: "White – 3rd Gen", price: 199, qty: 1, image: "https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?auto=format&fit=crop&w=200&q=80" },
      { id: 2, name: "Mechanical Gaming Keyboard RGB", variant: "Space Grey – TKL", price: 89, qty: 2, image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?auto=format&fit=crop&w=200&q=80" },
      { id: 3, name: "Premium Yoga Mat 6mm", variant: "Sage Green", price: 45, qty: 1, image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=200&q=80" },
    ];

    function CartPage() {
      const [items, setItems] = useState(INITIAL_ITEMS);
      const [coupon, setCoupon] = useState("");
      const [couponApplied, setCouponApplied] = useState(false);
      const [step, setStep] = useState("cart"); // cart | checkout | confirmed

      function updateQty(id, delta) {
        setItems(prev => prev.map(item =>
          item.id === id ? { ...item, qty: Math.max(1, item.qty + delta) } : item
        ));
      }
      function removeItem(id) {
        setItems(prev => prev.filter(item => item.id !== id));
      }

      const subtotal = items.reduce((sum, i) => sum + i.price * i.qty, 0);
      const shipping = subtotal >= 50 ? 0 : 5.99;
      const discount = couponApplied ? Math.round(subtotal * 0.1) : 0;
      const tax = Math.round((subtotal - discount) * 0.08 * 100) / 100;
      const total = subtotal - discount + shipping + tax;

      if (step === "confirmed") {
        return (
          <>
            <Header active="cart.html" />
            <main className="mx-auto max-w-xl px-4 sm:px-6 py-16 text-center">
              <div className="w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center text-4xl mx-auto mb-6">✅</div>
              <h1 className="text-3xl font-black text-ink mb-2">Order Confirmed!</h1>
              <p className="text-stone-500 mb-1">Order <span className="font-semibold text-ink">#NXR-2026-84732</span></p>
              <p className="text-stone-400 text-sm mb-8">A confirmation email has been sent to <span className="font-medium">customer@email.com</span></p>
              <div className="bg-white rounded-2xl border border-stone-100 p-5 mb-6 text-left space-y-3">
                {INITIAL_ITEMS.map(i => (
                  <div key={i.id} className="flex items-center gap-3">
                    <img src={i.image} alt="" className="w-12 h-12 rounded-xl object-cover bg-stone-100" />
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm text-ink truncate">{i.name}</p>
                      <p className="text-xs text-stone-400">{i.variant}</p>
                    </div>
                    <span className="font-bold text-sm">${(i.price * i.qty).toFixed(2)}</span>
                  </div>
                ))}
              </div>
              <div className="flex gap-3">
                <a href="account.html" className="flex-1 bg-ink text-white py-3 rounded-xl font-bold text-sm hover:bg-stone-800 transition-colors text-center">Track Order</a>
                <a href="products.html" className="flex-1 bg-brand text-white py-3 rounded-xl font-bold text-sm hover:bg-brand-dark transition-colors text-center">Continue Shopping</a>
              </div>
            </main>
            <Footer />
          </>
        );
      }

      if (step === "checkout") {
        return (
          <>
            <Header active="cart.html" />
            <main className="mx-auto max-w-4xl px-4 sm:px-6 py-8">
              <div className="flex items-center gap-3 mb-6">
                <button onClick={() => setStep("cart")} className="text-stone-400 hover:text-ink transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 className="text-2xl font-black text-ink">Checkout</h1>
              </div>

              {/* Progress */}
              <div className="flex items-center gap-0 mb-8">
                {["Cart","Shipping","Payment","Confirm"].map((s, i) => (
                  <React.Fragment key={s}>
                    <div className={`flex items-center gap-2 text-sm font-medium ${i <= 1 ? "text-brand" : "text-stone-400"}`}>
                      <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${i <= 1 ? "bg-brand text-white" : "bg-stone-200 text-stone-400"}`}>{i + 1}</span>
                      <span className="hidden sm:inline">{s}</span>
                    </div>
                    {i < 3 && <div className={`flex-1 h-0.5 mx-2 ${i < 1 ? "bg-brand" : "bg-stone-200"}`} />}
                  </React.Fragment>
                ))}
              </div>

              <div className="flex flex-col lg:flex-row gap-6">
                <div className="flex-1 space-y-5">
                  {/* Shipping address */}
                  <div className="bg-white rounded-2xl border border-stone-100 p-5">
                    <h2 className="font-bold text-ink mb-4">Shipping Address</h2>
                    <div className="grid grid-cols-2 gap-3">
                      {[["First Name","Jane"],["Last Name","Smith"],["Email","jane@email.com"],["Phone","+1 555 000 0000"]].map(([label, placeholder]) => (
                        <div key={label}>
                          <label className="text-xs font-semibold text-stone-500 mb-1 block">{label}</label>
                          <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder={placeholder} />
                        </div>
                      ))}
                      <div className="col-span-2">
                        <label className="text-xs font-semibold text-stone-500 mb-1 block">Street Address</label>
                        <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder="123 Main St, Apt 4B" />
                      </div>
                      {[["City","New York"],["State","NY"],["ZIP","10001"],["Country","United States"]].map(([label, placeholder]) => (
                        <div key={label}>
                          <label className="text-xs font-semibold text-stone-500 mb-1 block">{label}</label>
                          <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder={placeholder} />
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Payment */}
                  <div className="bg-white rounded-2xl border border-stone-100 p-5">
                    <h2 className="font-bold text-ink mb-4">Payment Method</h2>
                    <div className="space-y-2 mb-4">
                      {[["💳","Credit / Debit Card",true],["📱","Apple Pay",false],["🅿️","PayPal",false]].map(([icon, label, checked]) => (
                        <label key={label} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-colors ${checked ? "border-brand bg-brand/5" : "border-stone-200 hover:border-stone-300"}`}>
                          <input type="radio" name="payment" className="accent-brand" defaultChecked={checked} />
                          <span>{icon}</span>
                          <span className="text-sm font-medium">{label}</span>
                        </label>
                      ))}
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="col-span-2">
                        <label className="text-xs font-semibold text-stone-500 mb-1 block">Card Number</label>
                        <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder="4242 4242 4242 4242" />
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-stone-500 mb-1 block">Expiry</label>
                        <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder="MM / YY" />
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-stone-500 mb-1 block">CVV</label>
                        <input className="w-full border border-stone-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-brand transition-colors" placeholder="•••" />
                      </div>
                    </div>
                  </div>
                </div>

                {/* Order summary */}
                <div className="lg:w-80 shrink-0">
                  <div className="bg-white rounded-2xl border border-stone-100 p-5 sticky top-28">
                    <h2 className="font-bold text-ink mb-4">Order Summary</h2>
                    <div className="space-y-3 mb-4">
                      {items.map(item => (
                        <div key={item.id} className="flex items-center gap-3">
                          <div className="relative">
                            <img src={item.image} alt="" className="w-12 h-12 rounded-xl object-cover bg-stone-100" />
                            <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-stone-600 text-white text-[9px] font-bold rounded-full flex items-center justify-center">{item.qty}</span>
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className="text-xs font-semibold text-ink leading-tight truncate">{item.name}</p>
                            <p className="text-[10px] text-stone-400">{item.variant}</p>
                          </div>
                          <span className="text-sm font-bold text-ink">${(item.price * item.qty).toFixed(2)}</span>
                        </div>
                      ))}
                    </div>
                    <div className="border-t border-stone-100 pt-4 space-y-2 text-sm">
                      <div className="flex justify-between text-stone-500"><span>Subtotal</span><span>${subtotal.toFixed(2)}</span></div>
                      {discount > 0 && <div className="flex justify-between text-emerald-600"><span>Discount (NEXORA10)</span><span>-${discount.toFixed(2)}</span></div>}
                      <div className="flex justify-between text-stone-500"><span>Shipping</span><span>{shipping === 0 ? <span className="text-emerald-600 font-medium">Free</span> : `$${shipping.toFixed(2)}`}</span></div>
                      <div className="flex justify-between text-stone-500"><span>Tax (8%)</span><span>${tax.toFixed(2)}</span></div>
                      <div className="flex justify-between font-black text-ink text-base border-t border-stone-200 pt-2 mt-2"><span>Total</span><span>${total.toFixed(2)}</span></div>
                    </div>
                    <button onClick={() => setStep("confirmed")}
                      className="w-full mt-4 bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition-colors">
                      Place Order · ${total.toFixed(2)}
                    </button>
                    <p className="text-center text-[10px] text-stone-400 mt-2">🔒 Secured by 256-bit SSL encryption</p>
                  </div>
                </div>
              </div>
            </main>
            <Footer />
          </>
        );
      }

      // Cart view
      return (
        <>
          <Header active="cart.html" />
          <main className="mx-auto max-w-7xl px-4 sm:px-6 py-8">
            <h1 className="text-2xl font-black text-ink mb-6">Shopping Cart <span className="text-stone-400 font-normal text-base">({items.length} items)</span></h1>

            {items.length === 0 ? (
              <div className="text-center py-20">
                <div className="text-6xl mb-4">🛒</div>
                <h2 className="text-xl font-bold mb-2">Your cart is empty</h2>
                <p className="text-stone-400 mb-6">Add some items to get started</p>
                <a href="products.html" className="bg-brand text-white font-bold px-6 py-3 rounded-xl hover:bg-brand-dark transition-colors">Start Shopping</a>
              </div>
            ) : (
              <div className="flex flex-col lg:flex-row gap-6">
                {/* Cart items */}
                <div className="flex-1 space-y-3">
                  {/* Free shipping progress */}
                  {subtotal < 50 && (
                    <div className="bg-brand/5 border border-brand/20 rounded-2xl p-4">
                      <p className="text-sm font-semibold text-ink mb-2">Add <span className="text-brand">${(50 - subtotal).toFixed(2)}</span> more for free shipping!</p>
                      <div className="h-2 bg-stone-200 rounded-full overflow-hidden">
                        <div className="h-full bg-brand rounded-full transition-all" style={{ width: `${(subtotal / 50) * 100}%` }} />
                      </div>
                    </div>
                  )}

                  {items.map(item => (
                    <div key={item.id} className="bg-white rounded-2xl border border-stone-100 p-4 flex gap-4">
                      <a href="product.html" className="w-24 h-24 shrink-0 rounded-xl overflow-hidden bg-stone-50">
                        <img src={item.image} alt={item.name} className="w-full h-full object-cover hover:scale-105 transition-transform" />
                      </a>
                      <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-start gap-2">
                          <div>
                            <a href="product.html" className="font-semibold text-ink hover:text-brand transition-colors line-clamp-1">{item.name}</a>
                            <p className="text-xs text-stone-400 mt-0.5">{item.variant}</p>
                            <p className="text-xs text-emerald-600 font-medium mt-1">✓ In stock · Free shipping</p>
                          </div>
                          <button onClick={() => removeItem(item.id)} className="text-stone-300 hover:text-red-500 transition-colors shrink-0">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                          </button>
                        </div>
                        <div className="flex items-center justify-between mt-3">
                          <div className="flex items-center bg-stone-100 rounded-xl overflow-hidden">
                            <button onClick={() => updateQty(item.id, -1)} className="px-3 py-1.5 text-stone-500 hover:bg-stone-200 text-sm font-bold transition-colors">−</button>
                            <span className="px-3 py-1.5 font-bold text-sm text-ink">{item.qty}</span>
                            <button onClick={() => updateQty(item.id, 1)} className="px-3 py-1.5 text-stone-500 hover:bg-stone-200 text-sm font-bold transition-colors">+</button>
                          </div>
                          <span className="font-black text-ink">${(item.price * item.qty).toFixed(2)}</span>
                        </div>
                      </div>
                    </div>
                  ))}

                  {/* You may also like */}
                  <div className="bg-white rounded-2xl border border-stone-100 p-4">
                    <p className="font-bold text-sm text-ink mb-3">Frequently Bought Together</p>
                    <div className="flex gap-3 overflow-x-auto pb-1">
                      {[
                        { name:"USB-C Cable 3-pack", price:"$14", image:"https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?auto=format&fit=crop&w=200&q=80" },
                        { name:"Phone Stand Adjustable", price:"$18", image:"https://images.unsplash.com/photo-1586953208448-b95a79798f07?auto=format&fit=crop&w=200&q=80" },
                        { name:"Screen Cleaning Kit", price:"$9", image:"https://images.unsplash.com/photo-1574944985070-8f3ebc6b79d2?auto=format&fit=crop&w=200&q=80" },
                      ].map(s => (
                        <div key={s.name} className="shrink-0 w-32 flex flex-col gap-1.5">
                          <div className="w-32 h-24 rounded-xl overflow-hidden bg-stone-50">
                            <img src={s.image} alt="" className="w-full h-full object-cover" />
                          </div>
                          <p className="text-xs font-medium text-ink line-clamp-2 leading-tight">{s.name}</p>
                          <div className="flex items-center justify-between">
                            <span className="text-sm font-bold text-ink">{s.price}</span>
                            <button className="text-[10px] bg-brand/10 text-brand font-bold px-2 py-0.5 rounded-lg">Add</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Order summary */}
                <div className="lg:w-80 shrink-0">
                  <div className="bg-white rounded-2xl border border-stone-100 p-5 sticky top-28">
                    <h2 className="font-bold text-ink mb-4">Order Summary</h2>

                    {/* Coupon */}
                    <div className="flex gap-2 mb-5">
                      <input
                        value={coupon}
                        onChange={e => setCoupon(e.target.value)}
                        className="flex-1 border border-stone-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-brand transition-colors"
                        placeholder="Promo code"
                      />
                      <button onClick={() => coupon.length > 0 && setCouponApplied(true)}
                        className={`text-sm font-semibold px-4 py-2 rounded-xl transition-colors ${couponApplied ? "bg-emerald-500 text-white" : "bg-ink text-white hover:bg-stone-800"}`}>
                        {couponApplied ? "✓" : "Apply"}
                      </button>
                    </div>
                    {couponApplied && <p className="text-xs text-emerald-600 font-medium -mt-3 mb-3">🎉 Code applied! You saved ${discount}</p>}

                    <div className="space-y-2.5 text-sm">
                      <div className="flex justify-between text-stone-500"><span>Subtotal ({items.reduce((s, i) => s + i.qty, 0)} items)</span><span>${subtotal.toFixed(2)}</span></div>
                      {discount > 0 && <div className="flex justify-between text-emerald-600 font-medium"><span>Promo (NEXORA10)</span><span>-${discount.toFixed(2)}</span></div>}
                      <div className="flex justify-between text-stone-500">
                        <span>Shipping</span>
                        <span>{shipping === 0 ? <span className="text-emerald-600 font-medium">Free 🎉</span> : `$${shipping.toFixed(2)}`}</span>
                      </div>
                      <div className="flex justify-between text-stone-500"><span>Estimated Tax</span><span>${tax.toFixed(2)}</span></div>
                    </div>
                    <div className="border-t border-stone-200 mt-3 pt-3 flex justify-between font-black text-ink text-lg">
                      <span>Total</span>
                      <span>${total.toFixed(2)}</span>
                    </div>

                    <button onClick={() => setStep("checkout")}
                      className="w-full mt-4 bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl transition-colors text-sm">
                      Proceed to Checkout →
                    </button>
                    <a href="products.html" className="block text-center text-sm text-stone-400 hover:text-brand mt-3 transition-colors">← Continue Shopping</a>

                    <div className="mt-4 border-t border-stone-100 pt-4">
                      <p className="text-xs text-stone-400 text-center mb-2">We accept</p>
                      <div className="flex justify-center gap-2">
                        {["Visa","MC","PayPal","Apple Pay"].map(p => (
                          <span key={p} className="text-[10px] bg-stone-100 px-2 py-1 rounded text-stone-500 font-medium">{p}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CartPage />);
  </script>
</body>
</html>
