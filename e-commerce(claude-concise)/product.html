<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora – Product Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#f97316", dark: "#ea580c", light: "#fff7ed" },
            ink: "#1c1917"
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50 font-sans text-ink antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV = [
      { href: "index.html", label: "Home" },
      { href: "products.html", label: "Shop" },
      { href: "product.html", label: "Product" },
      { href: "cart.html", label: "Cart" },
      { href: "account.html", label: "Account" },
    ];

    function Header({ active = "product.html" }) {
      const [searchVal, setSearchVal] = useState("");
      return (
        <header className="sticky top-0 z-30 bg-white shadow-sm">
          <div className="bg-ink text-white text-xs py-1.5 text-center tracking-wide">
            Free shipping on orders over $50 &mdash; Use code <span className="font-bold text-orange-400">NEXORA10</span> for 10% off
          </div>
          <div className="mx-auto flex max-w-7xl items-center gap-4 px-4 py-3 sm:px-6">
            <a href="index.html" className="flex items-center gap-1.5 shrink-0">
              <span className="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-black text-sm">N</span>
              <span className="text-xl font-black tracking-tight text-ink">nexora</span>
            </a>
            <div className="flex-1 flex items-center gap-2 rounded-xl border-2 border-stone-200 bg-stone-50 px-3 py-2 focus-within:border-brand transition-colors">
              <svg className="w-4 h-4 text-stone-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              <input className="flex-1 bg-transparent text-sm outline-none placeholder:text-stone-400" placeholder="Search millions of products…" value={searchVal} onChange={e => setSearchVal(e.target.value)} />
            </div>
            <nav className="hidden md:flex items-center gap-1">
              {NAV.map(n => (
                <a key={n.href} href={n.href} className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${active === n.href ? "bg-brand text-white" : "text-stone-600 hover:bg-stone-100"}`}>{n.label}</a>
              ))}
            </nav>
            <a href="cart.html" className="relative shrink-0">
              <svg className="w-6 h-6 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 7h13M7 13H5.4M10 21a1 1 0 1 0 2 0M17 21a1 1 0 1 0 2 0"/></svg>
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-brand text-white text-[10px] font-bold flex items-center justify-center">3</span>
            </a>
          </div>
          <div className="border-t border-stone-100 overflow-x-auto">
            <div className="mx-auto max-w-7xl flex gap-0 px-4 sm:px-6">
              {["Electronics","Fashion","Home & Garden","Sports","Beauty","Books","Toys","Automotive","Health","Food"].map(cat => (
                <a key={cat} href="products.html" className="whitespace-nowrap px-4 py-2.5 text-xs font-medium text-stone-500 hover:text-brand hover:border-b-2 hover:border-brand transition-colors">{cat}</a>
              ))}
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="mt-16 bg-ink text-stone-400">
          <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12 grid grid-cols-2 md:grid-cols-4 gap-8">
            {[
              { title: "Shop", links: ["New Arrivals","Best Sellers","Deals","Gift Cards"] },
              { title: "Support", links: ["Help Center","Returns","Track Order","Shipping Info"] },
              { title: "Company", links: ["About Us","Careers","Press","Affiliates"] },
              { title: "Legal", links: ["Privacy Policy","Terms of Use","Cookie Settings","Accessibility"] },
            ].map(col => (
              <div key={col.title}>
                <p className="text-white font-semibold text-sm mb-3">{col.title}</p>
                <ul className="space-y-2">{col.links.map(l => <li key={l}><a href="#" className="text-xs hover:text-white transition-colors">{l}</a></li>)}</ul>
              </div>
            ))}
          </div>
          <div className="border-t border-stone-800">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2">
              <span className="text-xs">© 2026 Nexora Marketplace. All rights reserved.</span>
              <div className="flex gap-3">{["Visa","Mastercard","PayPal","Apple Pay"].map(p => <span key={p} className="text-[10px] bg-stone-800 px-2 py-1 rounded text-stone-300">{p}</span>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    const IMAGES = [
      "https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?auto=format&fit=crop&w=800&q=80",
      "https://images.unsplash.com/photo-1590658165737-8b5a401fc36a?auto=format&fit=crop&w=800&q=80",
      "https://images.unsplash.com/photo-1625246333195-78d9c38ad449?auto=format&fit=crop&w=800&q=80",
      "https://images.unsplash.com/photo-1600294037547-82f8f730fbf7?auto=format&fit=crop&w=800&q=80",
    ];

    const REVIEWS = [
      { name:"Sarah K.", rating:5, date:"Jan 15, 2026", verified:true, title:"Best earbuds I've ever owned", body:"The noise cancellation is incredible. I use these on my commute every day and couldn't be happier. Sound quality is top-notch and the fit is comfortable for hours." },
      { name:"Marcus T.", rating:4, date:"Dec 28, 2025", verified:true, title:"Great product, minor battery quibble", body:"Sound quality and ANC are excellent. Battery life is good but not as long as advertised when using Transparency mode. Still highly recommend." },
      { name:"Priya M.", rating:5, date:"Dec 10, 2025", verified:false, title:"Gift for husband – he loves them!", body:"Bought these as a Christmas gift. My husband was absolutely thrilled. He says the sound clarity is phenomenal and they pair instantly with his phone." },
    ];

    const RELATED = [
      { name:"Sony WH-1000XM5 Headphones", price:"$279", image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80", rating:4.9 },
      { name:"Jabra Elite 75t Earbuds", price:"$149", image:"https://images.unsplash.com/photo-1590658165737-8b5a401fc36a?auto=format&fit=crop&w=400&q=80", rating:4.6 },
      { name:"Bose QuietComfort Earbuds II", price:"$239", image:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?auto=format&fit=crop&w=400&q=80", rating:4.7 },
      { name:"Anker Soundcore Life Q30", price:"$56", image:"https://images.unsplash.com/photo-1609081219090-a6d81d3085bf?auto=format&fit=crop&w=400&q=80", rating:4.4 },
    ];

    function ProductDetailPage() {
      const [activeImg, setActiveImg] = useState(0);
      const [qty, setQty] = useState(1);
      const [activeTab, setActiveTab] = useState("description");
      const [added, setAdded] = useState(false);

      function handleAddToCart() {
        setAdded(true);
        setTimeout(() => setAdded(false), 2000);
      }

      return (
        <>
          <Header active="product.html" />
          <main className="mx-auto max-w-7xl px-4 sm:px-6 py-6">
            {/* Breadcrumb */}
            <nav className="text-xs text-stone-400 mb-6 flex gap-1.5 items-center flex-wrap">
              <a href="index.html" className="hover:text-brand">Home</a>
              <span>/</span>
              <a href="products.html" className="hover:text-brand">Electronics</a>
              <span>/</span>
              <a href="products.html" className="hover:text-brand">Earbuds</a>
              <span>/</span>
              <span className="text-ink font-medium">AirPods Pro Wireless</span>
            </nav>

            {/* Product layout */}
            <div className="flex flex-col lg:flex-row gap-8">
              {/* Images */}
              <div className="lg:w-1/2 flex flex-col gap-3">
                <div className="relative aspect-square bg-white rounded-3xl overflow-hidden border border-stone-100">
                  <img src={IMAGES[activeImg]} alt="Product" className="w-full h-full object-cover" />
                  <span className="absolute top-4 left-4 bg-red-500 text-white text-xs font-bold px-2.5 py-1 rounded-full">-20%</span>
                  <button className="absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow flex items-center justify-center hover:scale-110 transition-transform">
                    <svg className="w-5 h-5 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                  </button>
                </div>
                <div className="flex gap-3">
                  {IMAGES.map((img, i) => (
                    <button key={i} onClick={() => setActiveImg(i)}
                      className={`w-20 h-20 rounded-xl overflow-hidden border-2 transition-colors ${activeImg === i ? "border-brand" : "border-stone-200"}`}>
                      <img src={img} alt="" className="w-full h-full object-cover" />
                    </button>
                  ))}
                </div>
              </div>

              {/* Info */}
              <div className="lg:w-1/2 flex flex-col gap-5">
                <div>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xs bg-emerald-100 text-emerald-700 font-semibold px-2 py-0.5 rounded-full">In Stock</span>
                    <span className="text-xs bg-orange-100 text-orange-700 font-semibold px-2 py-0.5 rounded-full">⚡ Ships today</span>
                  </div>
                  <h1 className="text-2xl font-black text-ink leading-tight mb-2">AirPods Pro (3rd Gen) – Active Noise Cancellation, Transparency Mode</h1>
                  <p className="text-sm text-stone-500">by <span className="text-brand font-semibold hover:underline cursor-pointer">TechAudio Official Store</span></p>
                </div>

                {/* Rating */}
                <div className="flex items-center gap-3">
                  <div className="flex">
                    {[1,2,3,4,5].map(s => <svg key={s} className={`w-5 h-5 ${s <= 5 ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}
                  </div>
                  <span className="font-bold text-ink">4.8</span>
                  <span className="text-stone-400 text-sm">12,483 reviews</span>
                  <span className="text-stone-300">|</span>
                  <span className="text-stone-400 text-sm">4.2k sold this month</span>
                </div>

                {/* Pricing */}
                <div className="bg-brand/5 border border-brand/20 rounded-2xl p-4">
                  <div className="flex items-baseline gap-3">
                    <span className="text-3xl font-black text-ink">$199</span>
                    <span className="text-lg text-stone-400 line-through">$249</span>
                    <span className="text-sm font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded-full">Save $50</span>
                  </div>
                  <p className="text-xs text-stone-500 mt-1">Lowest price in 30 days · Price includes tax</p>
                </div>

                {/* Variants */}
                <div>
                  <p className="text-sm font-bold mb-2">Color</p>
                  <div className="flex gap-2">
                    {[["White","bg-white border-brand ring-2 ring-brand ring-offset-2"],["Midnight Black","bg-stone-900"],["Sage Green","bg-emerald-700"]].map(([name, cls]) => (
                      <button key={name} title={name} className={`w-8 h-8 rounded-full border-2 border-stone-200 ${cls} hover:scale-110 transition-transform`} />
                    ))}
                  </div>
                </div>

                {/* Quantity + CTA */}
                <div className="flex items-center gap-3 flex-wrap">
                  <div className="flex items-center bg-white border border-stone-200 rounded-xl overflow-hidden">
                    <button onClick={() => setQty(q => Math.max(1, q - 1))} className="px-3 py-2.5 text-stone-500 hover:bg-stone-50 text-lg font-bold transition-colors">−</button>
                    <span className="px-4 py-2.5 font-bold text-ink text-sm">{qty}</span>
                    <button onClick={() => setQty(q => q + 1)} className="px-3 py-2.5 text-stone-500 hover:bg-stone-50 text-lg font-bold transition-colors">+</button>
                  </div>
                  <button onClick={handleAddToCart}
                    className={`flex-1 min-w-40 py-3 rounded-xl font-bold text-sm transition-all ${added ? "bg-emerald-500 text-white" : "bg-brand hover:bg-brand-dark text-white"}`}>
                    {added ? "✓ Added to Cart!" : "Add to Cart"}
                  </button>
                  <a href="cart.html" className="flex-1 min-w-40 py-3 rounded-xl font-bold text-sm bg-ink text-white text-center hover:bg-stone-800 transition-colors">Buy Now</a>
                </div>

                {/* Shipping info */}
                <div className="bg-white rounded-2xl border border-stone-100 p-4 space-y-3 text-sm">
                  {[
                    ["🚚","Free shipping","Arrives in 2–3 business days"],
                    ["↩️","Free returns","30-day hassle-free returns"],
                    ["🔒","Secure checkout","256-bit SSL encryption"],
                    ["✅","Sold by","TechAudio Official · 98.7% positive"],
                  ].map(([icon, label, sub]) => (
                    <div key={label} className="flex items-start gap-3">
                      <span className="text-lg">{icon}</span>
                      <div>
                        <p className="font-semibold text-ink">{label}</p>
                        <p className="text-xs text-stone-400">{sub}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="mt-10">
              <div className="flex gap-0 border-b border-stone-200 mb-6">
                {["description","specs","reviews"].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab)}
                    className={`px-5 py-3 text-sm font-semibold capitalize transition-colors border-b-2 -mb-px ${activeTab === tab ? "border-brand text-brand" : "border-transparent text-stone-500 hover:text-ink"}`}>
                    {tab === "reviews" ? `Reviews (12,483)` : tab === "specs" ? "Specifications" : "Description"}
                  </button>
                ))}
              </div>

              {activeTab === "description" && (
                <div className="max-w-2xl space-y-4 text-sm text-stone-600 leading-relaxed">
                  <p>Experience music like never before with the AirPods Pro 3rd Generation. Featuring industry-leading Active Noise Cancellation technology that adapts to the shape of your ear and the fit of the ear tip for a truly personalised listening experience.</p>
                  <p>The new H2 chip pushes the boundaries of what's possible with audio. A powerful custom amplifier produces clean sound across the full range of the driver, while the advanced computational audio combines with hardware to push the limits of noise cancellation and Transparency mode.</p>
                  <ul className="list-disc pl-5 space-y-1">
                    {["Up to 6 hours of listening time with ANC on","Up to 30 hours total with MagSafe Charging Case","Adaptive Transparency lets outside sound in","Touch control for music, calls, and Siri","IPX4 sweat and water resistant"].map(f => <li key={f}>{f}</li>)}
                  </ul>
                </div>
              )}

              {activeTab === "specs" && (
                <div className="max-w-2xl">
                  <table className="w-full text-sm">
                    <tbody>
                      {[
                        ["Connectivity","Bluetooth 5.3"],["Battery Life","6 hrs (30 hrs with case)"],["Charging","MagSafe / Lightning / USB-C"],["Water Resistance","IPX4"],
                        ["Weight","5.3g per earbud"],["Chip","Apple H2"],["Audio Technology","Adaptive EQ, Spatial Audio"],["Warranty","1 Year Limited"],
                      ].map(([k, v], i) => (
                        <tr key={k} className={i % 2 === 0 ? "bg-stone-50" : "bg-white"}>
                          <td className="py-3 px-4 font-semibold text-ink rounded-l-lg">{k}</td>
                          <td className="py-3 px-4 text-stone-600 rounded-r-lg">{v}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {activeTab === "reviews" && (
                <div className="max-w-2xl space-y-4">
                  <div className="flex items-center gap-6 bg-white rounded-2xl p-5 border border-stone-100 mb-6">
                    <div className="text-center">
                      <p className="text-5xl font-black text-ink">4.8</p>
                      <div className="flex justify-center my-1">
                        {[1,2,3,4,5].map(s => <svg key={s} className="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}
                      </div>
                      <p className="text-xs text-stone-400">12,483 reviews</p>
                    </div>
                    <div className="flex-1 space-y-1">
                      {[[5,78],[4,14],[3,5],[2,2],[1,1]].map(([s,pct]) => (
                        <div key={s} className="flex items-center gap-2 text-xs">
                          <span className="w-3 text-stone-500">{s}</span>
                          <div className="flex-1 h-2 bg-stone-100 rounded-full overflow-hidden">
                            <div className="h-full bg-amber-400 rounded-full" style={{ width: `${pct}%` }} />
                          </div>
                          <span className="w-6 text-stone-400">{pct}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {REVIEWS.map(r => (
                    <div key={r.name} className="bg-white rounded-2xl border border-stone-100 p-5">
                      <div className="flex items-start justify-between mb-2">
                        <div>
                          <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded-full bg-brand/20 text-brand flex items-center justify-center text-sm font-bold">{r.name[0]}</div>
                            <div>
                              <p className="font-semibold text-sm text-ink">{r.name}</p>
                              {r.verified && <span className="text-[10px] text-emerald-600 font-medium">✓ Verified Purchase</span>}
                            </div>
                          </div>
                        </div>
                        <span className="text-xs text-stone-400">{r.date}</span>
                      </div>
                      <div className="flex mb-2">{[1,2,3,4,5].map(s => <svg key={s} className={`w-4 h-4 ${s <= r.rating ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}</div>
                      <p className="font-semibold text-sm text-ink mb-1">{r.title}</p>
                      <p className="text-sm text-stone-500 leading-relaxed">{r.body}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Related products */}
            <div className="mt-12">
              <h2 className="text-xl font-black mb-5">Customers Also Viewed</h2>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                {RELATED.map(p => (
                  <a key={p.name} href="product.html" className="group bg-white rounded-2xl overflow-hidden border border-stone-100 hover:shadow-lg transition-all">
                    <div className="aspect-square overflow-hidden bg-stone-50">
                      <img src={p.image} alt={p.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                    </div>
                    <div className="p-3">
                      <p className="text-sm font-semibold text-ink line-clamp-2 mb-1">{p.name}</p>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-ink">{p.price}</span>
                        <div className="flex">{[1,2,3,4,5].map(s => <svg key={s} className={`w-3 h-3 ${s <= Math.round(p.rating) ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}</div>
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ProductDetailPage />);
  </script>
</body>
</html>
