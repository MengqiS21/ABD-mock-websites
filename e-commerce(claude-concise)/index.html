<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora – Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#f97316", dark: "#ea580c", light: "#fff7ed" },
            ink: "#1c1917"
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50 font-sans text-ink antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV = [
      { href: "index.html", label: "Home" },
      { href: "products.html", label: "Shop" },
      { href: "product.html", label: "Product" },
      { href: "cart.html", label: "Cart" },
      { href: "account.html", label: "Account" },
    ];

    function Header({ active = "index.html" }) {
      const [searchVal, setSearchVal] = useState("");
      return (
        <header className="sticky top-0 z-30 bg-white shadow-sm">
          {/* Top bar */}
          <div className="bg-ink text-white text-xs py-1.5 text-center tracking-wide">
            Free shipping on orders over $50 &mdash; Use code <span className="font-bold text-orange-400">NEXORA10</span> for 10% off
          </div>
          {/* Main nav */}
          <div className="mx-auto flex max-w-7xl items-center gap-4 px-4 py-3 sm:px-6">
            <a href="index.html" className="flex items-center gap-1.5 shrink-0">
              <span className="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-black text-sm">N</span>
              <span className="text-xl font-black tracking-tight text-ink">nexora</span>
            </a>
            <div className="flex-1 flex items-center gap-2 rounded-xl border-2 border-stone-200 bg-stone-50 px-3 py-2 focus-within:border-brand transition-colors">
              <svg className="w-4 h-4 text-stone-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              <input
                className="flex-1 bg-transparent text-sm outline-none placeholder:text-stone-400"
                placeholder="Search millions of products…"
                value={searchVal}
                onChange={e => setSearchVal(e.target.value)}
              />
            </div>
            <nav className="hidden md:flex items-center gap-1">
              {NAV.map(n => (
                <a key={n.href} href={n.href}
                  className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${active === n.href ? "bg-brand text-white" : "text-stone-600 hover:bg-stone-100"}`}>
                  {n.label}
                </a>
              ))}
            </nav>
            <a href="cart.html" className="relative shrink-0">
              <svg className="w-6 h-6 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 7h13M7 13H5.4M10 21a1 1 0 1 0 2 0M17 21a1 1 0 1 0 2 0"/></svg>
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-brand text-white text-[10px] font-bold flex items-center justify-center">3</span>
            </a>
          </div>
          {/* Category strip */}
          <div className="border-t border-stone-100 overflow-x-auto">
            <div className="mx-auto max-w-7xl flex gap-0 px-4 sm:px-6">
              {["Electronics","Fashion","Home & Garden","Sports","Beauty","Books","Toys","Automotive","Health","Food"].map(cat => (
                <a key={cat} href="products.html" className="whitespace-nowrap px-4 py-2.5 text-xs font-medium text-stone-500 hover:text-brand hover:border-b-2 hover:border-brand transition-colors">{cat}</a>
              ))}
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="mt-16 bg-ink text-stone-400">
          <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12 grid grid-cols-2 md:grid-cols-4 gap-8">
            {[
              { title: "Shop", links: ["New Arrivals","Best Sellers","Deals","Gift Cards"] },
              { title: "Support", links: ["Help Center","Returns","Track Order","Shipping Info"] },
              { title: "Company", links: ["About Us","Careers","Press","Affiliates"] },
              { title: "Legal", links: ["Privacy Policy","Terms of Use","Cookie Settings","Accessibility"] },
            ].map(col => (
              <div key={col.title}>
                <p className="text-white font-semibold text-sm mb-3">{col.title}</p>
                <ul className="space-y-2">
                  {col.links.map(l => <li key={l}><a href="#" className="text-xs hover:text-white transition-colors">{l}</a></li>)}
                </ul>
              </div>
            ))}
          </div>
          <div className="border-t border-stone-800">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2">
              <span className="text-xs">© 2026 Nexora Marketplace. All rights reserved.</span>
              <div className="flex gap-3">
                {["Visa","Mastercard","PayPal","Apple Pay"].map(p => (
                  <span key={p} className="text-[10px] bg-stone-800 px-2 py-1 rounded text-stone-300">{p}</span>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    function StarRating({ rating = 4.5, count = 0 }) {
      return (
        <div className="flex items-center gap-1">
          <div className="flex">
            {[1,2,3,4,5].map(s => (
              <svg key={s} className={`w-3.5 h-3.5 ${s <= Math.floor(rating) ? "text-amber-400" : s - 0.5 === rating ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            ))}
          </div>
          {count > 0 && <span className="text-xs text-stone-500">({count.toLocaleString()})</span>}
        </div>
      );
    }

    function ProductCard({ name, price, originalPrice, rating, reviews, badge, image, href = "product.html" }) {
      return (
        <a href={href} className="group flex flex-col bg-white rounded-2xl overflow-hidden border border-stone-100 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
          <div className="relative aspect-square bg-stone-50 overflow-hidden">
            <img src={image} alt={name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
            {badge && (
              <span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full ${badge === "Sale" ? "bg-red-500 text-white" : badge === "New" ? "bg-emerald-500 text-white" : "bg-brand text-white"}`}>{badge}</span>
            )}
            <button className="absolute top-2 right-2 w-7 h-7 rounded-full bg-white shadow flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
              <svg className="w-4 h-4 text-stone-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
          </div>
          <div className="p-3 flex flex-col gap-1 flex-1">
            <p className="text-xs text-stone-400 font-medium">Electronics</p>
            <p className="text-sm font-semibold text-ink leading-snug line-clamp-2">{name}</p>
            <StarRating rating={rating} count={reviews} />
            <div className="mt-auto pt-2 flex items-center justify-between">
              <div className="flex items-baseline gap-1.5">
                <span className="font-bold text-ink">{price}</span>
                {originalPrice && <span className="text-xs text-stone-400 line-through">{originalPrice}</span>}
              </div>
              <button className="text-xs bg-brand text-white px-2.5 py-1 rounded-lg font-medium hover:bg-brand-dark transition-colors">Add</button>
            </div>
          </div>
        </a>
      );
    }

    const FEATURED = [
      { name: "AirPods Pro Wireless Earbuds", price: "$199", originalPrice: "$249", rating: 4.8, reviews: 12483, badge: "Sale", image: "https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?auto=format&fit=crop&w=600&q=80" },
      { name: "Mechanical Gaming Keyboard", price: "$89", rating: 4.6, reviews: 3291, badge: "New", image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?auto=format&fit=crop&w=600&q=80" },
      { name: "4K Webcam with Ring Light", price: "$64", originalPrice: "$80", rating: 4.4, reviews: 876, badge: "Sale", image: "https://images.unsplash.com/photo-1596558450255-7c0b7be9d56a?auto=format&fit=crop&w=600&q=80" },
      { name: "Minimalist Leather Wallet", price: "$38", rating: 4.7, reviews: 5104, image: "https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&w=600&q=80" },
      { name: "Bamboo Desk Organiser Set", price: "$29", rating: 4.5, reviews: 2318, badge: "New", image: "https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?auto=format&fit=crop&w=600&q=80" },
      { name: "Premium Yoga Mat 6mm", price: "$45", originalPrice: "$60", rating: 4.9, reviews: 8762, badge: "Sale", image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=600&q=80" },
      { name: "Smart LED Desk Lamp", price: "$55", rating: 4.6, reviews: 1543, image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?auto=format&fit=crop&w=600&q=80" },
      { name: "Insulated Travel Tumbler", price: "$32", rating: 4.8, reviews: 9234, image: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?auto=format&fit=crop&w=600&q=80" },
    ];

    const CATEGORIES = [
      { label: "Electronics", icon: "💻", color: "bg-blue-50 text-blue-700" },
      { label: "Fashion", icon: "👗", color: "bg-pink-50 text-pink-700" },
      { label: "Home", icon: "🏠", color: "bg-amber-50 text-amber-700" },
      { label: "Sports", icon: "⚽", color: "bg-green-50 text-green-700" },
      { label: "Beauty", icon: "💄", color: "bg-rose-50 text-rose-700" },
      { label: "Books", icon: "📚", color: "bg-indigo-50 text-indigo-700" },
    ];

    function HomePage() {
      return (
        <>
          <Header active="index.html" />
          <main>
            {/* Hero */}
            <section className="relative overflow-hidden bg-gradient-to-br from-ink via-stone-900 to-stone-800">
              <div className="mx-auto max-w-7xl px-4 sm:px-6 py-16 md:py-24 flex flex-col md:flex-row items-center gap-10">
                <div className="flex-1 text-white">
                  <span className="inline-block bg-brand/20 text-orange-300 text-xs font-semibold px-3 py-1 rounded-full mb-4 border border-brand/30">🔥 Flash Sale – Up to 60% Off</span>
                  <h1 className="text-4xl md:text-6xl font-black leading-tight mb-4">
                    Discover<br />
                    <span className="text-brand">Millions</span> of<br />
                    Products
                  </h1>
                  <p className="text-stone-400 text-lg mb-8 max-w-md">Shop the world's best marketplace. Free shipping, easy returns, and exclusive deals every day.</p>
                  <div className="flex gap-3">
                    <a href="products.html" className="bg-brand hover:bg-brand-dark text-white font-bold px-6 py-3 rounded-xl transition-colors">Shop Now</a>
                    <a href="products.html" className="bg-white/10 hover:bg-white/20 text-white font-bold px-6 py-3 rounded-xl transition-colors border border-white/20">View Deals</a>
                  </div>
                  <div className="mt-10 flex gap-8 text-sm">
                    {[["50M+","Products"],["180+","Countries"],["99%","Satisfaction"]].map(([n,l]) => (
                      <div key={l}><p className="font-black text-2xl text-white">{n}</p><p className="text-stone-400">{l}</p></div>
                    ))}
                  </div>
                </div>
                <div className="flex-1 grid grid-cols-2 gap-3 max-w-sm w-full">
                  {[
                    "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80",
                    "https://images.unsplash.com/photo-1585386959984-a4155224a1ad?auto=format&fit=crop&w=400&q=80",
                    "https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=400&q=80",
                    "https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=400&q=80",
                  ].map((src, i) => (
                    <div key={i} className={`rounded-2xl overflow-hidden ${i === 0 ? "col-span-2 aspect-video" : "aspect-square"}`}>
                      <img src={src} alt="" className="w-full h-full object-cover" />
                    </div>
                  ))}
                </div>
              </div>
              {/* Decorative blobs */}
              <div className="absolute top-0 right-0 w-96 h-96 bg-brand/10 rounded-full blur-3xl pointer-events-none" />
            </section>

            {/* Trust badges */}
            <section className="bg-white border-b border-stone-100">
              <div className="mx-auto max-w-7xl px-4 sm:px-6 py-5 flex flex-wrap justify-center gap-8 text-xs text-stone-500 font-medium">
                {[["🚚","Free Shipping"],["↩️","30-Day Returns"],["🔒","Secure Payments"],["⭐","Top Rated Sellers"],["🌍","Global Delivery"]].map(([icon,label]) => (
                  <div key={label} className="flex items-center gap-2"><span>{icon}</span><span>{label}</span></div>
                ))}
              </div>
            </section>

            {/* Categories */}
            <section className="mx-auto max-w-7xl px-4 sm:px-6 py-10">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-black text-ink">Browse Categories</h2>
                <a href="products.html" className="text-sm text-brand font-semibold hover:underline">See all →</a>
              </div>
              <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
                {CATEGORIES.map(c => (
                  <a key={c.label} href="products.html" className={`${c.color} rounded-2xl p-4 flex flex-col items-center gap-2 hover:scale-105 transition-transform cursor-pointer`}>
                    <span className="text-3xl">{c.icon}</span>
                    <span className="text-xs font-semibold">{c.label}</span>
                  </a>
                ))}
              </div>
            </section>

            {/* Flash deals banner */}
            <section className="mx-auto max-w-7xl px-4 sm:px-6 pb-4">
              <div className="rounded-3xl bg-gradient-to-r from-orange-500 to-rose-500 p-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-white">
                <div>
                  <p className="text-sm font-semibold opacity-80 mb-1">⚡ Limited Time</p>
                  <h3 className="text-2xl font-black">Flash Deals – Ends Tonight</h3>
                  <p className="text-sm opacity-80 mt-1">Save up to 60% on select tech, fashion, and home items.</p>
                </div>
                <a href="products.html" className="shrink-0 bg-white text-orange-600 font-bold px-6 py-3 rounded-xl hover:bg-orange-50 transition-colors">Claim Deals</a>
              </div>
            </section>

            {/* Featured Products */}
            <section className="mx-auto max-w-7xl px-4 sm:px-6 py-10">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-black text-ink">Trending Now</h2>
                <a href="products.html" className="text-sm text-brand font-semibold hover:underline">View all →</a>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                {FEATURED.map(p => <ProductCard key={p.name} {...p} />)}
              </div>
            </section>

            {/* Newsletter */}
            <section className="bg-stone-900 text-white mx-0 mt-0">
              <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12 flex flex-col sm:flex-row items-center gap-6 justify-between">
                <div>
                  <h3 className="text-xl font-black">Get the best deals first</h3>
                  <p className="text-stone-400 text-sm mt-1">Join 2 million shoppers. Unsubscribe anytime.</p>
                </div>
                <div className="flex w-full sm:w-auto gap-2">
                  <input className="flex-1 sm:w-72 bg-stone-800 border border-stone-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder:text-stone-500 outline-none focus:border-brand" placeholder="Enter your email" />
                  <button className="bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2.5 rounded-xl whitespace-nowrap transition-colors">Subscribe</button>
                </div>
              </div>
            </section>
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
  </script>
</body>
</html>
