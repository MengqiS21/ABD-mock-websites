<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora – Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#f97316", dark: "#ea580c", light: "#fff7ed" },
            ink: "#1c1917"
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50 font-sans text-ink antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV = [
      { href: "index.html", label: "Home" },
      { href: "products.html", label: "Shop" },
      { href: "product.html", label: "Product" },
      { href: "cart.html", label: "Cart" },
      { href: "account.html", label: "Account" },
    ];

    function Header({ active = "products.html" }) {
      const [searchVal, setSearchVal] = useState("");
      return (
        <header className="sticky top-0 z-30 bg-white shadow-sm">
          <div className="bg-ink text-white text-xs py-1.5 text-center tracking-wide">
            Free shipping on orders over $50 &mdash; Use code <span className="font-bold text-orange-400">NEXORA10</span> for 10% off
          </div>
          <div className="mx-auto flex max-w-7xl items-center gap-4 px-4 py-3 sm:px-6">
            <a href="index.html" className="flex items-center gap-1.5 shrink-0">
              <span className="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-black text-sm">N</span>
              <span className="text-xl font-black tracking-tight text-ink">nexora</span>
            </a>
            <div className="flex-1 flex items-center gap-2 rounded-xl border-2 border-stone-200 bg-stone-50 px-3 py-2 focus-within:border-brand transition-colors">
              <svg className="w-4 h-4 text-stone-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
              <input className="flex-1 bg-transparent text-sm outline-none placeholder:text-stone-400" placeholder="Search millions of products…" value={searchVal} onChange={e => setSearchVal(e.target.value)} />
            </div>
            <nav className="hidden md:flex items-center gap-1">
              {NAV.map(n => (
                <a key={n.href} href={n.href} className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${active === n.href ? "bg-brand text-white" : "text-stone-600 hover:bg-stone-100"}`}>{n.label}</a>
              ))}
            </nav>
            <a href="cart.html" className="relative shrink-0">
              <svg className="w-6 h-6 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 7h13M7 13H5.4M10 21a1 1 0 1 0 2 0M17 21a1 1 0 1 0 2 0"/></svg>
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-brand text-white text-[10px] font-bold flex items-center justify-center">3</span>
            </a>
          </div>
          <div className="border-t border-stone-100 overflow-x-auto">
            <div className="mx-auto max-w-7xl flex gap-0 px-4 sm:px-6">
              {["Electronics","Fashion","Home & Garden","Sports","Beauty","Books","Toys","Automotive","Health","Food"].map(cat => (
                <a key={cat} href="products.html" className="whitespace-nowrap px-4 py-2.5 text-xs font-medium text-stone-500 hover:text-brand hover:border-b-2 hover:border-brand transition-colors">{cat}</a>
              ))}
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="mt-16 bg-ink text-stone-400">
          <div className="mx-auto max-w-7xl px-4 sm:px-6 py-12 grid grid-cols-2 md:grid-cols-4 gap-8">
            {[
              { title: "Shop", links: ["New Arrivals","Best Sellers","Deals","Gift Cards"] },
              { title: "Support", links: ["Help Center","Returns","Track Order","Shipping Info"] },
              { title: "Company", links: ["About Us","Careers","Press","Affiliates"] },
              { title: "Legal", links: ["Privacy Policy","Terms of Use","Cookie Settings","Accessibility"] },
            ].map(col => (
              <div key={col.title}>
                <p className="text-white font-semibold text-sm mb-3">{col.title}</p>
                <ul className="space-y-2">{col.links.map(l => <li key={l}><a href="#" className="text-xs hover:text-white transition-colors">{l}</a></li>)}</ul>
              </div>
            ))}
          </div>
          <div className="border-t border-stone-800">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2">
              <span className="text-xs">© 2026 Nexora Marketplace. All rights reserved.</span>
              <div className="flex gap-3">{["Visa","Mastercard","PayPal","Apple Pay"].map(p => <span key={p} className="text-[10px] bg-stone-800 px-2 py-1 rounded text-stone-300">{p}</span>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    function StarRating({ rating = 4.5, count = 0 }) {
      return (
        <div className="flex items-center gap-1">
          <div className="flex">
            {[1,2,3,4,5].map(s => (
              <svg key={s} className={`w-3.5 h-3.5 ${s <= Math.round(rating) ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            ))}
          </div>
          {count > 0 && <span className="text-xs text-stone-500">({count.toLocaleString()})</span>}
        </div>
      );
    }

    const PRODUCTS = [
      { id:1, name:"AirPods Pro Wireless Earbuds", price:"$199", originalPrice:"$249", rating:4.8, reviews:12483, badge:"Sale", cat:"Electronics", image:"https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?auto=format&fit=crop&w=600&q=80" },
      { id:2, name:"Mechanical Gaming Keyboard RGB", price:"$89", rating:4.6, reviews:3291, badge:"New", cat:"Electronics", image:"https://images.unsplash.com/photo-1587829741301-dc798b83add3?auto=format&fit=crop&w=600&q=80" },
      { id:3, name:"4K Webcam with Ring Light", price:"$64", originalPrice:"$80", rating:4.4, reviews:876, badge:"Sale", cat:"Electronics", image:"https://images.unsplash.com/photo-1596558450255-7c0b7be9d56a?auto=format&fit=crop&w=600&q=80" },
      { id:4, name:"Minimalist Leather Wallet", price:"$38", rating:4.7, reviews:5104, cat:"Fashion", image:"https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&w=600&q=80" },
      { id:5, name:"Bamboo Desk Organiser Set", price:"$29", rating:4.5, reviews:2318, badge:"New", cat:"Home", image:"https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?auto=format&fit=crop&w=600&q=80" },
      { id:6, name:"Premium Yoga Mat 6mm", price:"$45", originalPrice:"$60", rating:4.9, reviews:8762, badge:"Sale", cat:"Sports", image:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=600&q=80" },
      { id:7, name:"Smart LED Desk Lamp Touch Control", price:"$55", rating:4.6, reviews:1543, cat:"Home", image:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?auto=format&fit=crop&w=600&q=80" },
      { id:8, name:"Insulated 40oz Travel Tumbler", price:"$32", rating:4.8, reviews:9234, cat:"Home", image:"https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?auto=format&fit=crop&w=600&q=80" },
      { id:9, name:"Running Shoes Lightweight Mesh", price:"$79", originalPrice:"$110", rating:4.5, reviews:4320, badge:"Sale", cat:"Sports", image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80" },
      { id:10, name:"Stainless Steel Watch Automatic", price:"$220", rating:4.7, reviews:1890, cat:"Fashion", image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80" },
      { id:11, name:"Portable Bluetooth Speaker IPX7", price:"$59", rating:4.6, reviews:6210, cat:"Electronics", image:"https://images.unsplash.com/photo-1589003077984-894e133dabab?auto=format&fit=crop&w=600&q=80" },
      { id:12, name:"Skincare Vitamin C Serum 30ml", price:"$28", rating:4.8, reviews:7540, badge:"New", cat:"Beauty", image:"https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=600&q=80" },
    ];

    const SORT_OPTIONS = ["Relevance","Price: Low to High","Price: High to Low","Best Rating","Most Reviews","Newest"];
    const CATEGORIES_FILTER = ["All","Electronics","Fashion","Home","Sports","Beauty"];

    function ProductsPage() {
      const [selectedCat, setSelectedCat] = useState("All");
      const [sortBy, setSortBy] = useState("Relevance");
      const [priceRange, setPriceRange] = useState([0, 300]);
      const [minRating, setMinRating] = useState(0);
      const [viewMode, setViewMode] = useState("grid");

      const filtered = PRODUCTS
        .filter(p => selectedCat === "All" || p.cat === selectedCat)
        .filter(p => p.rating >= minRating);

      return (
        <>
          <Header active="products.html" />
          <main className="mx-auto max-w-7xl px-4 sm:px-6 py-6">
            {/* Breadcrumb */}
            <nav className="text-xs text-stone-400 mb-4 flex gap-1.5 items-center">
              <a href="index.html" className="hover:text-brand">Home</a>
              <span>/</span>
              <span className="text-ink font-medium">Shop</span>
            </nav>

            <div className="flex gap-6">
              {/* Sidebar */}
              <aside className="hidden lg:block w-56 shrink-0">
                <div className="bg-white rounded-2xl border border-stone-100 p-4 space-y-6 sticky top-28">
                  <div>
                    <p className="text-sm font-bold mb-2 text-ink">Category</p>
                    <div className="space-y-1">
                      {CATEGORIES_FILTER.map(c => (
                        <button key={c} onClick={() => setSelectedCat(c)}
                          className={`w-full text-left text-sm px-3 py-1.5 rounded-lg transition-colors ${selectedCat === c ? "bg-brand/10 text-brand font-semibold" : "text-stone-600 hover:bg-stone-50"}`}>
                          {c}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <p className="text-sm font-bold mb-2 text-ink">Min. Rating</p>
                    <div className="space-y-1">
                      {[0,3,4,4.5].map(r => (
                        <button key={r} onClick={() => setMinRating(r)}
                          className={`w-full text-left text-sm px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors ${minRating === r ? "bg-brand/10 text-brand font-semibold" : "text-stone-600 hover:bg-stone-50"}`}>
                          {r === 0 ? "All ratings" : <><span>{"⭐".repeat(Math.floor(r))}</span><span>& up</span></>}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <p className="text-sm font-bold mb-3 text-ink">Price Range</p>
                    <div className="flex items-center gap-2 text-xs text-stone-500">
                      <span className="bg-stone-100 px-2 py-1 rounded">$0</span>
                      <div className="flex-1 h-1 bg-stone-200 rounded"><div className="h-full w-1/2 bg-brand rounded" /></div>
                      <span className="bg-stone-100 px-2 py-1 rounded">$300</span>
                    </div>
                  </div>
                  <div>
                    <p className="text-sm font-bold mb-2 text-ink">Availability</p>
                    {["In Stock","Ships Today","Free Shipping"].map(opt => (
                      <label key={opt} className="flex items-center gap-2 text-sm text-stone-600 py-1 cursor-pointer">
                        <input type="checkbox" className="accent-brand rounded" />{opt}
                      </label>
                    ))}
                  </div>
                </div>
              </aside>

              {/* Main content */}
              <div className="flex-1 min-w-0">
                {/* Toolbar */}
                <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
                  <div>
                    <h1 className="text-lg font-black text-ink">{selectedCat === "All" ? "All Products" : selectedCat}</h1>
                    <p className="text-xs text-stone-400">{filtered.length} products found</p>
                  </div>
                  <div className="flex items-center gap-3">
                    <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                      className="text-sm border border-stone-200 rounded-lg px-3 py-2 bg-white outline-none focus:border-brand cursor-pointer">
                      {SORT_OPTIONS.map(o => <option key={o}>{o}</option>)}
                    </select>
                    <div className="flex gap-1 bg-stone-100 p-1 rounded-lg">
                      <button onClick={() => setViewMode("grid")} className={`p-1.5 rounded ${viewMode === "grid" ? "bg-white shadow-sm" : ""}`}>
                        <svg className="w-4 h-4 text-stone-600" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zm6-6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zm0 8a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                      </button>
                      <button onClick={() => setViewMode("list")} className={`p-1.5 rounded ${viewMode === "list" ? "bg-white shadow-sm" : ""}`}>
                        <svg className="w-4 h-4 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                      </button>
                    </div>
                  </div>
                </div>

                {/* Category pills (mobile) */}
                <div className="flex gap-2 overflow-x-auto pb-2 mb-4 lg:hidden">
                  {CATEGORIES_FILTER.map(c => (
                    <button key={c} onClick={() => setSelectedCat(c)}
                      className={`whitespace-nowrap text-xs px-3 py-1.5 rounded-full font-medium transition-colors ${selectedCat === c ? "bg-brand text-white" : "bg-white border border-stone-200 text-stone-600"}`}>
                      {c}
                    </button>
                  ))}
                </div>

                {/* Grid or List */}
                {viewMode === "grid" ? (
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    {filtered.map(p => (
                      <a key={p.id} href="product.html" className="group flex flex-col bg-white rounded-2xl overflow-hidden border border-stone-100 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                        <div className="relative aspect-square bg-stone-50 overflow-hidden">
                          <img src={p.image} alt={p.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                          {p.badge && <span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full ${p.badge === "Sale" ? "bg-red-500 text-white" : "bg-emerald-500 text-white"}`}>{p.badge}</span>}
                        </div>
                        <div className="p-3 flex flex-col gap-1 flex-1">
                          <p className="text-xs text-stone-400 font-medium">{p.cat}</p>
                          <p className="text-sm font-semibold text-ink leading-snug line-clamp-2">{p.name}</p>
                          <div className="flex items-center gap-1">
                            {[1,2,3,4,5].map(s => <svg key={s} className={`w-3 h-3 ${s <= Math.round(p.rating) ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}
                            <span className="text-xs text-stone-500">({p.reviews.toLocaleString()})</span>
                          </div>
                          <div className="mt-auto pt-2 flex items-center justify-between">
                            <div className="flex items-baseline gap-1.5">
                              <span className="font-bold text-ink">{p.price}</span>
                              {p.originalPrice && <span className="text-xs text-stone-400 line-through">{p.originalPrice}</span>}
                            </div>
                            <button className="text-xs bg-brand text-white px-2.5 py-1 rounded-lg font-medium">Add</button>
                          </div>
                        </div>
                      </a>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-3">
                    {filtered.map(p => (
                      <a key={p.id} href="product.html" className="group flex gap-4 bg-white rounded-2xl border border-stone-100 p-4 hover:shadow-md transition-all">
                        <div className="w-24 h-24 shrink-0 rounded-xl overflow-hidden bg-stone-50">
                          <img src={p.image} alt={p.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-xs text-stone-400 mb-0.5">{p.cat}</p>
                          <p className="font-semibold text-ink line-clamp-1">{p.name}</p>
                          <div className="flex items-center gap-1 mt-1">
                            {[1,2,3,4,5].map(s => <svg key={s} className={`w-3 h-3 ${s <= Math.round(p.rating) ? "text-amber-400" : "text-stone-300"}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>)}
                            <span className="text-xs text-stone-500">({p.reviews.toLocaleString()})</span>
                          </div>
                          <p className="text-xs text-stone-400 mt-1">Free shipping · In stock</p>
                        </div>
                        <div className="flex flex-col items-end justify-between shrink-0">
                          <div className="text-right">
                            <p className="font-bold text-ink">{p.price}</p>
                            {p.originalPrice && <p className="text-xs text-stone-400 line-through">{p.originalPrice}</p>}
                          </div>
                          <button className="bg-brand text-white text-sm font-medium px-4 py-1.5 rounded-xl">Add to Cart</button>
                        </div>
                      </a>
                    ))}
                  </div>
                )}

                {/* Pagination */}
                <div className="flex items-center justify-center gap-1 mt-8">
                  {[1,2,3,"...",8,9].map((p, i) => (
                    <button key={i} className={`w-9 h-9 rounded-lg text-sm font-medium transition-colors ${p === 1 ? "bg-brand text-white" : "bg-white border border-stone-200 text-stone-600 hover:bg-stone-50"}`}>{p}</button>
                  ))}
                </div>
              </div>
            </div>
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ProductsPage />);
  </script>
</body>
</html>
