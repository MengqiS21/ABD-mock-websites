function EligibilityChecker() {
  const [answers, setAnswers] = useState({ resident: null, income: null, household: null });
  const [result, setResult] = useState(null);

  const allAnswered = Object.values(answers).every(v => v !== null);

  function check() {
    const programs = [];
    if (answers.resident === "yes") {
      if (answers.income === "low" || answers.income === "very-low") programs.push("CalFresh / SNAP", "Medi-Cal", "LIHEAP Utility Assistance");
      if (answers.income === "very-low") programs.push("Emergency Housing Assistance", "CalWORKs Cash Assistance");
      if (answers.household === "children") programs.push("CalWORKs Cash Assistance", "CalFresh / SNAP");
      if (answers.household === "seniors") programs.push("Senior Services Support", "Medi-Cal");
    }
    setResult(answers.resident === "no" ? [] : [...new Set(programs)]);
  }

  const Q = [
    {
      key:"resident",
      q:"Are you a current Westfield County resident?",
      opts:[["yes","Yes"],["no","No"]],
    },
    {
      key:"income",
      q:"What is your approximate household income level?",
      opts:[["very-low","Very low (below $25k/year)"],["low","Low-moderate ($25k–$55k)"],["moderate","Moderate ($55k+)"]],
    },
    {
      key:"household",
      q:"Does your household include any of the following?",
      opts:[["children","Children under 18"],["seniors","Adults 65+ or with disabilities"],["neither","Neither"]],
    },
  ];

  return (
    <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden">
      <div className="bg-blue-700 px-6 py-4">
        <h3 className="text-white font-bold text-base">Benefits Eligibility Screener</h3>
        <p className="text-blue-200 text-sm mt-0.5">Answer 3 quick questions to see which programs may apply to you.</p>
      </div>
      <div className="p-6 space-y-5">
        {Q.map(({ key, q, opts }) => (
          <div key={key}>
            <p className="text-sm font-semibold text-slate-700 mb-2">{q}</p>
            <div className="flex flex-wrap gap-2">
              {opts.map(([val, label]) => (
                <button key={val} onClick={() => { setAnswers(a => ({ ...a, [key]: val })); setResult(null); }}
                  className={`px-3.5 py-2 rounded-lg text-sm border font-medium transition-colors ${answers[key] === val ? "bg-blue-700 text-white border-blue-700" : "bg-white text-slate-600 border-slate-300 hover:border-blue-400"}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        ))}

        {allAnswered && !result && (
          <button onClick={check} className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-xl text-sm transition-colors">
            Check My Eligibility →
          </button>
        )}

        {result !== null && (
          <div className={`rounded-xl p-4 ${result.length > 0 ? "bg-emerald-50 border border-emerald-200" : "bg-slate-50 border border-slate-200"}`}>
            {result.length > 0 ? (
              <>
                <p className="text-emerald-800 font-semibold text-sm mb-2">You may qualify for {result.length} program{result.length !== 1 ? "s" : ""}:</p>
                <ul className="space-y-1">
                  {result.map(p => (
                    <li key={p} className="flex items-center gap-2 text-sm text-emerald-700">
                      <svg className="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>
                      {p}
                    </li>
                  ))}
                </ul>
                <p className="text-xs text-emerald-700 mt-3">This is an estimate only. Contact our office to confirm eligibility and apply.</p>
              </>
            ) : (
              <p className="text-slate-600 text-sm">Based on your answers, you may not qualify for county assistance programs. Contact us at (559) 555-0300 — a case worker can identify additional state or federal options.</p>
            )}
            <button onClick={() => { setAnswers({ resident: null, income: null, household: null }); setResult(null); }}
              className="mt-3 text-xs text-blue-700 hover:underline font-semibold">Start over</button>
          </div>
        )}
      </div>
    </div>
  );
}

                </div>
              </div>

              {/* Program cards */}
              <div>
                <h2 className="text-lg font-bold text-slate-900 mb-4">Available Programs</h2>
                <div className="space-y-3">
                  {PROGRAMS.map(prog => (
                    <div key={prog.name} className={`border ${prog.color} rounded-xl p-5 hover:shadow-sm transition-all`}>
                      <div className="flex items-start gap-4">
                        <span className="text-3xl shrink-0">{prog.icon}</span>
                        <div className="flex-1 min-w-0">
                          <div className="flex flex-wrap items-center gap-2 mb-1.5">
                            <h3 className="font-bold text-slate-800">{prog.name}</h3>
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${prog.badge}`}>Online Available</span>
                          </div>
                          <p className="text-sm text-slate-600 leading-relaxed mb-3">{prog.desc}</p>
                          <div className="grid sm:grid-cols-3 gap-2 text-xs">
                            <div className="bg-white bg-opacity-70 rounded-lg px-3 py-2">
                              <p className="text-slate-500 uppercase tracking-wide text-[10px] font-semibold mb-0.5">Eligibility</p>
                              <p className="text-slate-700">{prog.eligibility}</p>
                            </div>
                            <div className="bg-white bg-opacity-70 rounded-lg px-3 py-2">
                              <p className="text-slate-500 uppercase tracking-wide text-[10px] font-semibold mb-0.5">Benefit Amount</p>
                              <p className="text-slate-700 font-semibold">{prog.amount}</p>
                            </div>
                            <div className="bg-white bg-opacity-70 rounded-lg px-3 py-2">
                              <p className="text-slate-500 uppercase tracking-wide text-[10px] font-semibold mb-0.5">Processing Time</p>
                              <p className="text-slate-700">{prog.time}</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {activeTab === "apply" && (
            <div className="space-y-6">
              <p className="text-slate-600 leading-relaxed">Most county benefits can be applied for online, by phone, or in person. The steps below apply to most programs. Some state-administered programs (CalFresh, Medi-Cal, CalWORKs) use the statewide BenefitsCal portal.</p>

              <div className="space-y-0">
                {STEPS.map((step, i) => (
                  <div key={step.num} className="flex gap-5 pb-8 last:pb-0 relative">
                    {i < STEPS.length - 1 && <div className="absolute left-[17px] top-10 bottom-0 w-0.5 bg-slate-200" />}
                    <div className="shrink-0">
                      <div className="w-9 h-9 rounded-full bg-blue-700 text-white font-bold text-sm flex items-center justify-center relative z-10">{step.num}</div>
                    </div>
                    <div className="flex-1 pt-1.5">
                      <h3 className="font-bold text-slate-800 mb-1.5">{step.title}</h3>
                      <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
                    </div>
                  </div>
                ))}
              </div>

              {/* Documents */}
              <div className="bg-white border border-slate-200 rounded-xl p-5">
                <h3 className="font-bold text-slate-800 mb-3">Common Documents Needed</h3>
                <div className="grid sm:grid-cols-2 gap-2">
                  {["Government-issued photo ID (driver's license, passport)","Proof of Westfield County residency (utility bill, lease)","Social Security numbers for all household members","Past 3 months' pay stubs or proof of income","Recent bank statements (last 30–60 days)","Utility bills (for LIHEAP energy assistance)","Lease or mortgage statement","Birth certificates for children in household"].map((doc, i) => (
                    <div key={i} className="flex items-start gap-2 text-sm">
                      <div className="w-5 h-5 rounded bg-blue-100 flex items-center justify-center shrink-0 mt-0.5">
                        <svg className="w-3 h-3 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <span className="text-slate-700">{doc}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-blue-700 rounded-2xl p-6 text-white text-center">
                <h3 className="text-xl font-bold mb-2">Ready to Apply?</h3>
                <p className="text-blue-200 text-sm mb-5">Apply online through BenefitsCal, call us at (559) 555-0300, or visit the Human Services Building (Mon–Fri, 8 AM–5 PM).</p>
                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                  <button className="bg-white text-blue-700 font-bold px-6 py-3 rounded-xl hover:bg-blue-50 transition-colors text-sm">Apply via BenefitsCal</button>
                  <a href="contact.html" className="bg-blue-600 text-white border border-blue-500 font-semibold px-6 py-3 rounded-xl hover:bg-blue-500 transition-colors text-sm">Schedule an Appointment</a>
                </div>
              </div>
            </div>
          )}

          {activeTab === "eligibility" && (
            <div className="space-y-6">
              <p className="text-slate-600 leading-relaxed">Eligibility varies by program and is based on factors including income, household composition, residency, and citizenship/immigration status. Use the screener below for a quick estimate.</p>

              <EligibilityChecker />

              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex gap-3">
                <svg className="w-5 h-5 text-amber-600 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd"/></svg>
                <div>
                  <p className="text-sm font-semibold text-amber-900">About the screener</p>
                  <p className="text-sm text-amber-800 mt-0.5">This tool provides a general estimate only and does not guarantee eligibility. Official determination is made by a case worker after a complete application review.</p>
                </div>
              </div>

              {/* Income table */}
              <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                <div className="px-5 py-4 border-b border-slate-100">
                  <h3 className="font-bold text-slate-800">2026 Income Eligibility Guidelines</h3>
                  <p className="text-xs text-slate-500 mt-0.5">Based on Federal Poverty Level (FPL). Updated January 1, 2026.</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-50 text-xs font-semibold text-slate-600 uppercase tracking-wide">
                      <tr>
                        <th className="px-5 py-3 text-left">Household Size</th>
                        <th className="px-5 py-3 text-right">100% FPL (Annual)</th>
                        <th className="px-5 py-3 text-right">138% FPL (Medi-Cal)</th>
                        <th className="px-5 py-3 text-right">200% FPL (CalFresh)</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {[[1,"$15,060","$20,783","$30,120"],[2,"$20,440","$28,207","$40,880"],[3,"$25,820","$35,632","$51,640"],[4,"$31,200","$43,056","$62,400"],[5,"$36,580","$50,480","$73,160"],[6,"$41,960","$57,905","$83,920"]].map(([size, p100, p138, p200]) => (
                        <tr key={size} className="hover:bg-slate-50">
                          <td className="px-5 py-3 font-medium text-slate-700">{size} person{size > 1 ? "s" : ""}</td>
                          <td className="px-5 py-3 text-right text-slate-600">{p100}</td>
                          <td className="px-5 py-3 text-right text-slate-600">{p138}</td>
                          <td className="px-5 py-3 text-right text-slate-600">{p200}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {activeTab === "faq" && (
            <div className="space-y-3">
              {FAQS.map(item => <AccordionItem key={item.q} question={item.q} answer={item.a} />)}
            </div>
          )}

          {/* Page feedback */}
          <div className="mt-10 pt-6 border-t border-slate-200">
            <p className="text-sm font-semibold text-slate-700 mb-3">Was this page helpful?</p>
            <div className="flex gap-3">
              {[["👍 Yes", "yes"], ["👎 No", "no"]].map(([label, val]) => (
                <button key={val} onClick={() => setHelpful(val)}
                  className={`px-4 py-2 rounded-lg text-sm font-medium border transition-colors ${helpful === val ? "bg-blue-700 text-white border-blue-700" : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"}`}>
                  {label}
                </button>
              ))}
            </div>
            {helpful && <p className="text-xs text-emerald-700 mt-2 font-medium">Thank you for your feedback!</p>}
          </div>
        </main>

        {/* Sidebar */}
        <aside className="lg:w-72 shrink-0 space-y-4">
          {/* Apply CTA */}
          <div className="bg-blue-700 text-white rounded-2xl p-5">
            <h3 className="font-bold text-base mb-1.5">Apply for Benefits</h3>
            <p className="text-blue-200 text-xs mb-4 leading-relaxed">Apply online, by phone, or in person. Our staff can help you navigate the process.</p>
            <button className="w-full bg-white text-blue-700 font-bold py-2.5 rounded-xl hover:bg-blue-50 transition-colors text-sm mb-2">Apply via BenefitsCal</button>
            <p className="text-center text-xs text-blue-200">Office: Mon–Fri, 8:00 AM–5:00 PM</p>
          </div>

          {/* Check case status */}
          <div className="bg-white border border-slate-200 rounded-2xl p-5">
            <h3 className="font-bold text-slate-800 mb-3">Check Case Status</h3>
            <input className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 mb-2" placeholder="Enter case or reference number" />
            <button className="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">Check Status</button>
          </div>

          {/* Contact */}
          <div className="bg-white border border-slate-200 rounded-2xl p-5 space-y-3">
            <h3 className="font-bold text-slate-800">Contact Human Services</h3>
            {[["📍","Human Services Building\n300 Oak Street, Westfield"],["📞","(559) 555-0300"],["✉️","benefits@westfieldcounty.gov"],["🕐","Mon–Fri: 8:00 AM – 5:00 PM"]].map(([icon, info]) => (
              <div key={info} className="flex gap-2.5 text-sm">
                <span className="shrink-0">{icon}</span>
                <span className="text-slate-600 whitespace-pre-line">{info}</span>
              </div>
            ))}
            <a href="contact.html" className="block text-center mt-1 text-sm text-blue-700 hover:underline font-semibold">Send a message →</a>
          </div>

          {/* Language services */}
          <div className="bg-slate-50 border border-slate-200 rounded-2xl p-5">
            <h3 className="font-bold text-slate-800 mb-2 text-sm">Language Services</h3>
            <p className="text-xs text-slate-600 leading-relaxed mb-3">Free interpreter services available in person and by phone. Se habla español. Tiếng Việt. 中文. Hmong. Punjabi.</p>
            <div className="flex items-center gap-2 text-xs text-blue-700 font-semibold">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
              <span>20+ languages supported</span>
            </div>
          </div>

          {/* Related */}
          <div className="bg-white border border-slate-200 rounded-2xl p-5">
            <h3 className="font-bold text-slate-800 mb-3">Related Services</h3>
            <div className="space-y-2">
              {[["Permits & Licensing","permits.html"],["Public Health","services.html"],["Senior Services","services.html"],["Employment Help","services.html"]].map(([label, href]) => (
                <a key={label} href={href} className="flex items-center justify-between text-sm text-blue-700 hover:underline py-1.5 border-b border-slate-100 last:border-0">
                  <span>{label}</span>
                  <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                </a>
              ))}
            </div>
          </div>
        </aside>
      </div>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BenefitsPage />);
</script>
</body>
</html>
