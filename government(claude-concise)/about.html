                      <div className="shrink-0 w-10 h-10 rounded-full bg-blue-700 text-white font-bold text-xs flex items-center justify-center relative z-10 leading-tight text-center">{m.year}</div>
                      <div className="flex-1 pb-2 pt-1.5">
                        <p className="text-sm text-slate-700 leading-relaxed">{m.event}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-slate-100 rounded-xl p-5 text-sm text-slate-700">
                <p className="font-semibold mb-1">Historical Archives</p>
                <p className="leading-relaxed">Historical records, county ordinances, and archival documents are maintained by the Assessor-Recorder-Clerk's Office and the Westfield County Library Special Collections. Public records requests can be submitted through the <a href="contact.html" className="text-blue-700 underline">Contact page</a>.</p>
              </div>
            </div>
          )}

          {activeSection === "transparency" && (
            <div className="space-y-6">
              <div>
                <h2 className="text-xl font-bold text-slate-900 mb-1">Transparency & Accountability</h2>
                <p className="text-slate-600 text-sm leading-relaxed">Westfield County is committed to open government. We publish financial data, performance metrics, and meeting records to help residents understand how public funds are spent and how decisions are made.</p>
              </div>
              <div className="grid sm:grid-cols-2 gap-4">
                {[
                  { icon:"📊", title:"Annual Budget", desc:"Published each July. FY2026 adopted budget: $890M. Full line-item detail available online.", link:"View FY2026 Budget" },
                  { icon:"📋", title:"Audited Financial Reports", desc:"Independent audits conducted annually. Comprehensive Annual Financial Report (CAFR) published each December.", link:"View CAFR" },
                  { icon:"📰", title:"Board Meeting Minutes", desc:"Full agendas, meeting packets, and approved minutes published within 5 days of each meeting.", link:"View Meeting Records" },
                  { icon:"📂", title:"Public Records (CPRA)", desc:"California Public Records Act requests processed within 10 business days. Submit requests online or in person.", link:"Submit a CPRA Request" },
                  { icon:"🔍", title:"Open Data Portal", desc:"Datasets on county services, budgets, permits, and demographics available for public download.", link:"Explore Open Data" },
                  { icon:"📣", title:"Performance Dashboard", desc:"Key performance indicators tracked across all departments, updated quarterly.", link:"View Dashboard" },
                ].map(item => (
                  <div key={item.title} className="bg-white border border-slate-200 rounded-xl p-5">
                    <p className="text-2xl mb-3">{item.icon}</p>
                    <h3 className="font-bold text-slate-800 text-sm mb-1.5">{item.title}</h3>
                    <p className="text-xs text-slate-600 leading-relaxed mb-3">{item.desc}</p>
                    <a href="#" className="text-blue-700 text-xs font-semibold hover:underline">{item.link} →</a>
                  </div>
                ))}
              </div>
              <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 flex gap-3">
                <svg className="w-5 h-5 text-emerald-600 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/></svg>
                <div>
                  <p className="text-sm font-semibold text-emerald-900">Report Fraud, Waste, or Abuse</p>
                  <p className="text-sm text-emerald-800 mt-0.5">Contact the County Fraud Hotline at <strong>(559) 555-TIPS</strong> or submit an anonymous report online. All reports are investigated by the Internal Audit Division.</p>
                </div>
              </div>
            </div>
          )}

        </main>
      </div>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AboutPage />);
</script>
