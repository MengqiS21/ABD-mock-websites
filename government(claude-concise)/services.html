<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services – CivicGate | Westfield County</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gov: { DEFAULT:"#1a4480", dark:"#0d2b5e", mid:"#2563eb" } },
          fontFamily: { sans:["Inter","system-ui","sans-serif"] }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const NAV = [
  { label:"Home",     href:"index.html" },
  { label:"Services", href:"services.html" },
  { label:"About",    href:"about.html" },
  { label:"Contact",  href:"contact.html" },
];

function AlertBanner() {
  const [visible, setVisible] = useState(true);
  if (!visible) return null;
  return (
    <div className="bg-amber-50 border-b-2 border-amber-300" role="alert">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-2.5 flex items-start sm:items-center gap-3">
        <svg className="w-4 h-4 text-amber-600 shrink-0 mt-0.5 sm:mt-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
        <p className="text-sm text-amber-900 flex-1"><strong>Service Alert:</strong> Online permit portal maintenance Saturday, March 1, 2–4 AM. <a href="#" className="underline font-semibold">Details →</a></p>
        <button onClick={() => setVisible(false)} className="text-amber-600 hover:text-amber-900 shrink-0 transition-colors"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
    </div>
  );
}

function Header({ active }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  return (
    <header>
      <div className="bg-slate-900 border-b border-slate-700">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-1.5 flex items-center justify-between">
          <div className="flex items-center gap-1.5 text-xs text-slate-400">
            <svg className="w-3 h-3 text-blue-400 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clipRule="evenodd"/></svg>
            <span>Official government portal — Westfield County, California</span>
          </div>
          <div className="hidden sm:flex items-center gap-4 text-xs text-slate-400">
            <a href="#" className="hover:text-white transition-colors">Español</a>
            <a href="#" className="hover:text-white transition-colors">中文</a>
            <span className="text-slate-600">|</span>
            <a href="#" className="hover:text-white transition-colors">♿ Accessibility</a>
            <a href="#" className="bg-blue-700 hover:bg-blue-600 text-white px-2.5 py-1 rounded transition-colors font-medium">Resident Sign In</a>
          </div>
        </div>
      </div>
      <div className="bg-slate-800 shadow-md">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
          <a href="index.html" className="flex items-center gap-3 shrink-0">
            <div className="w-11 h-11 bg-blue-700 rounded-lg flex items-center justify-center">
              <svg className="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clipRule="evenodd"/></svg>
            </div>
            <div>
              <p className="text-white font-bold text-lg leading-tight">Westfield County</p>
              <p className="text-blue-300 text-xs">CivicGate Resident Portal</p>
            </div>
          </a>
          <nav className="hidden md:flex items-center gap-1">
            {NAV.map(item => (
              <a key={item.href} href={item.href} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${active === item.href ? "bg-blue-700 text-white" : "text-slate-200 hover:bg-slate-700 hover:text-white"}`}>{item.label}</a>
            ))}
          </nav>
          <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden text-slate-300 hover:text-white p-2 rounded-lg hover:bg-slate-700 transition-colors">
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={mobileOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"}/></svg>
          </button>
        </div>
        {mobileOpen && (
          <div className="md:hidden border-t border-slate-700 px-4 py-3 space-y-1">
            {NAV.map(item => <a key={item.href} href={item.href} className={`flex items-center px-3 py-2.5 rounded-lg text-sm font-medium ${active === item.href ? "bg-blue-700 text-white" : "text-slate-200 hover:bg-slate-700"}`}>{item.label}</a>)}
          </div>
        )}
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer className="bg-slate-900 text-slate-400 mt-16">
      <div className="bg-slate-800 border-b border-slate-700">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-start gap-3">
          <span className="text-blue-400 text-xl shrink-0">🏛️</span>
          <div><p className="text-sm text-white font-semibold">Official Website of Westfield County, California</p><p className="text-xs text-slate-400 mt-0.5">For emergencies call <strong className="text-slate-300">911</strong>. County non-emergency line: <strong className="text-slate-300">(559) 555-0100</strong>.</p></div>
        </div>
      </div>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10 grid grid-cols-2 md:grid-cols-4 gap-8">
        {[
          { title:"Services", links:[["Permits & Licensing","permits.html"],["Benefits & Assistance","benefits.html"],["Tax Payments","services.html"],["Public Safety","services.html"]] },
          { title:"Government", links:[["About Westfield County","about.html"],["County Board","about.html"],["Departments","about.html"],["Public Records","about.html"]] },
          { title:"Community", links:[["News & Alerts","#"],["Events Calendar","#"],["Parks & Recreation","#"],["Libraries","#"]] },
          { title:"Help", links:[["Contact Us","contact.html"],["FAQ","contact.html"],["Accessibility","#"],["Sitemap","#"]] },
        ].map(col => (
          <div key={col.title}><p className="text-white text-sm font-semibold mb-3 pb-2 border-b border-slate-700">{col.title}</p><ul className="space-y-2">{col.links.map(([label, href]) => <li key={label}><a href={href} className="text-xs hover:text-white transition-colors hover:underline">{label}</a></li>)}</ul></div>
        ))}
      </div>
      <div className="border-t border-slate-800"><div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-slate-500"><span>© 2026 Westfield County, California. All rights reserved.</span><div className="flex flex-wrap gap-3">{["Privacy Policy","Terms of Use","Accessibility Statement","Sitemap"].map(l => <a key={l} href="#" className="hover:text-slate-300">{l}</a>)}</div></div></div>
    </footer>
  );
}

function Breadcrumb({ items }) {
  return (
    <nav className="bg-white border-b border-slate-200" aria-label="Breadcrumb">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-2.5 flex items-center gap-1.5 text-sm flex-wrap">
        <a href="index.html" className="text-blue-700 hover:underline">Home</a>
        {items.map((item, i) => (
          <React.Fragment key={i}>
            <svg className="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            {item.href ? <a href={item.href} className="text-blue-700 hover:underline">{item.label}</a> : <span className="text-slate-500">{item.label}</span>}
          </React.Fragment>
        ))}
      </div>
    </nav>
  );
}

const ALL_SERVICES = [
  {
    category: "Permits & Licensing",
    icon: "🏗️",
    color: "border-blue-200 bg-blue-50",
    iconBg: "bg-blue-100",
    services: [
      { name:"Building Permit",          desc:"Residential and commercial construction",    online:true,  fee:"$150+",  time:"5–10 days", href:"permits.html" },
      { name:"Business License",         desc:"Start or renew your business license",       online:true,  fee:"$75–$500",time:"3–5 days",  href:"permits.html" },
      { name:"Special Event Permit",     desc:"Permits for public gatherings and events",   online:true,  fee:"$50",    time:"10 days",   href:"permits.html" },
      { name:"Pet License",              desc:"Annual registration for dogs and cats",      online:true,  fee:"$25",    time:"Same day",  href:"permits.html" },
      { name:"Food Handler Permit",      desc:"Health certification for food service",      online:false, fee:"$40",    time:"1 day",     href:"permits.html" },
      { name:"Sign Permit",              desc:"Outdoor and window signage approval",        online:false, fee:"$80",    time:"7 days",    href:"permits.html" },
    ]
  },
  {
    category: "Benefits & Assistance",
    icon: "🤲",
    color: "border-violet-200 bg-violet-50",
    iconBg: "bg-violet-100",
    services: [
      { name:"Emergency Rental Assistance",desc:"Help with rent if you're at risk of eviction",online:true,  fee:"Free",time:"3–7 days",  href:"benefits.html" },
      { name:"SNAP Food Benefits",         desc:"Monthly food assistance for eligible families",online:true, fee:"Free",time:"30 days",   href:"benefits.html" },
      { name:"Medi-Cal Enrollment",        desc:"Free or low-cost healthcare coverage",       online:true,  fee:"Free",time:"45 days",   href:"benefits.html" },
      { name:"Utility Assistance (HEAP)",  desc:"Help with electricity and gas bills",         online:true,  fee:"Free",time:"2 weeks",   href:"benefits.html" },
      { name:"CalWORKs",                   desc:"Cash aid and services for families with kids", online:false,fee:"Free",time:"45 days",   href:"benefits.html" },
      { name:"Childcare Subsidy",          desc:"Subsidised childcare for working parents",    online:true,  fee:"Free",time:"3–6 weeks", href:"benefits.html" },
    ]
  },
  {
    category: "Taxes & Payments",
    icon: "💰",
    color: "border-emerald-200 bg-emerald-50",
    iconBg: "bg-emerald-100",
    services: [
      { name:"Property Tax Payment",     desc:"Pay your annual property tax online",        online:true,  fee:"Varies",   time:"Immediate", href:"services.html" },
      { name:"Parking Citation Payment", desc:"Pay parking tickets and fines",              online:true,  fee:"Varies",   time:"Immediate", href:"services.html" },
      { name:"Utility Bill Payment",     desc:"Water, sewer, and sanitation charges",       online:true,  fee:"Varies",   time:"Immediate", href:"services.html" },
      { name:"Property Tax Appeal",      desc:"Contest your property tax assessment",       online:false, fee:"$30",      time:"60–90 days",href:"services.html" },
    ]
  },
  {
    category: "Public Safety",
    icon: "🚔",
    color: "border-rose-200 bg-rose-50",
    iconBg: "bg-rose-100",
    services: [
      { name:"Police Report Copy",       desc:"Request a copy of an official police report",online:true,  fee:"$15",      time:"5–7 days",  href:"services.html" },
      { name:"Alarm Permit",             desc:"Register your residential alarm system",     online:true,  fee:"$50",      time:"Same day",  href:"services.html" },
      { name:"Fingerprint Services",     desc:"Livescan fingerprinting for background checks",online:false,fee:"$25+",    time:"Immediate", href:"services.html" },
    ]
  },
  {
    category: "Voting & Elections",
    icon: "🗳️",
    color: "border-amber-200 bg-amber-50",
    iconBg: "bg-amber-100",
    services: [
      { name:"Voter Registration",       desc:"Register to vote in county and state elections",online:true,fee:"Free",  time:"Same day",   href:"services.html" },
      { name:"Vote by Mail Request",     desc:"Request a mail-in ballot for upcoming elections",online:true,fee:"Free",time:"7 days",     href:"services.html" },
      { name:"Polling Place Lookup",     desc:"Find your nearest polling location",          online:true,  fee:"Free",  time:"Immediate", href:"services.html" },
    ]
  },
];

function ServicesPage() {
  const [searchQuery, setSearchQuery] = useState("");
  const [activeCategory, setActiveCategory] = useState("All");

  const categories = ["All", ...ALL_SERVICES.map(s => s.category)];

  const filtered = ALL_SERVICES
    .filter(cat => activeCategory === "All" || cat.category === activeCategory)
    .map(cat => ({
      ...cat,
      services: cat.services.filter(s =>
        !searchQuery || s.name.toLowerCase().includes(searchQuery.toLowerCase()) || s.desc.toLowerCase().includes(searchQuery.toLowerCase())
      )
    }))
    .filter(cat => cat.services.length > 0);

  const totalCount = filtered.reduce((sum, cat) => sum + cat.services.length, 0);

  return (
    <>
      <AlertBanner />
      <Header active="services.html" />
      <Breadcrumb items={[{ label:"Services" }]} />

      {/* Page hero */}
      <div className="bg-gradient-to-r from-slate-800 to-blue-900 text-white">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10">
          <h1 className="text-3xl font-bold mb-2">County Services</h1>
          <p className="text-slate-300 mb-6">Find and access all Westfield County government services in one place.</p>
          <div className="flex gap-0 max-w-lg">
            <div className="flex-1 flex items-center bg-white rounded-l-xl px-3 gap-2">
              <svg className="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                className="flex-1 py-3 text-slate-900 bg-transparent outline-none text-sm placeholder:text-slate-400"
                placeholder="Search all services…" />
              {searchQuery && <button onClick={() => setSearchQuery("")} className="text-slate-400 hover:text-slate-600 text-sm">✕</button>}
            </div>
            <button className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-3 rounded-r-xl transition-colors text-sm">Search</button>
          </div>
        </div>
      </div>

      {/* Category filter tabs */}
      <div className="bg-white border-b border-slate-200 sticky top-0 z-10 overflow-x-auto">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-0">
          {categories.map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)}
              className={`shrink-0 px-4 py-3.5 text-sm font-semibold border-b-2 transition-colors ${activeCategory === cat ? "border-blue-700 text-blue-700" : "border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300"}`}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        {/* Result count */}
        <p className="text-sm text-slate-500 mb-6">
          Showing <strong className="text-slate-800">{totalCount} service{totalCount !== 1 ? "s" : ""}</strong>
          {searchQuery && <> for <em>"{searchQuery}"</em></>}
          {activeCategory !== "All" && <> in <strong className="text-slate-800">{activeCategory}</strong></>}
        </p>

        {filtered.length === 0 && (
          <div className="text-center py-16">
            <span className="text-4xl block mb-3">🔍</span>
            <p className="font-semibold text-slate-800">No services found</p>
            <p className="text-slate-500 text-sm mt-1">Try a different keyword or browse all categories.</p>
            <button onClick={() => { setSearchQuery(""); setActiveCategory("All"); }}
              className="mt-4 text-sm text-blue-700 hover:underline font-semibold">Clear filters</button>
          </div>
        )}

        <div className="space-y-10">
          {filtered.map(cat => (
            <section key={cat.category}>
              <div className={`flex items-center gap-3 mb-4 pb-3 border-b-2 border-slate-200`}>
                <div className={`w-9 h-9 rounded-lg ${cat.iconBg} flex items-center justify-center text-xl`}>{cat.icon}</div>
                <h2 className="text-lg font-bold text-slate-900">{cat.category}</h2>
                <span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full ml-auto">{cat.services.length} services</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {cat.services.map(s => (
                  <a key={s.name} href={s.href}
                    className="bg-white border border-slate-200 rounded-xl p-4 hover:border-blue-300 hover:shadow-sm transition-all group flex flex-col gap-2">
                    <div className="flex items-start justify-between gap-2">
                      <h3 className="font-semibold text-slate-800 text-sm group-hover:text-blue-700 transition-colors leading-snug">{s.name}</h3>
                      {s.online && (
                        <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full shrink-0 whitespace-nowrap">Online ✓</span>
                      )}
                    </div>
                    <p className="text-xs text-slate-500 leading-relaxed flex-1">{s.desc}</p>
                    <div className="flex items-center gap-3 pt-1.5 border-t border-slate-100 text-xs text-slate-400">
                      <span>Fee: <span className="font-semibold text-slate-600">{s.fee}</span></span>
                      <span className="text-slate-200">|</span>
                      <span>⏱ {s.time}</span>
                    </div>
                  </a>
                ))}
              </div>
            </section>
          ))}
        </div>
      </main>

      {/* Help CTA */}
      <section className="bg-blue-50 border-y border-blue-200 mt-8">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="flex items-start gap-3">
            <span className="text-3xl">💬</span>
            <div>
              <p className="font-bold text-slate-800">Can't find what you need?</p>
              <p className="text-sm text-slate-600 mt-0.5">Our team is available Monday–Friday, 8 AM–5 PM to assist you.</p>
            </div>
          </div>
          <div className="flex gap-3 shrink-0">
            <a href="contact.html" className="bg-blue-700 hover:bg-blue-800 text-white font-semibold px-5 py-2.5 rounded-lg text-sm transition-colors">Contact Us</a>
            <a href="tel:5595550100" className="bg-white hover:bg-slate-50 text-slate-800 border border-slate-300 font-semibold px-5 py-2.5 rounded-lg text-sm transition-colors">(559) 555-0100</a>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ServicesPage />);
</script>
</body>
</html>
