function ContactForm() {
  const [form, setForm] = useState({ name:"", email:"", phone:"", topic:"", message:"", preferred:"email" });
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});

  function validate() {
    const e = {};
    if (!form.name.trim()) e.name = "Name is required";
    if (!form.email.trim() || !form.email.includes("@")) e.email = "Valid email is required";
    if (!form.topic) e.topic = "Please select a topic";
    if (!form.message.trim() || form.message.trim().length < 10) e.message = "Please enter a message (minimum 10 characters)";
    return e;
  }

  function submit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});
    setSubmitted(true);
  }

  function set(field) { return v => setForm(f => ({ ...f, [field]: v })); }

  if (submitted) {
    return (
      <div className="bg-white border border-slate-200 rounded-2xl p-8 text-center">
        <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg className="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 className="text-xl font-bold text-slate-800 mb-2">Message Sent</h3>
        <p className="text-slate-600 text-sm leading-relaxed mb-1">Thank you, <strong>{form.name}</strong>. Your message has been received.</p>
        <p className="text-slate-600 text-sm leading-relaxed mb-5">We aim to respond within <strong>2 business days</strong>. Your reference number is <strong className="text-blue-700">#WC-{Math.floor(Math.random() * 90000) + 10000}</strong> — please save this for your records.</p>
        <button onClick={() => { setSubmitted(false); setForm({ name:"", email:"", phone:"", topic:"", message:"", preferred:"email" }); }}
          className="text-sm text-blue-700 hover:underline font-semibold">Send another message</button>
      </div>
    );
  }

  const Field = ({ label, error, children }) => (
    <div>
      <label className="block text-sm font-semibold text-slate-700 mb-1.5">{label}</label>
      {children}
      {error && <p className="text-xs text-red-600 mt-1">{error}</p>}
    </div>
  );

  return (
    <form onSubmit={submit} className="bg-white border border-slate-200 rounded-2xl p-6 space-y-5">
      <div className="grid sm:grid-cols-2 gap-5">
        <Field label="Full Name *" error={errors.name}>
          <input value={form.name} onChange={e => set("name")(e.target.value)}
            className={`w-full border rounded-lg px-3 py-2.5 text-sm outline-none transition-colors ${errors.name ? "border-red-400 focus:border-red-500" : "border-slate-300 focus:border-blue-500"}`}
            placeholder="Jane Smith" />
        </Field>
        <Field label="Email Address *" error={errors.email}>
          <input type="email" value={form.email} onChange={e => set("email")(e.target.value)}
            className={`w-full border rounded-lg px-3 py-2.5 text-sm outline-none transition-colors ${errors.email ? "border-red-400 focus:border-red-500" : "border-slate-300 focus:border-blue-500"}`}
            placeholder="jane@example.com" />
        </Field>
      </div>

      <div className="grid sm:grid-cols-2 gap-5">
        <Field label="Phone (optional)">
          <input type="tel" value={form.phone} onChange={e => set("phone")(e.target.value)}
            className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500"
            placeholder="(559) 555-0000" />
        </Field>
        <Field label="Topic *" error={errors.topic}>
          <select value={form.topic} onChange={e => set("topic")(e.target.value)}
            className={`w-full border rounded-lg px-3 py-2.5 text-sm outline-none bg-white transition-colors ${errors.topic ? "border-red-400 focus:border-red-500" : "border-slate-300 focus:border-blue-500"}`}>
            <option value="">Select a topic…</option>
            {CONTACT_TOPICS.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </Field>
      </div>

      <Field label="Message *" error={errors.message}>
        <textarea value={form.message} onChange={e => set("message")(e.target.value)} rows={5}
          className={`w-full border rounded-lg px-3 py-2.5 text-sm outline-none resize-none transition-colors ${errors.message ? "border-red-400 focus:border-red-500" : "border-slate-300 focus:border-blue-500"}`}
          placeholder="Describe your question or concern in detail…" />
        <p className="text-xs text-slate-400 mt-1">{form.message.length} characters</p>
      </Field>

      <Field label="Preferred contact method">
        <div className="flex gap-4">
          {[["email","Email"],["phone","Phone"]].map(([val, label]) => (
            <label key={val} className="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="preferred" value={val} checked={form.preferred === val} onChange={() => set("preferred")(val)} className="accent-blue-700" />
              <span className="text-sm text-slate-700">{label}</span>
            </label>
          ))}
        </div>
      </Field>

      <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs text-slate-500">
        Your information is collected solely to respond to your inquiry. It will not be shared with third parties. See our <a href="#" className="text-blue-700 underline">Privacy Policy</a>.
      </div>

      <button type="submit" className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-xl text-sm transition-colors">
        Send Message
      </button>
    </form>
  );
}

              <h2 className="text-xl font-bold text-slate-900">Department Directory</h2>
              <p className="text-sm text-slate-600 mt-0.5">Contact the specific department that handles your issue.</p>
            </div>
            <div className="relative">
              <svg className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={deptSearch} onChange={e => setDeptSearch(e.target.value)} placeholder="Search departments…"
                className="pl-9 pr-4 py-2.5 border border-slate-300 rounded-xl text-sm outline-none focus:border-blue-500 w-60" />
            </div>
          </div>
          <div className="overflow-x-auto rounded-2xl border border-slate-200">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 text-xs font-semibold text-slate-500 uppercase tracking-wide">
                <tr>
                  <th className="px-5 py-3 text-left">Department</th>
                  <th className="px-5 py-3 text-left">Phone</th>
                  <th className="px-5 py-3 text-left hidden md:table-cell">Email</th>
                  <th className="px-5 py-3 text-left hidden lg:table-cell">Hours</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 bg-white">
                {filteredDepts.length > 0 ? filteredDepts.map(dept => (
                  <tr key={dept.name} className="hover:bg-slate-50">
                    <td className="px-5 py-3 font-medium text-slate-800">{dept.name}</td>
                    <td className="px-5 py-3 text-slate-600"><a href={`tel:${dept.phone}`} className="hover:text-blue-700 hover:underline">{dept.phone}</a></td>
                    <td className="px-5 py-3 text-slate-600 hidden md:table-cell"><a href={`mailto:${dept.email}`} className="hover:text-blue-700 hover:underline">{dept.email}</a></td>
                    <td className="px-5 py-3 text-slate-500 hidden lg:table-cell text-xs">{dept.hours}</td>
                  </tr>
                )) : (
                  <tr><td colSpan={4} className="px-5 py-8 text-center text-slate-400 text-sm">No departments match "{deptSearch}"</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>

        {/* Office locations */}
        <div>
          <h2 className="text-xl font-bold text-slate-900 mb-5">Office Locations</h2>
          <div className="flex flex-col sm:flex-row gap-2 mb-6 flex-wrap">
            {LOCATIONS.map((loc, i) => (
              <button key={i} onClick={() => setActiveLocation(i)}
                className={`px-4 py-2 rounded-xl text-sm font-semibold transition-colors border ${activeLocation === i ? "bg-blue-700 text-white border-blue-700" : "bg-white text-slate-600 border-slate-300 hover:border-blue-400"}`}>
                {loc.name}
              </button>
            ))}
          </div>

          {(() => {
            const loc = LOCATIONS[activeLocation];
            return (
              <div className="bg-white border border-slate-200 rounded-2xl p-6 flex flex-col md:flex-row gap-6">
                <div className="flex-1 space-y-4">
                  <div>
                    <h3 className="font-bold text-slate-900 text-lg">{loc.name}</h3>
                    <p className="text-slate-600 text-sm mt-1">{loc.address}</p>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-4 text-sm">
                    {[["🕐 Hours", loc.hours],["📞 Phone", loc.phone],["🅿️ Parking", loc.parking]].map(([label, val]) => (
                      <div key={label}>
                        <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-0.5">{label.split(" ")[0]} {label.split(" ").slice(1).join(" ")}</p>
                        <p className="text-slate-700">{val}</p>
                      </div>
                    ))}
                    <div>
                      <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Departments Here</p>
                      <ul className="space-y-0.5">
                        {loc.departments.map(d => <li key={d} className="text-slate-700 text-xs flex items-center gap-1.5"><span className="w-1.5 h-1.5 bg-blue-600 rounded-full shrink-0" />{d}</li>)}
                      </ul>
                    </div>
                  </div>
                  <a href="#" className="inline-flex items-center gap-1.5 text-sm text-blue-700 font-semibold hover:underline">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Get Directions
                  </a>
                </div>
                {/* Placeholder map */}
                <div className="md:w-64 h-48 bg-slate-100 rounded-xl border border-slate-200 flex flex-col items-center justify-center shrink-0 text-slate-400">
                  <svg className="w-10 h-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                  <p className="text-xs font-medium">Map Preview</p>
                  <p className="text-xs text-slate-400 mt-0.5 px-4 text-center">{loc.address}</p>
                </div>
              </div>
            );
          })()}
        </div>

        {/* ADA / Accessibility notice */}
        <div className="bg-slate-100 rounded-2xl p-6 flex gap-4 items-start">
          <span className="text-3xl shrink-0">♿</span>
          <div>
            <h3 className="font-bold text-slate-800 mb-1">Accessibility Services</h3>
            <p className="text-sm text-slate-600 leading-relaxed">All Westfield County offices are ADA accessible. If you require a sign language interpreter, assistive technology, or other accommodation, please call <strong>(559) 555-0100</strong> at least 48 hours in advance. TTY users may call <strong>(559) 555-0109</strong>. This website is designed to meet WCAG 2.1 AA standards.</p>
          </div>
        </div>

      </div>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ContactPage />);
</script>
</body>
</html>
