<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nexus Social — Jordan Parker's profile. Posts, media, and activity." />
  <title>Profile — Nexus Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    .profile-tabs {
      display: flex;
      border-bottom: 1px solid var(--clr-border);
    }
    .profile-tab {
      flex: 1;
      padding: 16px 24px;
      text-align: center;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--clr-text-2);
      position: relative;
      transition: color 120ms, background 120ms;
    }
    .profile-tab:hover { background: var(--clr-surface-2); color: var(--clr-text); }
    .profile-tab.active {
      color: var(--clr-text);
      font-weight: 700;
    }
    .profile-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 3px;
      background: var(--clr-accent);
      border-radius: 3px 3px 0 0;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 2px;
    }
    .media-grid-item {
      aspect-ratio: 1;
      background: var(--clr-surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: opacity 120ms;
      border-radius: 4px;
      overflow: hidden;
    }
    .media-grid-item:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="../components/components.js"></script>

  <script>
  (function () {
    const e = React.createElement;
    const { TopHeader, SidebarNav, SidebarRight, PostCard, MobileBottomNav, SAMPLE_POSTS } = window.NexusComponents;

    const PROFILE_TABS = ['Posts', 'Replies', 'Media', 'Likes'];
    const MEDIA_EMOJIS = ['🖼','🎬','🖼','🎨','📸','🖼','🎬','🖼','📸'];

    function ProfileTabPanel({ activeTab }) {
      if (activeTab === 'Posts' || activeTab === 'Replies' || activeTab === 'Likes') {
        const posts = activeTab === 'Likes'
          ? SAMPLE_POSTS.slice(0, 3)
          : SAMPLE_POSTS;
        return e('div', { role: 'tabpanel', 'aria-label': `${activeTab} tab` },
          posts.map(post => e(PostCard, { key: post.id, post, rootPath: '..' })),
          e('div', { className: 'load-more' },
            e('button', { className: 'btn-load-more', 'aria-label': `Load more ${activeTab.toLowerCase()}` }, 'Load more')
          )
        );
      }
      if (activeTab === 'Media') {
        return e('div', {
          role: 'tabpanel',
          'aria-label': 'Media tab',
          className: 'media-grid'
        },
          MEDIA_EMOJIS.map((emoji, i) =>
            e('button', {
              key: i,
              className: 'media-grid-item',
              'aria-label': `Media item ${i + 1}`
            }, emoji)
          )
        );
      }
      return null;
    }

    function ProfilePage() {
      const [activeTab, setActiveTab] = React.useState('Posts');

      return e(React.Fragment, null,
        e(TopHeader, { activePage: 'profile' }),

        e('div', { className: 'page-shell' },
          e(SidebarNav, { activePage: 'profile' }),

          e('main', {
            id: 'main-content',
            className: 'main-content',
            role: 'main',
            'aria-label': 'User profile — Jordan Parker'
          },
            /* Banner */
            e('div', { className: 'profile-banner', 'aria-hidden': 'true' },
              e('div', { className: 'profile-banner__placeholder' }, '✦')
            ),

            /* Profile info */
            e('div', { className: 'profile-info' },
              e('div', { className: 'profile-avatar-wrap' },
                e('img', {
                  src: 'https://i.pravatar.cc/80?img=33',
                  alt: 'Jordan Parker — profile photo',
                  width: 100, height: 100
                })
              ),

              e('div', { className: 'profile-actions' },
                e('button', { className: 'icon-btn', 'aria-label': 'More options', title: 'More' }, '···'),
                e('button', { className: 'icon-btn', 'aria-label': 'Share profile', title: 'Share' }, '↗'),
                e('button', {
                  className: 'btn-outline',
                  'aria-label': 'Edit your profile'
                }, 'Edit Profile')
              ),

              e('h1', { className: 'profile-name' }, 'Jordan Parker'),
              e('div', { className: 'profile-handle' }, '@jordan_p'),

              e('p', { className: 'profile-bio' },
                'Designer & developer building at the intersection of craft and code. ',
                e('span', { style: { color: 'var(--clr-accent-light)' } }, '#OpenSource'),
                ' enthusiast. Previously @NexusCorp, @PixelLab.'
              ),

              e('div', { className: 'profile-meta', 'aria-label': 'Profile details' },
                e('span', null, '📍 San Francisco, CA'),
                e('span', null,
                  e('a', {
                    href: '#',
                    style: { color: 'var(--clr-accent-light)' },
                    'aria-label': 'Personal website'
                  }, '🔗 jordan.dev')
                ),
                e('span', null, '📅 Joined March 2021')
              ),

              e('div', { className: 'profile-stats', 'aria-label': 'Follow statistics' },
                e('a', { href: '#', 'aria-label': '1,284 following' },
                  e('strong', null, '1,284'), ' Following'
                ),
                e('a', { href: '#', 'aria-label': '8,471 followers' },
                  e('strong', null, '8,471'), ' Followers'
                ),
                e('a', { href: '#', 'aria-label': '247 posts' },
                  e('strong', null, '247'), ' Posts'
                )
              )
            ),

            /* Tabs */
            e('nav', {
              className: 'profile-tabs',
              role: 'tablist',
              'aria-label': 'Profile content tabs'
            },
              PROFILE_TABS.map(tab =>
                e('button', {
                  key: tab,
                  role: 'tab',
                  'aria-selected': activeTab === tab,
                  className: 'profile-tab' + (activeTab === tab ? ' active' : ''),
                  onClick: () => setActiveTab(tab),
                  id: `profile-tab-${tab}`
                }, tab)
              )
            ),

            e(ProfileTabPanel, { activeTab })
          ),

          /* Right sidebar with suggested profiles */
          e('aside', {
            className: 'sidebar-right',
            'aria-label': 'Contextual information'
          },
            e('section', { className: 'sidebar-card', 'aria-label': 'Similar accounts' },
              e('h2', { className: 'sidebar-card__title' }, '✦ Similar Creators'),
              e('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
                [
                  { name: 'Aria Chen',   handle: '@aria_designs', avatar: 'https://i.pravatar.cc/80?img=47' },
                  { name: 'Theo Müller', handle: '@theo_design',  avatar: 'https://i.pravatar.cc/80?img=15' },
                  { name: 'Lena Kovacs', handle: '@lenakovacs',   avatar: 'https://i.pravatar.cc/80?img=23' },
                ].map((u, i) =>
                  e('div', { key: i, className: 'suggestion-item' },
                    e('a', {
                      href: 'profile.html',
                      className: 'suggestion-item__avatar',
                      'aria-label': `View ${u.name}'s profile`
                    },
                      e('img', { src: u.avatar, alt: `${u.name}'s avatar`, width: 40, height: 40, loading: 'lazy' })
                    ),
                    e('div', { className: 'suggestion-item__info' },
                      e('a', { href: 'profile.html', className: 'suggestion-item__name' }, u.name),
                      e('div', { className: 'suggestion-item__handle' }, u.handle)
                    ),
                    e('button', { className: 'btn-follow', 'aria-label': `Follow ${u.name}` }, 'Follow')
                  )
                )
              )
            ),

            e('div', { className: 'premium-card', role: 'complementary', 'aria-label': 'Nexus Premium' },
              e('div', { className: 'premium-card__title' }, '✦ Nexus Premium'),
              e('div', { className: 'premium-card__desc' }, 'Unlock analytics, longer posts, and an ad-free experience.'),
              e('a', { href: '../settings/settings.html', className: 'btn-premium' }, '⭐ Upgrade')
            )
          )
        ),

        e(MobileBottomNav, { activePage: 'profile' })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(e(ProfilePage));
  })();
  </script>
</body>
</html>
