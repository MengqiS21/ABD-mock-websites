<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse – Explore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand:"#a78bfa" }, fontFamily: { sans:["Inter","system-ui","sans-serif"] } } }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const NAV = [
  { label:"Home",          href:"index.html",         icon:"home", badge:0 },
  { label:"Explore",       href:"explore.html",        icon:"explore", badge:0 },
  { label:"Notifications", href:"notifications.html",  icon:"bell", badge:9 },
  { label:"Messages",      href:"messages.html",       icon:"msg", badge:3 },
  { label:"Profile",       href:"profile.html",        icon:"user", badge:0 },
  { label:"Settings",      href:"settings.html",       icon:"gear", badge:0 },
];

const PATHS = {
  home:    "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
  explore: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
  bell:    "M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9",
  msg:     "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z",
  user:    "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
  gear:    "M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0",
  plus:    "M12 4v16m8-8H4",
};

function Icon({ n, cls="w-6 h-6" }) {
  return (
    <svg className={cls} fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d={PATHS[n]} />
    </svg>
  );
}

function PulseLogo() {
  return (
    <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shrink-0">
      <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.4} d="M3 12h3l3-8 4 16 3-8h5"/>
      </svg>
    </div>
  );
}

function Avatar({ initials, color, size="md" }) {
  const s = size === "sm" ? "w-8 h-8 text-xs" : size === "lg" ? "w-14 h-14 text-base" : "w-10 h-10 text-sm";
  return <div className={`${s} ${color} rounded-full flex items-center justify-center text-white font-bold shrink-0`}>{initials}</div>;
}

function Sidebar({ active }) {
  return (
    <aside className="hidden md:flex flex-col fixed left-0 top-0 h-screen w-[60px] xl:w-[240px] border-r border-zinc-800 bg-zinc-950 z-20 px-2 xl:px-4 py-5 gap-1">
      <a href="index.html" className="flex items-center gap-3 px-2 py-2 mb-3 rounded-xl hover:bg-zinc-900 transition-colors">
        <PulseLogo />
        <span className="hidden xl:block text-xl font-black text-white tracking-tight">Pulse</span>
      </a>
      {NAV.map(item => (
        <a key={item.href} href={item.href}
          className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors ${active === item.href ? "bg-violet-500/15 text-violet-400" : "text-zinc-400 hover:bg-zinc-900 hover:text-zinc-100"}`}>
          <div className="relative shrink-0">
            <Icon n={item.icon} cls="w-[22px] h-[22px]" />
            {item.badge > 0 && <span className="absolute -top-1.5 -right-1.5 min-w-[16px] h-4 bg-violet-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center px-0.5">{item.badge}</span>}
          </div>
          <span className={`hidden xl:block text-sm font-medium ${active === item.href ? "text-violet-400 font-semibold" : ""}`}>{item.label}</span>
        </a>
      ))}
      <div className="mt-3">
        <button className="hidden xl:flex items-center justify-center gap-2 w-full bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-xl transition-colors text-sm">
          <Icon n="plus" cls="w-4 h-4" />New Post
        </button>
        <button className="xl:hidden flex items-center justify-center w-10 h-10 mx-auto bg-violet-500 hover:bg-violet-600 text-white rounded-xl transition-colors">
          <Icon n="plus" cls="w-5 h-5" />
        </button>
      </div>
      <div className="mt-auto">
        <div className="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-900 cursor-pointer transition-colors">
          <Avatar initials="Y" color="bg-violet-500" />
          <div className="hidden xl:block min-w-0">
            <p className="text-sm font-semibold text-white">You</p>
            <p className="text-xs text-zinc-500">@yourhandle</p>
          </div>
        </div>
      </div>
    </aside>
  );
}

function MobileNav({ active }) {
  return (
    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-20 bg-zinc-950/95 backdrop-blur border-t border-zinc-800 flex">
      {NAV.slice(0,5).map(item => (
        <a key={item.href} href={item.href}
          className={`flex-1 flex flex-col items-center py-3 ${active === item.href ? "text-violet-400" : "text-zinc-500"}`}>
          <div className="relative">
            <Icon n={item.icon} cls="w-6 h-6" />
            {item.badge > 0 && <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-violet-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center">{item.badge}</span>}
          </div>
        </a>
      ))}
    </nav>
  );
}

const CATEGORIES = ["For You","Trending","News","Sports","Tech","Music","Gaming","Science"];

const TRENDING_TOPICS = [
  { rank:1, tag:"#ReactConf2026",  posts:"124K", category:"Tech",     hot:true },
  { rank:2, tag:"#TypeScript6",    posts:"89K",  category:"Tech",     hot:false },
  { rank:3, tag:"Champions League",posts:"2.1M", category:"Sports",   hot:true },
  { rank:4, tag:"#OpenSourceAI",   posts:"210K", category:"Tech",     hot:false },
  { rank:5, tag:"#CSS Masonry",    posts:"32K",  category:"Tech",     hot:false },
  { rank:6, tag:"Studio Ghibli",   posts:"543K", category:"Film",     hot:true },
  { rank:7, tag:"#WebDev",         posts:"456K", category:"Tech",     hot:false },
  { rank:8, tag:"SpaceX Launch",   posts:"1.8M", category:"Science",  hot:true },
];

const MEDIA_POSTS = [
  "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1545235617-9465d2a55698?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1516110833967-0b5716ca1387?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=600&q=80",
  "https://images.unsplash.com/photo-1540553016722-983e48a2cd10?auto=format&fit=crop&w=600&q=80",
];

const PEOPLE = [
  { name:"Evan You",      handle:"@youyuxi",     color:"bg-green-500",  init:"E", followers:"890K", bio:"Creator of Vue.js. Open source enthusiast." },
  { name:"Addy Osmani",   handle:"@addyosmani",  color:"bg-blue-600",   init:"A", followers:"420K", bio:"Engineering manager at Google. Web perf nerd." },
  { name:"Cassidy Williams",handle:"@cassidoo",  color:"bg-rose-500",   init:"C", followers:"305K", bio:"Developer experience at some cool places." },
  { name:"Kent C. Dodds", handle:"@kentcdodds",  color:"bg-amber-500",  init:"K", followers:"271K", bio:"Author of Testing JavaScript. OSS developer." },
];

function ExplorePage() {
  const [query, setQuery] = useState("");
  const [activeTab, setActiveTab] = useState("For You");
  const [following, setFollowing] = useState({});

  return (
    <div className="flex min-h-screen bg-zinc-950 text-white">
      <Sidebar active="explore.html" />
      <div className="flex-1 md:ml-[60px] xl:ml-[240px] flex">
        <main className="flex-1 max-w-[600px] min-h-screen border-r border-zinc-800 pb-20 md:pb-0">
          {/* Sticky search */}
          <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-800 px-4 py-3">
            <div className="flex items-center gap-2 bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2.5 focus-within:border-violet-500 transition-colors">
              <Icon n="explore" cls="w-4 h-4 text-zinc-400 shrink-0" />
              <input
                value={query} onChange={e => setQuery(e.target.value)}
                className="flex-1 bg-transparent text-sm text-zinc-100 outline-none placeholder:text-zinc-500"
                placeholder="Search topics, people, posts…"
              />
              {query && <button onClick={() => setQuery("")} className="text-zinc-500 hover:text-zinc-300 text-xs">✕</button>}
            </div>
          </div>

          {query ? (
            /* Search results */
            <div>
              <div className="px-4 py-4 border-b border-zinc-800">
                <p className="text-zinc-400 text-sm">Search results for <span className="text-white font-semibold">"{query}"</span></p>
              </div>
              {PEOPLE.slice(0,2).map(p => (
                <div key={p.handle} className="flex items-center gap-3 px-4 py-4 border-b border-zinc-800 hover:bg-zinc-900/40 cursor-pointer">
                  <Avatar initials={p.init} color={p.color} />
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-white text-sm">{p.name}</p>
                    <p className="text-zinc-500 text-xs">{p.handle} · {p.followers} followers</p>
                    <p className="text-zinc-400 text-xs mt-0.5">{p.bio}</p>
                  </div>
                  <button onClick={() => setFollowing(f => ({...f,[p.handle]:!f[p.handle]}))}
                    className={`text-xs font-bold px-3 py-1.5 rounded-full ${following[p.handle] ? "bg-zinc-700 text-white" : "bg-white text-zinc-900"}`}>
                    {following[p.handle] ? "Following" : "Follow"}
                  </button>
                </div>
              ))}
              {TRENDING_TOPICS.filter(t => t.tag.toLowerCase().includes(query.toLowerCase())).map(t => (
                <div key={t.tag} className="flex items-center gap-3 px-4 py-4 border-b border-zinc-800 hover:bg-zinc-900/40 cursor-pointer">
                  <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center">
                    <span className="text-lg">#</span>
                  </div>
                  <div>
                    <p className="font-bold text-white text-sm">{t.tag}</p>
                    <p className="text-xs text-zinc-500">{t.posts} posts · {t.category}</p>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <>
              {/* Category tabs */}
              <div className="flex overflow-x-auto border-b border-zinc-800 scrollbar-none">
                {CATEGORIES.map(cat => (
                  <button key={cat} onClick={() => setActiveTab(cat)}
                    className={`shrink-0 px-4 py-3 text-sm font-semibold border-b-2 transition-colors ${activeTab === cat ? "border-violet-400 text-white" : "border-transparent text-zinc-500 hover:text-zinc-300"}`}>
                    {cat}
                  </button>
                ))}
              </div>

              {/* Hero trending card */}
              <div className="m-4 rounded-2xl overflow-hidden relative cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" alt="" className="w-full h-44 object-cover group-hover:scale-105 transition-transform duration-500" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent" />
                <div className="absolute bottom-0 left-0 p-4">
                  <span className="text-xs font-bold bg-violet-500 text-white px-2 py-0.5 rounded-full">🔥 Trending · Tech</span>
                  <h3 className="text-white font-black text-lg mt-1.5 leading-tight">The Future of AI-Powered Development</h3>
                  <p className="text-zinc-300 text-xs mt-1">2.4M posts this week</p>
                </div>
              </div>

              {/* Trending list */}
              <div className="border-b border-zinc-800">
                <div className="px-4 py-3 flex items-center justify-between">
                  <h2 className="font-bold text-white">Trending Topics</h2>
                  <span className="text-xs text-zinc-500">Updated 5 min ago</span>
                </div>
                {TRENDING_TOPICS.map(t => (
                  <div key={t.tag} className="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900/40 cursor-pointer transition-colors border-t border-zinc-800/50">
                    <span className="text-zinc-600 font-bold text-sm w-5 shrink-0">{t.rank}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <p className="font-bold text-white text-sm">{t.tag}</p>
                        {t.hot && <span className="text-[10px] font-bold bg-rose-500/20 text-rose-400 px-1.5 py-0.5 rounded-full">Hot 🔥</span>}
                      </div>
                      <p className="text-xs text-zinc-500 mt-0.5">{t.category} · {t.posts} posts</p>
                    </div>
                    <div className="w-12 h-12 rounded-xl bg-zinc-800 overflow-hidden">
                      <img src={MEDIA_POSTS[t.rank - 1]} alt="" className="w-full h-full object-cover" />
                    </div>
                  </div>
                ))}
              </div>

              {/* Media grid */}
              <div className="px-4 py-4">
                <h2 className="font-bold text-white mb-3">Popular Media</h2>
                <div className="grid grid-cols-3 gap-1 rounded-2xl overflow-hidden">
                  {MEDIA_POSTS.map((src, i) => (
                    <div key={i} className={`relative overflow-hidden cursor-pointer group ${i === 0 ? "col-span-2 row-span-2" : ""}`}>
                      <img src={src} alt="" className={`w-full object-cover group-hover:scale-105 transition-transform duration-300 ${i === 0 ? "h-52" : "h-24"}`} />
                      <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors" />
                    </div>
                  ))}
                </div>
              </div>

              {/* People to follow */}
              <div className="border-t border-zinc-800 px-4 py-4">
                <h2 className="font-bold text-white mb-3">People to Follow</h2>
                <div className="space-y-0">
                  {PEOPLE.map(p => (
                    <div key={p.handle} className="flex items-center gap-3 py-3 border-b border-zinc-800/50 last:border-0">
                      <a href="profile.html"><Avatar initials={p.init} color={p.color} /></a>
                      <div className="flex-1 min-w-0">
                        <p className="font-bold text-white text-sm leading-tight">{p.name}</p>
                        <p className="text-xs text-zinc-500">{p.handle}</p>
                        <p className="text-xs text-zinc-400 mt-0.5 line-clamp-1">{p.bio}</p>
                      </div>
                      <div className="shrink-0 text-right">
                        <p className="text-xs text-zinc-500 mb-1">{p.followers}</p>
                        <button onClick={() => setFollowing(f => ({...f,[p.handle]:!f[p.handle]}))}
                          className={`text-xs font-bold px-3 py-1.5 rounded-full transition-colors ${following[p.handle] ? "bg-zinc-700 text-white hover:bg-zinc-600" : "bg-white text-zinc-900 hover:bg-zinc-200"}`}>
                          {following[p.handle] ? "Following" : "Follow"}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}
        </main>

        {/* Right sidebar (minimal on explore) */}
        <aside className="hidden xl:block w-[340px] px-5 py-4">
          <div className="sticky top-4 space-y-4">
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 p-4">
              <h3 className="font-bold text-white mb-3">Suggested Searches</h3>
              <div className="flex flex-wrap gap-2">
                {["#ReactConf","Figma tips","Web performance","CSS tricks","TypeScript","Open Source","UI design","JavaScript"].map(s => (
                  <button key={s} onClick={() => setQuery(s.replace("#",""))}
                    className="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-full transition-colors">
                    {s}
                  </button>
                ))}
              </div>
            </div>
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
              <div className="px-4 pt-4 pb-2"><h3 className="font-bold text-white">Trending Creators</h3></div>
              {PEOPLE.slice(0,3).map(p => (
                <div key={p.handle} className="flex items-center gap-3 px-4 py-3 border-t border-zinc-800/50 hover:bg-zinc-800/30 transition-colors">
                  <Avatar initials={p.init} color={p.color} size="sm" />
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-white text-sm truncate">{p.name}</p>
                    <p className="text-xs text-zinc-500">{p.followers} followers</p>
                  </div>
                  <button onClick={() => setFollowing(f => ({...f,[p.handle]:!f[p.handle]}))}
                    className={`text-xs font-bold px-3 py-1.5 rounded-full ${following[p.handle] ? "bg-zinc-700 text-white" : "bg-white text-zinc-900"}`}>
                    {following[p.handle] ? "✓" : "Follow"}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </aside>
      </div>
      <MobileNav active="explore.html" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ExplorePage />);
</script>
</body>
</html>
