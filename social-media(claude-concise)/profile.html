function Icon({ n, cls="w-6 h-6" }) {
  return <svg className={cls} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d={PATHS[n]}/></svg>;
}
function PulseLogo() {

            {/* Achievement badges */}
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 p-4">
              <h3 className="font-bold text-white mb-3">Badges</h3>
              <div className="grid grid-cols-4 gap-3">
                {[["🌟","Early Adopter"],["🔥","Trending"],["💎","Verified"],["📢","Influencer"]].map(([emoji,label]) => (
                  <div key={label} className="flex flex-col items-center gap-1 text-center">
                    <div className="w-10 h-10 rounded-2xl bg-zinc-800 flex items-center justify-center text-lg">{emoji}</div>
                    <span className="text-[9px] text-zinc-500 leading-tight">{label}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </aside>
      </div>
      <MobileNav active="profile.html" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProfilePage />);
</script>
</body>
