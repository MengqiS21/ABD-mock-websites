<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse – Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand:"#a78bfa" }, fontFamily: { sans:["Inter","system-ui","sans-serif"] } } }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const NAV = [
  { label:"Home",          href:"index.html",         icon:"home", badge:0 },
  { label:"Explore",       href:"explore.html",        icon:"explore", badge:0 },
  { label:"Notifications", href:"notifications.html",  icon:"bell", badge:9 },
  { label:"Messages",      href:"messages.html",       icon:"msg", badge:3 },
  { label:"Profile",       href:"profile.html",        icon:"user", badge:0 },
  { label:"Settings",      href:"settings.html",       icon:"gear", badge:0 },
];

const PATHS = {
  home:    "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
  explore: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
  bell:    "M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9",
  msg:     "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z",
  user:    "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
  gear:    "M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0",
  plus:    "M12 4v16m8-8H4",
};

function Icon({ n, cls="w-6 h-6" }) {
  return <svg className={cls} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d={PATHS[n]}/></svg>;
}
function PulseLogo() {
  return <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shrink-0"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.4} d="M3 12h3l3-8 4 16 3-8h5"/></svg></div>;
}
function Avatar({ initials, color, size="md" }) {
  const s = size === "sm" ? "w-8 h-8 text-xs" : "w-10 h-10 text-sm";
  return <div className={`${s} ${color} rounded-full flex items-center justify-center text-white font-bold shrink-0`}>{initials}</div>;
}

function Sidebar({ active }) {
  return (
    <aside className="hidden md:flex flex-col fixed left-0 top-0 h-screen w-[60px] xl:w-[240px] border-r border-zinc-800 bg-zinc-950 z-20 px-2 xl:px-4 py-5 gap-1">
      <a href="index.html" className="flex items-center gap-3 px-2 py-2 mb-3 rounded-xl hover:bg-zinc-900 transition-colors">
        <PulseLogo /><span className="hidden xl:block text-xl font-black text-white tracking-tight">Pulse</span>
      </a>
      {NAV.map(item => (
        <a key={item.href} href={item.href} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors ${active === item.href ? "bg-violet-500/15 text-violet-400" : "text-zinc-400 hover:bg-zinc-900 hover:text-zinc-100"}`}>
          <div className="relative shrink-0">
            <Icon n={item.icon} cls="w-[22px] h-[22px]" />
            {item.badge > 0 && <span className="absolute -top-1.5 -right-1.5 min-w-[16px] h-4 bg-violet-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center px-0.5">{item.badge}</span>}
          </div>
          <span className={`hidden xl:block text-sm font-medium ${active === item.href ? "text-violet-400 font-semibold" : ""}`}>{item.label}</span>
        </a>
      ))}
      <div className="mt-3">
        <button className="hidden xl:flex items-center justify-center gap-2 w-full bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-xl transition-colors text-sm"><Icon n="plus" cls="w-4 h-4"/>New Post</button>
        <button className="xl:hidden flex items-center justify-center w-10 h-10 mx-auto bg-violet-500 hover:bg-violet-600 text-white rounded-xl transition-colors"><Icon n="plus" cls="w-5 h-5"/></button>
      </div>
      <div className="mt-auto">
        <div className="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-900 cursor-pointer transition-colors">
          <Avatar initials="Y" color="bg-violet-500" />
          <div className="hidden xl:block min-w-0"><p className="text-sm font-semibold text-white">You</p><p className="text-xs text-zinc-500">@yourhandle</p></div>
        </div>
      </div>
    </aside>
  );
}

function MobileNav({ active }) {
  return (
    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-20 bg-zinc-950/95 backdrop-blur border-t border-zinc-800 flex">
      {NAV.slice(0,5).map(item => (
        <a key={item.href} href={item.href} className={`flex-1 flex flex-col items-center py-3 ${active === item.href ? "text-violet-400" : "text-zinc-500"}`}>
          <div className="relative"><Icon n={item.icon} cls="w-6 h-6"/>{item.badge > 0 && <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-violet-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center">{item.badge}</span>}</div>
        </a>
      ))}
    </nav>
  );
}

/* ─────────── Notifications data ─────────── */
const NOTIFS = [
  { id:1,  type:"like",    unread:true,  time:"2m",  users:[{i:"M",c:"bg-violet-500"},{i:"J",c:"bg-sky-500"},{i:"P",c:"bg-rose-500"}], extra:"+47", text:"liked your post", post:"Just shipped our new design system 🎨…" },
  { id:2,  type:"follow",  unread:true,  time:"5m",  users:[{i:"E",c:"bg-green-500"}], text:"started following you" },
  { id:3,  type:"mention", unread:true,  time:"12m", users:[{i:"D",c:"bg-blue-600"}], text:"mentioned you in a post", post:"…shoutout to @yourhandle for the insightful thread on performance optimization." },
  { id:4,  type:"repost",  unread:true,  time:"28m", users:[{i:"K",c:"bg-pink-500"},{i:"S",c:"bg-amber-500"}], extra:"+12", text:"reposted your post", post:"Reminder: your attention is finite and worth protecting." },
  { id:5,  type:"reply",   unread:true,  time:"45m", users:[{i:"A",c:"bg-indigo-500"}], text:"replied to your post", post:"Totally agree! I've been using it for a year and the DX is incredible." },
  { id:6,  type:"like",    unread:false, time:"1h",  users:[{i:"C",c:"bg-teal-500"},{i:"R",c:"bg-orange-500"}], extra:"+234", text:"liked your post", post:"Hot take: dark mode isn't just aesthetic…" },
  { id:7,  type:"follow",  unread:false, time:"2h",  users:[{i:"B",c:"bg-cyan-500"},{i:"N",c:"bg-lime-600"}], extra:"+5", text:"started following you" },
  { id:8,  type:"mention", unread:false, time:"3h",  users:[{i:"P",c:"bg-rose-500"}], text:"mentioned you in a reply", post:"@yourhandle what library do you use for animations?" },
  { id:9,  type:"like",    unread:false, time:"5h",  users:[{i:"T",c:"bg-purple-600"}], extra:"+891", text:"and others liked your post", post:"Golden hour in Lisbon 🌅…" },
  { id:10, type:"reply",   unread:false, time:"1d",  users:[{i:"L",c:"bg-red-500"}], text:"replied to your thread", post:"This completely changed how I think about state management." },
  { id:11, type:"follow",  unread:false, time:"1d",  users:[{i:"Q",c:"bg-yellow-500"}], text:"started following you" },
  { id:12, type:"repost",  unread:false, time:"2d",  users:[{i:"W",c:"bg-emerald-600"}], extra:"+44", text:"reposted your post", post:"Reminder: your time and attention are finite…" },
];

const TYPE_META = {
  like:    { icon:"❤️", color:"text-rose-400",   label:"Likes"    },
  follow:  { icon:"👤", color:"text-violet-400", label:"Follows"  },
  mention: { icon:"@",  color:"text-sky-400",    label:"Mentions" },
  repost:  { icon:"🔁", color:"text-emerald-400",label:"Reposts"  },
  reply:   { icon:"💬", color:"text-amber-400",  label:"Replies"  },
};

const TABS = ["All","Mentions","Likes","Follows","Reposts"];

function NotificationsPage() {
  const [activeTab, setActiveTab] = useState("All");
  const [read, setRead] = useState({});

  const tabFilter = {
    All: () => true,
    Mentions: n => n.type === "mention",
    Likes: n => n.type === "like",
    Follows: n => n.type === "follow",
    Reposts: n => n.type === "repost",
  };

  const visible = NOTIFS.filter(tabFilter[activeTab]);
  const unreadCount = NOTIFS.filter(n => n.unread && !read[n.id]).length;

  return (
    <div className="flex min-h-screen bg-zinc-950 text-white">
      <Sidebar active="notifications.html" />
      <div className="flex-1 md:ml-[60px] xl:ml-[240px] flex">
        <main className="flex-1 max-w-[600px] min-h-screen border-r border-zinc-800 pb-20 md:pb-0">
          {/* Header */}
          <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-800">
            <div className="flex items-center justify-between px-4 pt-4 pb-0">
              <div>
                <h1 className="text-xl font-bold text-white">Notifications</h1>
                {unreadCount > 0 && <p className="text-xs text-violet-400 mt-0.5">{unreadCount} new</p>}
              </div>
              <button onClick={() => { const newRead = {}; NOTIFS.forEach(n => { newRead[n.id] = true; }); setRead(newRead); }}
                className="text-xs text-zinc-400 hover:text-white transition-colors bg-zinc-900 border border-zinc-700 px-3 py-1.5 rounded-lg">
                Mark all read
              </button>
            </div>
            <div className="flex mt-3 overflow-x-auto">
              {TABS.map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)}
                  className={`shrink-0 px-4 py-3 text-sm font-semibold border-b-2 transition-colors ${activeTab === tab ? "border-violet-400 text-white" : "border-transparent text-zinc-500 hover:text-zinc-300"}`}>
                  {tab}
                  {tab === "All" && unreadCount > 0 && <span className="ml-1.5 text-[10px] bg-violet-500 text-white px-1.5 py-0.5 rounded-full">{unreadCount}</span>}
                </button>
              ))}
            </div>
          </div>

          {visible.length === 0 && (
            <div className="flex flex-col items-center justify-center py-20 text-center px-8">
              <span className="text-5xl mb-4">🔔</span>
              <p className="font-bold text-white text-lg">No notifications here</p>
              <p className="text-zinc-500 text-sm mt-2">When people interact with your posts, you'll see it here.</p>
            </div>
          )}

          {/* Group by date */}
          {["New","Earlier Today","Yesterday"].map((group, gi) => {
            const groupItems = visible.filter((_, i) => gi === 0 ? i < 5 : gi === 1 ? i >= 5 && i < 9 : i >= 9);
            if (!groupItems.length) return null;
            return (
              <div key={group}>
                <div className="px-4 py-2 bg-zinc-950 border-b border-zinc-800/50">
                  <p className="text-xs font-bold text-zinc-500 uppercase tracking-wider">{group}</p>
                </div>
                {groupItems.map(n => {
                  const meta = TYPE_META[n.type];
                  const isRead = read[n.id] || !n.unread;
                  return (
                    <div key={n.id} onClick={() => setRead(r => ({...r, [n.id]:true}))}
                      className={`flex gap-3 px-4 py-4 border-b border-zinc-800/50 hover:bg-zinc-900/40 cursor-pointer transition-colors ${!isRead ? "bg-violet-500/[0.04]" : ""}`}>
                      {/* Type icon */}
                      <div className="shrink-0 mt-1">
                        <span className="text-xl">{meta.icon}</span>
                      </div>
                      {/* Content */}
                      <div className="flex-1 min-w-0">
                        {/* Avatars row */}
                        <div className="flex items-center gap-1 mb-2 flex-wrap">
                          {n.users.map((u, i) => (
                            <div key={i} className={`w-8 h-8 rounded-full ${u.c} flex items-center justify-center text-white text-xs font-bold border-2 border-zinc-950`}>{u.i}</div>
                          ))}
                          {n.extra && <span className="text-xs text-zinc-400 ml-1">{n.extra}</span>}
                          <span className="ml-auto text-xs text-zinc-500 shrink-0">{n.time}</span>
                        </div>
                        {/* Text */}
                        <p className="text-sm text-zinc-200">
                          <span className="font-bold text-white">{n.users[0].i === "M" ? "Mia Chen" : n.users[0].i === "J" ? "Jordan K." : n.users[0].i === "E" ? "Evan You" : n.users[0].i === "D" ? "Dan A." : n.users[0].i === "K" ? "Kai Lee" : "Someone"}</span>
                          {n.users.length > 1 && <span className="text-zinc-400"> and {n.users.length - 1 + (n.extra ? ` more` : "")} others</span>}
                          {" "}{n.text}
                        </p>
                        {n.post && (
                          <p className="mt-1.5 text-xs text-zinc-500 border-l-2 border-zinc-700 pl-2 line-clamp-2">{n.post}</p>
                        )}
                        {n.type === "follow" && (
                          <button className="mt-2 text-xs font-bold bg-white text-zinc-900 hover:bg-zinc-200 px-4 py-1.5 rounded-full transition-colors">Follow back</button>
                        )}
                      </div>
                      {/* Unread dot */}
                      {!isRead && <div className="w-2 h-2 bg-violet-500 rounded-full shrink-0 mt-2" />}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </main>

        {/* Right sidebar */}
        <aside className="hidden xl:block w-[340px] px-5 py-4">
          <div className="sticky top-4 space-y-4">
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 p-4">
              <h3 className="font-bold text-white mb-3">Notification Summary</h3>
              <div className="space-y-3">
                {Object.entries(TYPE_META).map(([type, meta]) => {
                  const cnt = NOTIFS.filter(n => n.type === type).length;
                  return (
                    <div key={type} className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <span className="text-lg">{meta.icon}</span>
                        <span className="text-sm text-zinc-300">{meta.label}</span>
                      </div>
                      <span className={`text-sm font-bold ${meta.color}`}>{cnt}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-gradient-to-br from-violet-900/40 to-purple-900/20 rounded-2xl border border-violet-800/30 p-4">
              <p className="text-sm font-bold text-white mb-1">🔔 Stay in the loop</p>
              <p className="text-xs text-zinc-400 mb-3">Enable push notifications to never miss a mention or like.</p>
              <button className="w-full bg-violet-500 hover:bg-violet-600 text-white text-xs font-bold py-2 rounded-xl transition-colors">Enable Notifications</button>
            </div>
          </div>
        </aside>
      </div>
      <MobileNav active="notifications.html" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NotificationsPage />);
</script>
</body>
</html>
