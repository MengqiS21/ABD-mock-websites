function PulseLogo() {

function Avatar({ initials, color, size="md" }) {
  const s = size === "sm" ? "w-8 h-8 text-xs" : size === "lg" ? "w-12 h-12 text-base" : "w-10 h-10 text-sm";
  return <div className={`${s} ${color} rounded-full flex items-center justify-center text-white font-bold shrink-0`}>{initials}</div>;
}

function Sidebar({ active }) {
  return (
    <aside className="hidden md:flex flex-col fixed left-0 top-0 h-screen w-[60px] xl:w-[240px] border-r border-zinc-800 bg-zinc-950 z-20 px-2 xl:px-4 py-5 gap-1">
      <a href="index.html" className="flex items-center gap-3 px-2 py-2 mb-3 rounded-xl hover:bg-zinc-900 transition-colors">
        <PulseLogo />
        <span className="hidden xl:block text-xl font-black text-white tracking-tight">Pulse</span>
      </a>

        <a key={item.href} href={item.href}
          className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors relative group ${active === item.href ? "bg-violet-500/15 text-violet-400" : "text-zinc-400 hover:bg-zinc-900 hover:text-zinc-100"}`}>
          <div className="relative shrink-0">
            <Icon n={item.icon} cls="w-[22px] h-[22px]" />
            {item.badge > 0 && (

function fmt(n) {
  return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "K" : String(n);
}

function PostCard({ post, onLike, onRepost, onBookmark }) {
  return (
    <article className="px-4 py-4 border-b border-zinc-800/60 hover:bg-white/[0.02] transition-colors cursor-pointer">
      <div className="flex gap-3">
        <a href="profile.html" className="shrink-0 mt-0.5">
          <Avatar initials={post.init} color={post.color} />
        </a>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1.5 flex-wrap">
            <a href="profile.html" className="font-bold text-white text-sm hover:underline">{post.name}</a>
            {post.verified && (
              <svg className="w-4 h-4 text-violet-400 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d={Icon.prototype && ""}/>
                <path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
              </svg>
            )}
            <span className="text-zinc-500 text-sm">{post.handle}</span>
            <span className="text-zinc-700">·</span>
            <span className="text-zinc-500 text-sm">{post.time}</span>
          </div>
          <p className="mt-1.5 text-zinc-100 text-sm leading-relaxed whitespace-pre-line">{post.text}</p>
          {post.img && (
            <div className="mt-3 rounded-2xl overflow-hidden border border-zinc-800">
              <img src={post.img} alt="" className="w-full object-cover max-h-72" />
            </div>
          )}
          <div className="flex items-center justify-between mt-3 -ml-2 text-zinc-500">
            <button className="flex items-center gap-1.5 px-2 py-1.5 rounded-full hover:bg-sky-500/10 hover:text-sky-400 transition-colors">
              <Icon n="comment" cls="w-[18px] h-[18px]" />
              <span className="text-xs">{fmt(post.comments)}</span>
            </button>
            <button onClick={() => onRepost(post.id)}
              className={`flex items-center gap-1.5 px-2 py-1.5 rounded-full hover:bg-emerald-500/10 hover:text-emerald-400 transition-colors ${post.reposted ? "text-emerald-400" : ""}`}>
              <Icon n="repost" cls="w-[18px] h-[18px]" />
              <span className="text-xs">{fmt(post.reposts + (post.reposted ? 1 : 0))}</span>
            </button>
            <button onClick={() => onLike(post.id)}

function FeedPage() {
  const [posts, setPosts] = useState(INITIAL_POSTS);
  const [text, setText] = useState("");
  const [following, setFollowing] = useState({});
  const [activeTab, setActiveTab] = useState("for-you");

  const toggle = (field) => (id) => setPosts(prev =>
    prev.map(p => p.id === id ? { ...p, [field]: !p[field] } : p)
  );

  function submitPost() {
    if (!text.trim()) return;
    setPosts(prev => [{
      id: Date.now(), name:"You", handle:"@yourhandle", color:"bg-violet-500", init:"Y",
      verified:false, time:"now", text:text.trim(), img:null,
      likes:0, comments:0, reposts:0, liked:false, reposted:false, bookmarked:false

              <h1 className="text-xl font-bold text-white mb-3">Home</h1>
              <div className="flex">

                  <button key={tab} onClick={() => setActiveTab(tab.toLowerCase().replace(" ","-"))}

                    <Avatar initials="Y" color="bg-violet-500" size="sm" />

                    {text.length > 0 && (
                      <div className="relative w-6 h-6">
                        <svg className="w-6 h-6 -rotate-90" viewBox="0 0 24 24">
                          <circle cx="12" cy="12" r="10" fill="none" stroke="#3f3f46" strokeWidth="2"/>
                          <circle cx="12" cy="12" r="10" fill="none" stroke={text.length > 250 ? "#f87171" : "#a78bfa"} strokeWidth="2"
                            strokeDasharray={`${Math.min(text.length/280*62.83, 62.83)} 62.83`}/>
                        </svg>
                        {text.length > 220 && <span className={`absolute inset-0 flex items-center justify-center text-[9px] font-bold ${text.length > 250 ? "text-red-400" : "text-zinc-400"}`}>{280 - text.length}</span>}
                      </div>
                    )}
                    <button onClick={submitPost}
                      disabled={!text.trim()}
                      className="bg-violet-500 hover:bg-violet-600 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-bold px-4 py-1.5 rounded-full transition-colors">
                      Post
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Posts */}
          {posts.map(post => (
            <PostCard key={post.id} post={post}
              onLike={toggle("liked")} onRepost={toggle("reposted")} onBookmark={toggle("bookmarked")} />
          ))}
        </main>

        {/* Right sidebar */}
        <aside className="hidden xl:block w-[340px] px-5 py-4 overflow-y-auto">
          <div className="sticky top-4 space-y-4">
            {/* Search */}
            <div className="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2.5">
              <Icon n="explore" cls="w-4 h-4 text-zinc-500 shrink-0" />
              <input className="flex-1 bg-transparent text-sm text-zinc-100 outline-none placeholder:text-zinc-500" placeholder="Search Pulse" />
            </div>

            {/* Trending */}
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
              <div className="px-4 pt-4 pb-2">
                <h2 className="text-base font-bold text-white">Trending for you</h2>
              </div>
              {TRENDING.map((t, i) => (
                <div key={t.tag} className="px-4 py-3 hover:bg-zinc-800/50 cursor-pointer transition-colors border-t border-zinc-800/50 first:border-0">
                  <p className="text-xs text-zinc-500">Trending · #{i + 1}</p>
                  <p className="font-bold text-white text-sm mt-0.5">{t.tag}</p>
                  <p className="text-xs text-zinc-500 mt-0.5">{t.posts} posts</p>
                </div>
              ))}
              <div className="px-4 py-3 border-t border-zinc-800/50">
                <a href="explore.html" className="text-sm text-violet-400 hover:text-violet-300 transition-colors">Show more →</a>
              </div>
            </div>

            {/* Who to follow */}
            <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
              <div className="px-4 pt-4 pb-2">
                <h2 className="text-base font-bold text-white">Who to follow</h2>
              </div>
              {SUGGESTIONS.map(s => (
                <div key={s.handle} className="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800/50 transition-colors border-t border-zinc-800/50 first:border-0">
                  <a href="profile.html">
                    <Avatar initials={s.init} color={s.color} size="sm" />
                  </a>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1">
                      <p className="font-semibold text-white text-sm leading-tight truncate">{s.name}</p>
                      {s.verified && <svg className="w-3.5 h-3.5 text-violet-400 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>}
                    </div>
                    <p className="text-xs text-zinc-500">{s.handle}</p>
                  </div>
                  <button onClick={() => setFollowing(f => ({ ...f, [s.handle]: !f[s.handle] }))}
                    className={`text-xs font-bold px-3 py-1.5 rounded-full transition-colors ${following[s.handle] ? "bg-zinc-700 text-white hover:bg-zinc-600" : "bg-white text-zinc-900 hover:bg-zinc-200"}`}>
                    {following[s.handle] ? "Following" : "Follow"}
                  </button>
                </div>
              ))}
              <div className="px-4 py-3 border-t border-zinc-800/50">
                <a href="explore.html" className="text-sm text-violet-400 hover:text-violet-300 transition-colors">Show more →</a>
              </div>
            </div>
          </div>
        </aside>
      </div>
      <MobileNav active="index.html" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FeedPage />);
</script>
</body>
</html>
