<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse – Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand:"#a78bfa" }, fontFamily: { sans:["Inter","system-ui","sans-serif"] } } }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const NAV = [
  { label:"Home",          href:"index.html",         icon:"home", badge:0 },
  { label:"Explore",       href:"explore.html",        icon:"explore", badge:0 },
  { label:"Notifications", href:"notifications.html",  icon:"bell", badge:9 },
  { label:"Messages",      href:"messages.html",       icon:"msg", badge:3 },
  { label:"Profile",       href:"profile.html",        icon:"user", badge:0 },
  { label:"Settings",      href:"settings.html",       icon:"gear", badge:0 },
];

const PATHS = {
  home:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
  explore:"M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
  bell:"M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9",
  msg:"M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z",
  user:"M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
  gear:"M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0",
  plus:"M12 4v16m8-8H4",
  send:"M12 19l9 2-9-18-9 18 9-2zm0 0v-8",
  image:"M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z",
  emoji:"M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z",
};

function Icon({ n, cls="w-6 h-6" }) {
  return <svg className={cls} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d={PATHS[n]}/></svg>;
}
function PulseLogo() {
  return <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shrink-0"><svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.4} d="M3 12h3l3-8 4 16 3-8h5"/></svg></div>;
}
function Avatar({ initials, color, size="md", online=false }) {
  const s = size === "sm" ? "w-8 h-8 text-xs" : size === "lg" ? "w-14 h-14 text-base" : "w-10 h-10 text-sm";
  return (
    <div className="relative shrink-0">
      <div className={`${s} ${color} rounded-full flex items-center justify-center text-white font-bold`}>{initials}</div>
      {online && <div className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-zinc-950" />}
    </div>
  );
}

function Sidebar({ active }) {
  return (
    <aside className="hidden md:flex flex-col fixed left-0 top-0 h-screen w-[60px] xl:w-[240px] border-r border-zinc-800 bg-zinc-950 z-20 px-2 xl:px-4 py-5 gap-1">
      <a href="index.html" className="flex items-center gap-3 px-2 py-2 mb-3 rounded-xl hover:bg-zinc-900 transition-colors"><PulseLogo /><span className="hidden xl:block text-xl font-black text-white tracking-tight">Pulse</span></a>
      {NAV.map(item => (
        <a key={item.href} href={item.href} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors ${active === item.href ? "bg-violet-500/15 text-violet-400" : "text-zinc-400 hover:bg-zinc-900 hover:text-zinc-100"}`}>
          <div className="relative shrink-0"><Icon n={item.icon} cls="w-[22px] h-[22px]"/>{item.badge > 0 && <span className="absolute -top-1.5 -right-1.5 min-w-[16px] h-4 bg-violet-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center px-0.5">{item.badge}</span>}</div>
          <span className={`hidden xl:block text-sm font-medium ${active === item.href ? "text-violet-400 font-semibold" : ""}`}>{item.label}</span>
        </a>
      ))}
      <div className="mt-3"><button className="hidden xl:flex items-center justify-center gap-2 w-full bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-xl transition-colors text-sm"><Icon n="plus" cls="w-4 h-4"/>New Post</button><button className="xl:hidden flex items-center justify-center w-10 h-10 mx-auto bg-violet-500 hover:bg-violet-600 text-white rounded-xl transition-colors"><Icon n="plus" cls="w-5 h-5"/></button></div>
      <div className="mt-auto"><div className="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-900 cursor-pointer transition-colors"><Avatar initials="Y" color="bg-violet-500"/><div className="hidden xl:block min-w-0"><p className="text-sm font-semibold text-white">You</p><p className="text-xs text-zinc-500">@yourhandle</p></div></div></div>
    </aside>
  );
}

function MobileNav({ active }) {
  return (
    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-20 bg-zinc-950/95 backdrop-blur border-t border-zinc-800 flex">
      {NAV.slice(0,5).map(item => (
        <a key={item.href} href={item.href} className={`flex-1 flex flex-col items-center py-3 ${active === item.href ? "text-violet-400" : "text-zinc-500"}`}>
          <div className="relative"><Icon n={item.icon} cls="w-6 h-6"/>{item.badge > 0 && <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-violet-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center">{item.badge}</span>}</div>
        </a>
      ))}
    </nav>
  );
}

/* ─── Conversations & messages data ─── */
const CONVOS = [
  { id:1, name:"Mia Chen",      handle:"mia.dev",     color:"bg-violet-500", init:"M", online:true,  unread:2,  time:"2m",  last:"Ahaha that's such a good point 😂" },
  { id:2, name:"Jordan K.",     handle:"jordank",     color:"bg-sky-500",    init:"J", online:true,  unread:1,  time:"15m", last:"Can you share the GitHub link?" },
  { id:3, name:"Dev Weekly",    handle:"devweekly",   color:"bg-emerald-500",init:"D", online:false, unread:0,  time:"1h",  last:"Thanks for the submission! We'll review…" },
  { id:4, name:"Priya R.",      handle:"priyal",      color:"bg-rose-500",   init:"P", online:true,  unread:0,  time:"3h",  last:"Lisbon was incredible honestly 🌅" },
  { id:5, name:"Sam Rivera",    handle:"samriv",      color:"bg-amber-500",  init:"S", online:false, unread:0,  time:"1d",  last:"You around for a call this week?" },
  { id:6, name:"Kai Lee",       handle:"kaileedesign",color:"bg-pink-500",   init:"K", online:false, unread:0,  time:"2d",  last:"Love the new colour palette btw!" },
  { id:7, name:"Evan You",      handle:"youyuxi",     color:"bg-green-500",  init:"E", online:true,  unread:0,  time:"3d",  last:"Let's sync on the Vue collab soon" },
];

const MESSAGES_BY_CONVO = {
  1: [
    { id:1, from:"them", text:"Hey! Did you see the new React 20 beta?", time:"10:02 AM" },
    { id:2, from:"me",   text:"Yes! The compiler changes are wild. Finally automatic memoization!", time:"10:05 AM" },
    { id:3, from:"them", text:"Exactly 😍 I've been waiting for this for so long. The entire team is excited", time:"10:06 AM" },
    { id:4, from:"me",   text:"Same here. We're planning to migrate our design system next sprint once RC is out", time:"10:08 AM" },
    { id:5, from:"them", text:"That's smart. I'd wait for RC too. Did you check the concurrent features?", time:"10:09 AM" },
    { id:6, from:"me",   text:"Not yet, still reading through the RFC. The signals API looks promising though", time:"10:12 AM" },
    { id:7, from:"them", text:"Ahaha that's such a good point 😂", time:"10:14 AM" },
  ],
  2: [
    { id:1, from:"them", text:"Your thread on CSS performance was 🔥", time:"Yesterday" },
    { id:2, from:"me",   text:"Thanks! I've been nerding out on this stuff for months", time:"Yesterday" },
    { id:3, from:"them", text:"I shared it with my whole team. Can you share the GitHub link?", time:"15m ago" },
  ],
  3: [
    { id:1, from:"them", text:"Hi there! We received your post submission for next week's edition.", time:"1h ago" },
    { id:2, from:"them", text:"Thanks for the submission! We'll review it and get back to you within 48 hours.", time:"1h ago" },
  ],
  4: [
    { id:1, from:"me",   text:"Those Lisbon photos were stunning!! How long were you there?", time:"3h ago" },
    { id:2, from:"them", text:"Just 4 days but felt like forever. That light is unreal", time:"3h ago" },
    { id:3, from:"them", text:"Lisbon was incredible honestly 🌅", time:"3h ago" },
  ],
};

function MessagesPage() {
  const [selectedId, setSelectedId] = useState(1);
  const [input, setInput] = useState("");
  const [msgsByConvo, setMsgsByConvo] = useState(MESSAGES_BY_CONVO);
  const [showList, setShowList] = useState(true);
  const bottomRef = useRef(null);

  const selected = CONVOS.find(c => c.id === selectedId);
  const messages = msgsByConvo[selectedId] || [];

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [selectedId, msgsByConvo]);

  function sendMessage() {
    if (!input.trim()) return;
    const newMsg = { id: Date.now(), from:"me", text:input.trim(), time:"now" };
    setMsgsByConvo(prev => ({ ...prev, [selectedId]: [...(prev[selectedId] || []), newMsg] }));
    setInput("");
  }

  function selectConvo(id) {
    setSelectedId(id);
    setShowList(false);
  }

  return (
    <div className="flex min-h-screen bg-zinc-950 text-white">
      <Sidebar active="messages.html" />
      <div className="flex-1 md:ml-[60px] xl:ml-[240px] flex h-screen overflow-hidden">
        {/* Conversation list */}
        <div className={`${showList ? "flex" : "hidden md:flex"} flex-col w-full md:w-[300px] xl:w-[340px] border-r border-zinc-800 shrink-0 bg-zinc-950`}>
          {/* List header */}
          <div className="sticky top-0 bg-zinc-950 border-b border-zinc-800 px-4 py-4">
            <div className="flex items-center justify-between mb-3">
              <h1 className="text-xl font-bold text-white">Messages</h1>
              <button className="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-700 flex items-center justify-center hover:bg-zinc-800 transition-colors">
                <Icon n="plus" cls="w-4 h-4 text-zinc-400" />
              </button>
            </div>
            <div className="flex items-center gap-2 bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2">
              <Icon n="explore" cls="w-4 h-4 text-zinc-500 shrink-0" />
              <input className="flex-1 bg-transparent text-sm text-zinc-100 outline-none placeholder:text-zinc-500" placeholder="Search messages…"/>
            </div>
          </div>
          {/* Requests badge */}
          <div className="px-4 py-2.5 border-b border-zinc-800 flex items-center gap-2 cursor-pointer hover:bg-zinc-900/40 transition-colors">
            <div className="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center">
              <Icon n="msg" cls="w-4 h-4 text-zinc-400"/>
            </div>
            <div className="flex-1">
              <p className="text-sm font-semibold text-white">Message Requests</p>
              <p className="text-xs text-zinc-500">2 pending requests</p>
            </div>
            <span className="w-5 h-5 bg-violet-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">2</span>
          </div>
          {/* Convo list */}
          <div className="flex-1 overflow-y-auto">
            {CONVOS.map(c => (
              <div key={c.id} onClick={() => selectConvo(c.id)}
                className={`flex items-center gap-3 px-4 py-3.5 cursor-pointer transition-colors border-b border-zinc-800/40 ${selectedId === c.id ? "bg-violet-500/10" : "hover:bg-zinc-900/40"}`}>
                <Avatar initials={c.init} color={c.color} online={c.online} />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between">
                    <p className={`text-sm font-semibold truncate ${c.unread > 0 ? "text-white" : "text-zinc-300"}`}>{c.name}</p>
                    <span className="text-[11px] text-zinc-500 shrink-0 ml-2">{c.time}</span>
                  </div>
                  <p className={`text-xs truncate mt-0.5 ${c.unread > 0 ? "text-zinc-200" : "text-zinc-500"}`}>{c.last}</p>
                </div>
                {c.unread > 0 && <span className="w-5 h-5 bg-violet-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shrink-0">{c.unread}</span>}
              </div>
            ))}
          </div>
        </div>

        {/* Chat view */}
        <div className={`${!showList ? "flex" : "hidden md:flex"} flex-1 flex-col h-screen overflow-hidden`}>
          {selected ? (
            <>
              {/* Chat header */}
              <div className="flex items-center gap-3 px-4 py-3.5 border-b border-zinc-800 bg-zinc-950 shrink-0">
                <button onClick={() => setShowList(true)} className="md:hidden text-zinc-400 hover:text-white mr-1">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                </button>
                <Avatar initials={selected.init} color={selected.color} online={selected.online} />
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-white text-sm">{selected.name}</p>
                  <p className="text-xs text-zinc-500">{selected.online ? <span className="text-emerald-400">● Online</span> : `@${selected.handle}`}</p>
                </div>
                <div className="flex gap-1">
                  {["call","video","info"].map(a => (
                    <button key={a} className="w-9 h-9 rounded-xl hover:bg-zinc-800 flex items-center justify-center transition-colors text-zinc-400 hover:text-white">
                      {a === "call" ? <svg className="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        : a === "video" ? <svg className="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        : <svg className="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.9} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>}
                    </button>
                  ))}
                </div>
              </div>

              {/* Messages area */}
              <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
                {/* Date divider */}
                <div className="flex items-center gap-3 py-2">
                  <div className="flex-1 h-px bg-zinc-800" />
                  <span className="text-xs text-zinc-500">Today</span>
                  <div className="flex-1 h-px bg-zinc-800" />
                </div>

                {messages.map((msg, i) => {
                  const isMe = msg.from === "me";
                  const showAvatar = !isMe && (i === 0 || messages[i-1]?.from === "me");
                  return (
                    <div key={msg.id} className={`flex gap-2.5 ${isMe ? "justify-end" : "justify-start"}`}>
                      {!isMe && (
                        <div className="shrink-0 mt-auto">
                          {showAvatar ? <Avatar initials={selected.init} color={selected.color} size="sm" /> : <div className="w-8" />}
                        </div>
                      )}
                      <div className={`max-w-[70%] ${isMe ? "items-end" : "items-start"} flex flex-col gap-0.5`}>
                        <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMe
                          ? "bg-violet-500 text-white rounded-br-sm"
                          : "bg-zinc-800 text-zinc-100 rounded-bl-sm"}`}>
                          {msg.text}
                        </div>
                        <span className="text-[10px] text-zinc-600 px-1">{msg.time}</span>
                      </div>
                    </div>
                  );
                })}
                <div ref={bottomRef} />
              </div>

              {/* Input */}
              <div className="px-4 py-3 border-t border-zinc-800 bg-zinc-950 shrink-0">
                <div className="flex items-end gap-2 bg-zinc-900 border border-zinc-700 rounded-2xl px-3 py-2.5 focus-within:border-violet-500 transition-colors">
                  <div className="flex gap-1 shrink-0 mb-0.5">
                    <button className="text-zinc-500 hover:text-violet-400 transition-colors p-1"><Icon n="image" cls="w-5 h-5"/></button>
                    <button className="text-zinc-500 hover:text-violet-400 transition-colors p-1"><Icon n="emoji" cls="w-5 h-5"/></button>
                  </div>
                  <textarea
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }}}
                    placeholder="Write a message…"
                    rows={1}
                    className="flex-1 bg-transparent text-sm text-zinc-100 placeholder:text-zinc-500 outline-none resize-none max-h-24 leading-relaxed"
                  />
                  <button onClick={sendMessage} disabled={!input.trim()}
                    className="shrink-0 w-8 h-8 bg-violet-500 disabled:opacity-30 hover:bg-violet-600 text-white rounded-xl flex items-center justify-center transition-colors mb-0.5">
                    <Icon n="send" cls="w-4 h-4"/>
                  </button>
                </div>
                <p className="text-center text-[10px] text-zinc-700 mt-1.5">Messages are end-to-end encrypted</p>
              </div>
            </>
          ) : (
            <div className="flex-1 flex flex-col items-center justify-center text-center px-8">
              <div className="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center mb-4">
                <Icon n="msg" cls="w-8 h-8 text-zinc-600"/>
              </div>
              <p className="font-bold text-white text-lg mb-1">Your Messages</p>
              <p className="text-zinc-500 text-sm">Select a conversation to start messaging</p>
            </div>
          )}
        </div>
      </div>
      <MobileNav active="messages.html" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MessagesPage />);
</script>
</body>
</html>
