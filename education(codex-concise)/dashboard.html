<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Academy | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const todo = [
        "Complete Module 3 quiz before Friday",
        "Submit capstone draft for mentor review",
        "Schedule your weekly live cohort session"
      ];

      function DashboardPage() {
        return (
          <EduPlatform.PlatformShell
            active="dashboard.html"
            sectionLinks={[
              { href: "dashboard.html", label: "Overview" },
              { href: "courses.html", label: "Continue Courses" },
              { href: "study-lab.html", label: "Practice Zone" }
            ]}
            breadcrumbs={[{ label: "Home", href: "index.html" }, { label: "Dashboard" }]}
          >
            <section className="grid gap-6 lg:grid-cols-3">
              <article className="platform-card rounded-3xl p-7 lg:col-span-2">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Learning Progress</p>
                <h1 className="mt-2 text-3xl font-extrabold text-slate-900">Welcome back, Alex</h1>
                <p className="mt-3 text-slate-600">You are 68% through your Applied Data Analytics pathway. Keep momentum with your next milestone.</p>
                <div className="mt-5 h-3 w-full overflow-hidden rounded-full bg-slate-100">
                  <div className="h-full w-[68%] bg-cyan-600"></div>
                </div>
                <div className="mt-6 flex flex-wrap gap-3">
                  <a href="courses.html" className="rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">Continue Course</a>
                  <a href="study-lab.html" className="rounded-full border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100">Open Study Lab</a>
                </div>
              </article>

              <aside className="platform-card rounded-3xl p-7">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Next Actions</p>
                <ul className="mt-4 space-y-3 text-sm text-slate-700">
                  {todo.map((item) => (
                    <li key={item} className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">{item}</li>
                  ))}
                </ul>
              </aside>
            </section>
          </EduPlatform.PlatformShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<DashboardPage />);
    </script>
  </body>
</html>
