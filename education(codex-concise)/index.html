<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Academy | Start Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#0f4c81",
              skybrand: "#1677b3"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const pathways = [
        { title: "Data & AI Foundations", detail: "8-course pathway with live labs", link: "courses.html" },
        { title: "Product Management Sprint", detail: "Project-based weekly milestones", link: "course-detail.html" },
        { title: "Career Switch Accelerator", detail: "Mentor-guided 12-week framework", link: "pricing.html" }
      ];

      function HomePage() {
        return (
          <EduPlatform.PlatformShell
            active="index.html"
            sectionLinks={[
              { href: "courses.html", label: "Browse Catalog" },
              { href: "course-detail.html", label: "Featured Program" },
              { href: "study-lab.html", label: "Practice Tools" }
            ]}
            breadcrumbs={[{ label: "Home" }]}
          >
            <section className="grid gap-6 lg:grid-cols-3">
              <article className="platform-card rounded-3xl p-7 lg:col-span-2">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-skybrand">Learning Discovery</p>
                <h1 className="balance mt-3 text-4xl font-extrabold leading-tight text-slate-900 sm:text-5xl">
                  Build job-ready skills through structured learning pathways.
                </h1>
                <p className="mt-4 max-w-2xl text-lg text-slate-600">
                  Explore curated programs, follow milestone-based progress, and validate outcomes with institution-backed certificates.
                </p>
                <div className="mt-6 flex flex-wrap gap-3">
                  <a href="courses.html" className="rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">Start Learning</a>
                  <a href="pricing.html" className="rounded-full border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100">Try Free</a>
                </div>
              </article>

              <aside className="platform-card metric-glow rounded-3xl p-7">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-700">Platform Trust</p>
                <div className="mt-4 space-y-4">
                  <div>
                    <p className="text-3xl font-extrabold text-slate-900">120K+</p>
                    <p className="text-sm text-slate-700">Active learners worldwide</p>
                  </div>
                  <div>
                    <p className="text-3xl font-extrabold text-slate-900">94%</p>
                    <p className="text-sm text-slate-700">Path completion satisfaction</p>
                  </div>
                  <div>
                    <p className="text-3xl font-extrabold text-slate-900">250+</p>
                    <p className="text-sm text-slate-700">Institutional partners</p>
                  </div>
                </div>
              </aside>
            </section>

            <section className="mt-8">
              <div className="mb-4 flex items-center justify-between">
                <h2 className="text-2xl font-bold text-slate-900">Clear Learning Pathways</h2>
                <a href="dashboard.html" className="text-sm font-semibold text-slate-700 hover:text-slate-900">View your roadmap</a>
              </div>
              <div className="grid gap-4 md:grid-cols-3">
                {pathways.map((path) => (
                  <article key={path.title} className="platform-card rounded-2xl p-5">
                    <h3 className="text-xl font-bold text-slate-900">{path.title}</h3>
                    <p className="mt-2 text-sm text-slate-600">{path.detail}</p>
                    <a href={path.link} className="mt-4 inline-flex text-sm font-semibold text-brand hover:text-skybrand">Explore track</a>
                  </article>
                ))}
              </div>
            </section>
          </EduPlatform.PlatformShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
    </script>
  </body>
</html>
