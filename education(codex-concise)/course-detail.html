<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Academy | Course Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const modules = [
        "Data storytelling and decision framing",
        "Dashboard design principles",
        "SQL and warehouse fundamentals",
        "Capstone: executive-ready insight memo"
      ];

      function CourseDetailPage() {
        return (
          <EduPlatform.PlatformShell
            active="courses.html"
            sectionLinks={[
              { href: "courses.html", label: "Catalog" },
              { href: "study-lab.html", label: "Skill Labs" },
              { href: "dashboard.html", label: "Track Progress" }
            ]}
            breadcrumbs={[
              { label: "Home", href: "index.html" },
              { label: "Courses", href: "courses.html" },
              { label: "Applied Data Analytics" }
            ]}
          >
            <section className="grid gap-6 lg:grid-cols-3">
              <article className="platform-card rounded-3xl p-7 lg:col-span-2">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Featured Program</p>
                <h1 className="mt-3 text-3xl font-extrabold text-slate-900 sm:text-4xl">Applied Data Analytics for Strategic Decisions</h1>
                <p className="mt-4 text-slate-600">A guided pathway that combines live teaching, weekly assessments, and portfolio projects aligned to analyst and operations roles.</p>
                <div className="mt-5 grid gap-3 sm:grid-cols-3">
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700"><strong>Duration:</strong><br />6 Weeks</div>
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700"><strong>Level:</strong><br />Beginner</div>
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700"><strong>Credential:</strong><br />Verified Certificate</div>
                </div>
                <div className="mt-6 flex flex-wrap gap-3">
                  <a href="pricing.html" className="rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">Sign Up</a>
                  <a href="study-lab.html" className="rounded-full border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100">Try Learning Tools</a>
                </div>
              </article>

              <aside className="platform-card rounded-3xl p-7">
                <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">What You Will Learn</p>
                <ul className="mt-4 space-y-3 text-sm text-slate-700">
                  {modules.map((module) => (
                    <li key={module} className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">{module}</li>
                  ))}
                </ul>
              </aside>
            </section>
          </EduPlatform.PlatformShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<CourseDetailPage />);
    </script>
  </body>
</html>
