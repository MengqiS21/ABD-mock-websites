<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Academy | Plans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const plans = [
        { name: "Starter", price: "$0", note: "Explore 5 free lessons monthly", cta: "Start Learning" },
        { name: "Pro", price: "$29/mo", note: "Unlimited courses + lab tools", cta: "Try Free" },
        { name: "Team", price: "$99/mo", note: "Admin dashboard + cohort analytics", cta: "Sign Up" }
      ];

      function PricingPage() {
        return (
          <EduPlatform.PlatformShell
            active="pricing.html"
            sectionLinks={[
              { href: "pricing.html", label: "Plan Comparison" },
              { href: "courses.html", label: "Program Catalog" },
              { href: "dashboard.html", label: "Learner Dashboard" }
            ]}
            breadcrumbs={[{ label: "Home", href: "index.html" }, { label: "Plans" }]}
          >
            <section className="platform-card rounded-3xl p-7">
              <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Plans & Pricing</p>
              <h1 className="mt-2 text-3xl font-extrabold text-slate-900 sm:text-4xl">Choose the plan that matches your learning velocity</h1>
              <p className="mt-3 text-slate-600">Transparent pricing for self-paced learners, professionals, and institutional teams.</p>
            </section>

            <section className="mt-7 grid gap-4 md:grid-cols-3">
              {plans.map((plan, index) => (
                <article key={plan.name} className={`platform-card rounded-2xl p-6 ${index === 1 ? "ring-2 ring-cyan-500" : ""}`}>
                  <p className="text-sm font-semibold text-slate-700">{plan.name}</p>
                  <p className="mt-3 text-4xl font-extrabold text-slate-900">{plan.price}</p>
                  <p className="mt-2 text-sm text-slate-600">{plan.note}</p>
                  <a href="dashboard.html" className="mt-5 inline-flex rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">{plan.cta}</a>
                </article>
              ))}
            </section>
          </EduPlatform.PlatformShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<PricingPage />);
    </script>
  </body>
</html>
