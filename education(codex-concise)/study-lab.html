<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Academy | Study Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const tools = [
        { name: "Flash Drill", desc: "Spaced-repetition deck with smart review queues" },
        { name: "Exam Simulator", desc: "Timed mock assessments with confidence scoring" },
        { name: "Project Studio", desc: "Guided workspace for portfolio-ready deliverables" },
        { name: "Mentor Feedback", desc: "Rubric-based critique on weekly submissions" }
      ];

      function StudyLabPage() {
        return (
          <EduPlatform.PlatformShell
            active="study-lab.html"
            sectionLinks={[
              { href: "study-lab.html", label: "All Tools" },
              { href: "course-detail.html", label: "Course Context" },
              { href: "dashboard.html", label: "Learning Metrics" }
            ]}
            breadcrumbs={[{ label: "Home", href: "index.html" }, { label: "Study Lab" }]}
          >
            <section className="platform-card rounded-3xl p-7">
              <p className="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Learning Tools</p>
              <h1 className="mt-2 text-3xl font-extrabold text-slate-900 sm:text-4xl">Practice with high-feedback, action-driven study modes</h1>
              <p className="mt-3 max-w-3xl text-slate-600">Each tool is mapped to course milestones so learners can reinforce concepts, measure confidence, and close skill gaps faster.</p>
            </section>

            <section className="mt-7 grid gap-4 md:grid-cols-2">
              {tools.map((tool) => (
                <article key={tool.name} className="platform-card rounded-2xl p-5">
                  <h2 className="text-xl font-bold text-slate-900">{tool.name}</h2>
                  <p className="mt-2 text-sm text-slate-600">{tool.desc}</p>
                  <div className="mt-4 flex flex-wrap gap-2">
                    <a href="dashboard.html" className="rounded-full bg-cyan-600 px-4 py-2 text-xs font-semibold text-white hover:bg-cyan-700">Launch Tool</a>
                    <a href="courses.html" className="rounded-full border border-slate-300 px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100">Find Related Course</a>
                  </div>
                </article>
              ))}
            </section>
          </EduPlatform.PlatformShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<StudyLabPage />);
    </script>
  </body>
</html>
