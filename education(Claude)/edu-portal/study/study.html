<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Study',      href:basePath+'study/study.html',active:true},
        {label:'Flashcards', href:basePath+'study/flashcards/flashcards.html'},
        {label:'Test',       href:basePath+'study/test/test.html'},
        {label:'Match',      href:'#'},
        {label:'Create',     href:'#',highlight:true},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.highlight?'bg-blue-600 text-white hover:bg-blue-700':l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="flex-1 hidden sm:block max-w-sm">
                <input type="search" placeholder="Search study sets…"
                  className="w-full pl-10 pr-4 py-2 text-sm border border-gray-300 rounded-full bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  aria-label="Search study sets"/>
              </div>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className={`block px-4 py-3 text-sm font-medium rounded-lg ${l.highlight?'bg-blue-600 text-white':'text-gray-700 hover:bg-blue-50'}`}>{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-10" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-8">
          {[{t:'Study Tools',ls:[['Study Hub',basePath+'study/study.html'],['Flashcards',basePath+'study/flashcards/flashcards.html'],['Practice Tests',basePath+'study/test/test.html']]},
            {t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-6 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    /* ── Hero B – Learning Tool ── */
    const HeroLearningTool = () => {
      const [email, setEmail] = useState('');
      return (
        <section className="bg-gradient-to-br from-blue-600 via-purple-600 to-indigo-700 text-white py-20 px-4" aria-labelledby="study-hero-heading">
          <div className="max-w-2xl mx-auto text-center">
            <h1 id="study-hero-heading" className="text-4xl sm:text-5xl font-extrabold mb-5 leading-tight">
              How are you<br/><span className="text-yellow-300">studying today?</span>
            </h1>
            <p className="text-blue-100 text-lg mb-8">
              Choose the learning mode that works best for you — from quick flashcard reviews to full timed practice tests.
            </p>
            <div className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-6">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="Enter your email"
                className="flex-1 px-4 py-3 rounded-xl text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                aria-label="Email address"/>
              <button className="px-6 py-3 bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold rounded-xl transition-colors focus-visible:ring-2 focus-visible:ring-white">
                Sign up free
              </button>
            </div>
            <a href={BP+'curriculum/curriculum.html'} className="text-blue-200 text-sm hover:text-white underline">
              I'm a teacher — show me educator tools →
            </a>
          </div>
        </section>
      );
    };

    /* ── Learning Mode Cards ── */
    const modes = [
      { title:'Study Mode',       icon:'📖', color:'from-blue-500 to-blue-700',   desc:'Adaptive learning that adjusts to your pace. Star terms you want to review.',  href: BP+'study/flashcards/flashcards.html', cta:'Start studying' },
      { title:'Flashcards',       icon:'🃏', color:'from-purple-500 to-purple-700',desc:'Classic flip-card review. Go through each term at your own speed.',             href: BP+'study/flashcards/flashcards.html', cta:'Browse cards' },
      { title:'Practice Test',    icon:'📝', color:'from-green-500 to-teal-600',   desc:'Full-length timed test simulating the real exam. Auto-graded with feedback.',   href: BP+'study/test/test.html',             cta:'Take a test' },
      { title:'Match Game',       icon:'🎮', color:'from-orange-500 to-red-500',   desc:'Race against the clock to match every term with its definition.',              href: '#',                                   cta:'Play now' },
    ];

    /* ── Recent Study Sets ── */
    const recentSets = [
      {title:'Biology: Cell Division & Mitosis',    count:28, subject:'Biology',    lastStudied:'Today',        progress:72},
      {title:'AP Calculus: Derivatives & Integrals',count:45, subject:'Math',       lastStudied:'Yesterday',    progress:38},
      {title:'US History: Civil War Period',         count:32, subject:'History',    lastStudied:'2 days ago',   progress:91},
      {title:'Spanish Vocabulary — Travel',          count:50, subject:'Languages',  lastStudied:'3 days ago',   progress:55},
      {title:'Chemistry: Periodic Table Elements',  count:118,subject:'Chemistry',  lastStudied:'Last week',    progress:20},
      {title:'SAT Vocabulary: High-Frequency Words',count:200,subject:'English',    lastStudied:'Last week',    progress:44},
    ];

    /* ── Popular Sets ── */
    const popularSets = [
      {title:'Human Anatomy Flashcards',            author:'MedStudent2024',  likes:'4.2K',subject:'Biology'},
      {title:'JavaScript Interview Questions',      author:'DevPrep',         likes:'8.1K',subject:'CS'},
      {title:'French B1 Grammar Rules',             author:'LanguageLab',     likes:'2.8K',subject:'French'},
      {title:'GMAT Quantitative Formulas',          author:'GradPrepAcademy', likes:'6.5K',subject:'Math'},
    ];

    const App = () => (
      <>
        <GlobalHeader basePath={BP}/>
        <main id="main-content">
          <HeroLearningTool/>

          {/* Learning mode cards */}
          <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12" aria-labelledby="modes-heading">
            <h2 id="modes-heading" className="text-2xl font-bold text-gray-900 mb-6 text-center">Pick your learning mode</h2>
            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {modes.map((m,i)=>(
                <a key={i} href={m.href}
                  className="card bg-white rounded-2xl overflow-hidden group focus-visible:ring-2 focus-visible:ring-blue-500">
                  <div className={`h-28 bg-gradient-to-br ${m.color} flex items-center justify-center text-5xl`} aria-hidden="true">{m.icon}</div>
                  <div className="p-5">
                    <h3 className="font-bold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">{m.title}</h3>
                    <p className="text-sm text-gray-500 mb-4 leading-snug">{m.desc}</p>
                    <span className="text-sm font-semibold text-blue-600 group-hover:underline">{m.cta} →</span>
                  </div>
                </a>
              ))}
            </div>
          </section>

          {/* Recent sets */}
          <section className="bg-white py-12 border-y border-gray-100" aria-labelledby="recent-heading">
            <div className="max-w-7xl mx-auto px-4 sm:px-6">
              <div className="flex items-center justify-between mb-6">
                <h2 id="recent-heading" className="text-2xl font-bold text-gray-900">Your recent sets</h2>
                <button className="text-sm font-semibold text-blue-600 hover:underline">View all →</button>
              </div>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {recentSets.map((set,i)=>(
                  <a key={i} href={BP+'study/flashcards/flashcards.html'}
                    className="card p-5 bg-white rounded-2xl border border-gray-100 group focus-visible:ring-2 focus-visible:ring-blue-500">
                    <div className="flex items-start justify-between mb-3">
                      <span className="badge bg-blue-50 text-blue-700 text-xs">{set.subject}</span>
                      <span className="text-xs text-gray-400">{set.lastStudied}</span>
                    </div>
                    <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-2 group-hover:text-blue-600 transition-colors">{set.title}</h3>
                    <p className="text-xs text-gray-500 mb-3">{set.count} terms</p>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-100 rounded-full h-2" aria-label={`Progress: ${set.progress}%`}>
                        <div className="bg-blue-500 h-2 rounded-full" style={{width:`${set.progress}%`}}/>
                      </div>
                      <span className="text-xs font-semibold text-gray-600">{set.progress}%</span>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </section>

          {/* Popular sets */}
          <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12" aria-labelledby="popular-heading">
            <div className="flex items-center justify-between mb-6">
              <h2 id="popular-heading" className="text-2xl font-bold text-gray-900">🔥 Popular study sets</h2>
              <button className="text-sm font-semibold text-blue-600 hover:underline">Browse library →</button>
            </div>
            <div className="grid sm:grid-cols-2 gap-4">
              {popularSets.map((s,i)=>(
                <a key={i} href={BP+'study/flashcards/flashcards.html'}
                  className="card flex items-center gap-4 p-5 bg-white rounded-2xl border border-gray-100 group focus-visible:ring-2 focus-visible:ring-blue-500">
                  <div className="w-12 h-12 rounded-xl gradient-brand flex items-center justify-center text-xl text-white flex-shrink-0" aria-hidden="true">📚</div>
                  <div className="flex-1 min-w-0">
                    <h3 className="font-semibold text-gray-900 text-sm leading-snug group-hover:text-blue-600 transition-colors truncate">{s.title}</h3>
                    <p className="text-xs text-gray-500 mt-0.5">by {s.author} · <span className="badge bg-gray-100 text-gray-600 ml-1 text-xs">{s.subject}</span></p>
                  </div>
                  <span className="text-xs text-gray-400 flex-shrink-0">❤️ {s.likes}</span>
                </a>
              ))}
            </div>
          </section>

          {/* CTA */}
          <div className="gradient-brand text-white py-14">
            <div className="max-w-2xl mx-auto px-4 text-center">
              <h2 className="text-3xl font-bold mb-4">Create your own study set</h2>
              <p className="text-blue-100 mb-7">Add your own terms, import from documents, or use AI to generate flashcards in seconds.</p>
              <div className="flex flex-wrap justify-center gap-4">
                <button className="px-7 py-3 bg-white text-blue-700 font-bold rounded-xl hover:bg-blue-50 transition-colors">Create a set</button>
                <a href={BP+'courses/courses.html'} className="px-7 py-3 bg-white/20 text-white font-semibold rounded-xl border border-white/30 hover:bg-white/30 transition-colors">Browse sets</a>
              </div>
            </div>
          </div>
        </main>
        <Footer basePath={BP}/>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
