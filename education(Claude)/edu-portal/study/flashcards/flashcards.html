<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const BP = '../../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Study',      href:basePath+'study/study.html'},
        {label:'Flashcards', href:basePath+'study/flashcards/flashcards.html',active:true},
        {label:'Test',       href:basePath+'study/test/test.html'},
        {label:'Match',      href:'#'},
        {label:'Create',     href:'#',highlight:true},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.highlight?'bg-blue-600 text-white hover:bg-blue-700':l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className={`block px-4 py-3 text-sm font-medium rounded-lg ${l.highlight?'bg-blue-600 text-white':'text-gray-700 hover:bg-blue-50'}`}>{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-8" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-6">
          {[{t:'Study Tools',ls:[['Study Hub',basePath+'study/study.html'],['Flashcards',basePath+'study/flashcards/flashcards.html'],['Tests',basePath+'study/test/test.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-5 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    /* ── Flashcard Data ── */
    const cards = [
      {front:'Mitosis',            back:'The process of cell division where one parent cell divides into two identical daughter cells. Occurs in somatic (body) cells.'},
      {front:'Meiosis',            back:'Cell division producing four non-identical daughter cells with half the chromosome number. Produces gametes (sperm and eggs).'},
      {front:'Chromosome',         back:'A thread-like structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information.'},
      {front:'DNA Replication',    back:'The biological process of producing two identical replicas of DNA from one original DNA molecule before cell division.'},
      {front:'Centromere',         back:'The region of a chromosome that joins the two sister chromatids and provides the attachment point for spindle fibers.'},
      {front:'Sister Chromatids',  back:'Two identical copies of a chromosome joined together by the centromere after DNA replication.'},
      {front:'Prophase',           back:'The first stage of mitosis/meiosis. Chromosomes condense, the nuclear envelope dissolves, and spindle fibers form.'},
      {front:'Metaphase',          back:'The second stage of mitosis/meiosis. Chromosomes align along the cell\'s equatorial plane (metaphase plate).'},
      {front:'Anaphase',           back:'The third stage of mitosis/meiosis. Sister chromatids are pulled to opposite poles of the cell by spindle fibers.'},
      {front:'Telophase',          back:'The final stage of mitosis/meiosis. Nuclear envelopes reform around each set of chromosomes, and chromosomes decondense.'},
    ];

    const App = () => {
      const [currentIdx, setCurrentIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [starred, setStarred] = useState(new Set());
      const [known, setKnown] = useState(new Set());
      const [review, setReview] = useState(new Set());
      const [showComplete, setShowComplete] = useState(false);

      const total = cards.length;
      const card = cards[currentIdx];

      const goNext = useCallback(() => {
        if(currentIdx < total-1) {
          setCurrentIdx(i=>i+1);
          setFlipped(false);
        } else {
          setShowComplete(true);
        }
      },[currentIdx, total]);

      const goPrev = () => {
        if(currentIdx > 0) {
          setCurrentIdx(i=>i-1);
          setFlipped(false);
        }
      };

      const markKnown = () => {
        setKnown(s=>new Set([...s, currentIdx]));
        goNext();
      };

      const markReview = () => {
        setReview(s=>new Set([...s, currentIdx]));
        goNext();
      };

      const restart = () => {
        setCurrentIdx(0);
        setFlipped(false);
        setKnown(new Set());
        setReview(new Set());
        setShowComplete(false);
      };

      // Keyboard navigation
      useEffect(()=>{
        const handleKey = e => {
          if(e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); goNext(); }
          else if(e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); goPrev(); }
          else if(e.key===' '||e.key==='Enter') { e.preventDefault(); setFlipped(f=>!f); }
        };
        window.addEventListener('keydown', handleKey);
        return ()=>window.removeEventListener('keydown', handleKey);
      },[goNext]);

      const progress = ((currentIdx) / total) * 100;

      if(showComplete) return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="min-h-screen flex items-center justify-center py-16 px-4">
            <div className="bg-white rounded-3xl shadow-lg border border-gray-200 p-10 max-w-md w-full text-center">
              <div className="text-6xl mb-5" aria-hidden="true">🎉</div>
              <h1 className="text-3xl font-extrabold text-gray-900 mb-3">Round complete!</h1>
              <p className="text-gray-500 mb-6">You went through all {total} flashcards.</p>
              <div className="grid grid-cols-2 gap-4 mb-8">
                <div className="bg-green-50 rounded-2xl p-4">
                  <div className="text-3xl font-bold text-green-600">{known.size}</div>
                  <div className="text-sm text-green-700 mt-1">Got it ✓</div>
                </div>
                <div className="bg-orange-50 rounded-2xl p-4">
                  <div className="text-3xl font-bold text-orange-600">{review.size}</div>
                  <div className="text-sm text-orange-700 mt-1">Still learning</div>
                </div>
              </div>
              <div className="flex flex-col gap-3">
                <button onClick={restart} className="py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500">
                  Study again
                </button>
                <a href={BP+'study/test/test.html'} className="py-3 border border-gray-300 text-gray-700 font-semibold rounded-xl hover:bg-gray-50 transition-colors">
                  Take a practice test
                </a>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );

      return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
            {/* Set info */}
            <div className="flex items-center justify-between mb-6">
              <div>
                <nav aria-label="Breadcrumb" className="text-sm text-gray-400 mb-1">
                  <ol className="flex items-center gap-2">
                    <li><a href={BP+'study/study.html'} className="hover:text-blue-600">Study</a></li>
                    <li aria-hidden="true">›</li>
                    <li className="text-gray-700" aria-current="page">Biology: Cell Division</li>
                  </ol>
                </nav>
                <h1 className="text-xl font-bold text-gray-900">Cell Division & Mitosis</h1>
                <p className="text-sm text-gray-500">Biology · {total} terms · Last edited 2 days ago</p>
              </div>
              <div className="flex gap-2">
                <button className="px-3 py-2 text-sm font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Edit this set">
                  ✏️ Edit
                </button>
                <button className="px-3 py-2 text-sm font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Share this set">
                  🔗 Share
                </button>
              </div>
            </div>

            {/* Progress bar */}
            <div className="mb-6">
              <div className="flex items-center justify-between text-sm text-gray-500 mb-2">
                <span>Card {currentIdx+1} of {total}</span>
                <div className="flex gap-3 text-xs">
                  <span className="text-green-600 font-semibold">✓ {known.size} known</span>
                  <span className="text-orange-600 font-semibold">↩ {review.size} review</span>
                </div>
              </div>
              <div className="bg-gray-200 rounded-full h-2" role="progressbar" aria-valuenow={currentIdx+1} aria-valuemin={1} aria-valuemax={total} aria-label="Card progress">
                <div className="bg-blue-500 h-2 rounded-full transition-all duration-300" style={{width:`${progress}%`}}/>
              </div>
            </div>

            {/* Flashcard */}
            <div className="flip-container mb-6 cursor-pointer" style={{height:'320px'}} aria-label={`Flashcard: ${flipped?'showing answer':'showing term'}. Press Space to flip.`}>
              <div className={`flip-card ${flipped?'flipped':''}`} onClick={()=>setFlipped(f=>!f)}>
                {/* Front */}
                <div className="flip-face bg-white rounded-3xl shadow-lg border border-gray-200 flex flex-col items-center justify-center p-10 select-none">
                  <p className="text-xs text-gray-400 uppercase tracking-wider mb-4 font-semibold">Term</p>
                  <p className="text-4xl font-extrabold text-gray-900 text-center">{card.front}</p>
                  <p className="text-sm text-gray-400 mt-8">Click or press Space to reveal definition</p>
                </div>
                {/* Back */}
                <div className="flip-face flip-back bg-gradient-to-br from-blue-600 to-purple-600 rounded-3xl shadow-lg flex flex-col items-center justify-center p-10 select-none">
                  <p className="text-xs text-blue-200 uppercase tracking-wider mb-4 font-semibold">Definition</p>
                  <p className="text-xl font-semibold text-white text-center leading-relaxed">{card.back}</p>
                </div>
              </div>
            </div>

            {/* Star button */}
            <div className="flex justify-center mb-5">
              <button onClick={()=>setStarred(s=>{const n=new Set(s);n.has(currentIdx)?n.delete(currentIdx):n.add(currentIdx);return n;})}
                className={`p-2 rounded-full text-2xl transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 ${starred.has(currentIdx)?'text-yellow-400':'text-gray-300 hover:text-yellow-400'}`}
                aria-label={starred.has(currentIdx)?'Remove star':'Star this card'} aria-pressed={starred.has(currentIdx)}>
                ★
              </button>
            </div>

            {/* Actions */}
            <div className="flex items-center justify-center gap-4 mb-8">
              <button onClick={markReview}
                className="flex items-center gap-2 px-6 py-3 bg-orange-100 text-orange-700 font-semibold rounded-xl hover:bg-orange-200 transition-colors focus-visible:ring-2 focus-visible:ring-orange-500"
                aria-label="Mark as still learning">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                Still learning
              </button>
              <div className="flex gap-2">
                <button onClick={goPrev} disabled={currentIdx===0}
                  className="w-12 h-12 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors focus-visible:ring-2 focus-visible:ring-blue-500"
                  aria-label="Previous card">
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button onClick={goNext}
                  className="w-12 h-12 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500"
                  aria-label="Next card">
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                </button>
              </div>
              <button onClick={markKnown}
                className="flex items-center gap-2 px-6 py-3 bg-green-100 text-green-700 font-semibold rounded-xl hover:bg-green-200 transition-colors focus-visible:ring-2 focus-visible:ring-green-500"
                aria-label="Mark as known">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                Got it!
              </button>
            </div>

            <p className="text-center text-xs text-gray-400">Keyboard: ← → to navigate · Space/Enter to flip</p>

            {/* Card list preview */}
            <div className="mt-10 bg-white rounded-2xl border border-gray-200 overflow-hidden">
              <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 className="font-semibold text-gray-900">All terms in this set</h2>
                <span className="text-sm text-gray-400">{total} terms</span>
              </div>
              <ul>
                {cards.map((c,i)=>(
                  <li key={i} className={`flex items-start gap-4 px-5 py-4 border-b border-gray-50 last:border-b-0 ${i===currentIdx?'bg-blue-50':''}`}>
                    <button onClick={()=>{setCurrentIdx(i);setFlipped(false);}} className="text-left flex-1 focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                      <span className="font-semibold text-sm text-gray-900">{c.front}</span>
                    </button>
                    <span className="text-sm text-gray-500 flex-1">{c.back.substring(0,60)}…</span>
                    <div className="flex gap-1.5">
                      {known.has(i) && <span className="badge bg-green-50 text-green-700 text-xs">✓</span>}
                      {review.has(i) && <span className="badge bg-orange-50 text-orange-700 text-xs">↩</span>}
                      {starred.has(i) && <span className="text-yellow-400 text-sm">★</span>}
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
