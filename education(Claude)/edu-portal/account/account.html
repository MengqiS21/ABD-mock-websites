<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Settings – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Courses',    href:basePath+'courses/courses.html'},
        {label:'Subjects',   href:basePath+'subjects/subjects.html'},
        {label:'Plans',      href:basePath+'plans/plans.html'},
        {label:'Dashboard',  href:basePath+'dashboard/dashboard.html'},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} className="px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-3 ml-auto">
                <a href={basePath+'dashboard/dashboard.html'} className="flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-blue-600 focus-visible:ring-2 focus-visible:ring-blue-500 rounded-lg px-2 py-1">
                  <div className="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" aria-hidden="true">JD</div>
                  Jordan D.
                </a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 rounded-lg">{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-8 mt-auto" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-6">
          {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]},
            {t:'Company',ls:[['About','#'],['Help Center','#']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-5 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    const sideNav = [
      {icon:'👤',label:'Profile',         id:'profile'},
      {icon:'🔔',label:'Notifications',   id:'notifications'},
      {icon:'💳',label:'Billing & Plan',  id:'billing'},
      {icon:'🔐',label:'Security',        id:'security'},
      {icon:'🌍',label:'Language',        id:'language'},
      {icon:'🎨',label:'Appearance',      id:'appearance'},
      {icon:'🚪',label:'Sign out',        id:'signout', danger:true},
    ];

    const App = () => {
      const [activeTab, setActiveTab] = useState('profile');
      const [profile, setProfile] = useState({
        firstName:'Jordan', lastName:'Davis', email:'jordan.davis@example.com',
        username:'jordan_d', bio:'Lifelong learner. Software engineer. Passionate about ML and UX design.',
        timezone:'America/Los_Angeles', website:'https://jordandavis.dev',
      });
      const [saved, setSaved] = useState(false);
      const [notifications, setNotifications] = useState({
        email_newLesson:true, email_reminders:true, email_newsletters:false,
        push_streakReminder:true, push_completions:true, push_recommendations:false,
        sms_criticalOnly:false,
      });
      const [twoFA, setTwoFA] = useState(false);

      const handleSave = (e) => {
        e.preventDefault();
        setSaved(true);
        setTimeout(()=>setSaved(false), 3000);
      };

      return (
        <div className="flex flex-col min-h-screen">
          <GlobalHeader basePath={BP}/>
          <div className="max-w-5xl mx-auto w-full px-4 sm:px-6 py-8 flex gap-6 flex-1">
            {/* Sidebar */}
            <aside className="hidden md:block w-52 flex-shrink-0" aria-label="Account settings navigation">
              {/* Avatar card */}
              <div className="bg-white rounded-2xl border border-gray-200 p-5 mb-4 text-center">
                <div className="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-white font-extrabold text-2xl mx-auto mb-3" aria-hidden="true">JD</div>
                <p className="font-bold text-gray-900 text-sm">{profile.firstName} {profile.lastName}</p>
                <span className="badge bg-blue-100 text-blue-700 text-xs mt-1 inline-flex">⚡ Plus</span>
                <p className="text-xs text-gray-500 mt-2">Member since Jan 2022</p>
              </div>
              <nav aria-label="Account settings sections">
                {sideNav.map(item=>(
                  <button key={item.id} onClick={()=>setActiveTab(item.id)}
                    className={`sidebar-link w-full text-left mb-0.5 focus-visible:ring-2 focus-visible:ring-blue-500 ${activeTab===item.id?'active':''} ${item.danger?'text-red-600 hover:bg-red-50 hover:text-red-700':''}`}
                    aria-current={activeTab===item.id?'page':undefined}>
                    <span aria-hidden="true">{item.icon}</span>
                    {item.label}
                  </button>
                ))}
              </nav>
            </aside>

            {/* Main panel */}
            <main id="main-content" className="flex-1 min-w-0">
              {/* Breadcrumb */}
              <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-6">
                <ol className="flex items-center gap-2">
                  <li><a href={BP+'dashboard/dashboard.html'} className="hover:text-blue-600">Dashboard</a></li>
                  <li aria-hidden="true">›</li>
                  <li aria-current="page" className="text-gray-900 font-medium">Account Settings</li>
                </ol>
              </nav>

              {/* Profile tab */}
              {activeTab==='profile' && (
                <div className="space-y-6">
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900">Profile Settings</h1>
                    <p className="text-gray-500 text-sm mt-1">Manage your public profile and personal information.</p>
                  </div>

                  {/* Avatar upload */}
                  <div className="bg-white rounded-2xl border border-gray-200 p-6">
                    <h2 className="font-semibold text-gray-900 mb-4">Profile photo</h2>
                    <div className="flex items-center gap-5">
                      <div className="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white font-extrabold text-3xl flex-shrink-0" aria-hidden="true">JD</div>
                      <div>
                        <div className="flex gap-3 mb-2">
                          <button className="px-4 py-2 text-sm font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-700 focus-visible:ring-2 focus-visible:ring-blue-500">
                            Upload photo
                          </button>
                          <button className="px-4 py-2 text-sm font-medium text-red-600 border border-red-200 rounded-lg hover:bg-red-50 focus-visible:ring-2 focus-visible:ring-red-500">
                            Remove
                          </button>
                        </div>
                        <p className="text-xs text-gray-400">JPG, PNG or GIF. Max 5MB. Min 200×200px.</p>
                      </div>
                    </div>
                  </div>

                  {/* Profile form */}
                  <form onSubmit={handleSave} className="bg-white rounded-2xl border border-gray-200 p-6 space-y-5" noValidate>
                    <h2 className="font-semibold text-gray-900">Personal information</h2>
                    <div className="grid sm:grid-cols-2 gap-4">
                      <div>
                        <label htmlFor="acc-first" className="block text-sm font-medium text-gray-700 mb-1">First name</label>
                        <input id="acc-first" type="text" value={profile.firstName} onChange={e=>setProfile({...profile,firstName:e.target.value})}
                          className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      </div>
                      <div>
                        <label htmlFor="acc-last" className="block text-sm font-medium text-gray-700 mb-1">Last name</label>
                        <input id="acc-last" type="text" value={profile.lastName} onChange={e=>setProfile({...profile,lastName:e.target.value})}
                          className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      </div>
                    </div>
                    <div>
                      <label htmlFor="acc-email" className="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                      <input id="acc-email" type="email" value={profile.email} onChange={e=>setProfile({...profile,email:e.target.value})}
                        className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                    </div>
                    <div>
                      <label htmlFor="acc-username" className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                      <div className="flex">
                        <span className="flex items-center px-3 bg-gray-50 border border-r-0 border-gray-300 rounded-l-xl text-sm text-gray-500">eduportal.com/</span>
                        <input id="acc-username" type="text" value={profile.username} onChange={e=>setProfile({...profile,username:e.target.value})}
                          className="flex-1 px-4 py-2.5 border border-gray-300 rounded-r-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      </div>
                    </div>
                    <div>
                      <label htmlFor="acc-bio" className="block text-sm font-medium text-gray-700 mb-1">Bio</label>
                      <textarea id="acc-bio" rows={3} value={profile.bio} onChange={e=>setProfile({...profile,bio:e.target.value})}
                        className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                        maxLength={280}/>
                      <p className="text-xs text-gray-400 mt-1 text-right">{profile.bio.length}/280</p>
                    </div>
                    <div className="grid sm:grid-cols-2 gap-4">
                      <div>
                        <label htmlFor="acc-tz" className="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
                        <select id="acc-tz" value={profile.timezone} onChange={e=>setProfile({...profile,timezone:e.target.value})}
                          className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                          <option value="America/Los_Angeles">Pacific Time (PT)</option>
                          <option value="America/New_York">Eastern Time (ET)</option>
                          <option value="America/Chicago">Central Time (CT)</option>
                          <option value="Europe/London">London (GMT)</option>
                          <option value="Asia/Tokyo">Tokyo (JST)</option>
                        </select>
                      </div>
                      <div>
                        <label htmlFor="acc-website" className="block text-sm font-medium text-gray-700 mb-1">Website</label>
                        <input id="acc-website" type="url" value={profile.website} onChange={e=>setProfile({...profile,website:e.target.value})}
                          className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 pt-2">
                      <button type="submit" className="px-6 py-2.5 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2">
                        Save changes
                      </button>
                      {saved && <span className="text-green-600 text-sm font-medium animate-pulse" role="status" aria-live="polite">✓ Changes saved!</span>}
                    </div>
                  </form>
                </div>
              )}

              {/* Notifications tab */}
              {activeTab==='notifications' && (
                <div>
                  <h1 className="text-2xl font-bold text-gray-900 mb-1">Notification Preferences</h1>
                  <p className="text-gray-500 text-sm mb-6">Choose how and when EduPortal contacts you.</p>
                  {[
                    {title:'Email notifications', prefix:'email_', items:[
                      {id:'newLesson',label:'New lesson releases',desc:'Get notified when instructors you follow publish new content'},
                      {id:'reminders',label:'Study reminders',desc:'Daily reminders to maintain your learning streak'},
                      {id:'newsletters',label:'Product updates & newsletter',desc:'Monthly tips, feature announcements, and curated content'},
                    ]},
                    {title:'Push notifications', prefix:'push_', items:[
                      {id:'streakReminder',label:'Streak reminder',desc:'A gentle nudge if you haven\'t studied today'},
                      {id:'completions',label:'Course completions',desc:'Celebrate when you finish a course or earn a certificate'},
                      {id:'recommendations',label:'Personalized recommendations',desc:'Courses tailored to your learning history'},
                    ]},
                    {title:'SMS', prefix:'sms_', items:[
                      {id:'criticalOnly',label:'Critical alerts only',desc:'Security alerts and account-critical messages'},
                    ]},
                  ].map(group=>(
                    <div key={group.title} className="bg-white rounded-2xl border border-gray-200 p-6 mb-5">
                      <h2 className="font-semibold text-gray-900 mb-4">{group.title}</h2>
                      <div className="space-y-4">
                        {group.items.map(item=>{
                          const key = `${group.prefix}${item.id}`;
                          return (
                            <div key={key} className="flex items-start justify-between gap-4">
                              <div>
                                <p className="text-sm font-medium text-gray-900">{item.label}</p>
                                <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
                              </div>
                              <button
                                role="switch" aria-checked={notifications[key]} onClick={()=>setNotifications(n=>({...n,[key]:!n[key]}))}
                                className={`relative flex-shrink-0 w-11 h-6 rounded-full transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 ${notifications[key]?'bg-blue-600':'bg-gray-300'}`}
                                aria-label={item.label}>
                                <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-transform ${notifications[key]?'translate-x-6':'translate-x-1'}`} aria-hidden="true"/>
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Billing tab */}
              {activeTab==='billing' && (
                <div>
                  <h1 className="text-2xl font-bold text-gray-900 mb-1">Billing & Plan</h1>
                  <p className="text-gray-500 text-sm mb-6">Manage your subscription, payment method, and billing history.</p>

                  {/* Current plan */}
                  <div className="bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl p-6 text-white mb-5">
                    <div className="flex items-start justify-between">
                      <div>
                        <span className="badge bg-white/20 text-white text-xs mb-2 inline-flex">Current plan</span>
                        <h2 className="text-2xl font-extrabold">EduPortal Plus</h2>
                        <p className="text-blue-100 mt-1">Billed annually · Next renewal Jan 15, 2025</p>
                        <p className="text-3xl font-bold mt-3">$11.99<span className="text-blue-200 text-base font-normal">/month</span></p>
                      </div>
                      <span className="badge bg-white/20 text-white text-sm">⚡ Active</span>
                    </div>
                    <div className="flex gap-3 mt-5">
                      <a href={BP+'plans/plans.html'} className="px-5 py-2.5 bg-white text-blue-700 font-bold rounded-xl hover:bg-blue-50 transition-colors text-sm">
                        Upgrade to Teams
                      </a>
                      <button className="px-5 py-2.5 bg-white/20 text-white font-semibold rounded-xl border border-white/30 hover:bg-white/30 transition-colors text-sm">
                        Cancel plan
                      </button>
                    </div>
                  </div>

                  {/* Payment method */}
                  <div className="bg-white rounded-2xl border border-gray-200 p-6 mb-5">
                    <h2 className="font-semibold text-gray-900 mb-4">Payment method</h2>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-8 bg-blue-700 rounded-lg flex items-center justify-center" aria-hidden="true">
                          <span className="text-white text-xs font-bold">VISA</span>
                        </div>
                        <div>
                          <p className="text-sm font-medium text-gray-900">Visa ending in 4242</p>
                          <p className="text-xs text-gray-500">Expires 09/27</p>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button className="px-3 py-1.5 text-xs font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-700 focus-visible:ring-2 focus-visible:ring-blue-500">Edit</button>
                        <button className="px-3 py-1.5 text-xs font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-700 focus-visible:ring-2 focus-visible:ring-blue-500">Remove</button>
                      </div>
                    </div>
                    <button className="mt-4 flex items-center gap-2 text-sm text-blue-600 font-semibold hover:underline focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                      Add payment method
                    </button>
                  </div>

                  {/* Billing history */}
                  <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                    <div className="px-6 py-4 border-b border-gray-100">
                      <h2 className="font-semibold text-gray-900">Billing history</h2>
                    </div>
                    <table className="w-full text-sm" aria-label="Billing history">
                      <thead><tr className="border-b border-gray-100 bg-gray-50">
                        <th className="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                        <th className="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Description</th>
                        <th className="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Amount</th>
                        <th className="text-center px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                        <th className="px-6 py-3"></th>
                      </tr></thead>
                      <tbody>
                        {[{d:'Jan 15, 2024',desc:'EduPortal Plus – Annual',amt:'$143.88',status:'Paid'},
                          {d:'Jan 15, 2023',desc:'EduPortal Plus – Annual',amt:'$143.88',status:'Paid'},
                          {d:'Jan 15, 2022',desc:'EduPortal Basic – Free trial',amt:'$0.00', status:'Paid'},
                        ].map((row,i)=>(
                          <tr key={i} className="border-b border-gray-50 last:border-b-0 hover:bg-gray-50">
                            <td className="px-6 py-4 text-gray-600">{row.d}</td>
                            <td className="px-6 py-4 text-gray-900 font-medium">{row.desc}</td>
                            <td className="px-6 py-4 text-right text-gray-900 font-semibold">{row.amt}</td>
                            <td className="px-6 py-4 text-center"><span className="badge bg-green-100 text-green-700 text-xs">{row.status}</span></td>
                            <td className="px-6 py-4 text-right"><a href="#" className="text-xs text-blue-600 hover:underline">Invoice</a></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* Security tab */}
              {activeTab==='security' && (
                <div>
                  <h1 className="text-2xl font-bold text-gray-900 mb-1">Security Settings</h1>
                  <p className="text-gray-500 text-sm mb-6">Keep your account safe with strong authentication options.</p>

                  <div className="space-y-5">
                    {/* Password */}
                    <div className="bg-white rounded-2xl border border-gray-200 p-6">
                      <h2 className="font-semibold text-gray-900 mb-4">Change password</h2>
                      <div className="space-y-4 max-w-sm">
                        {[{id:'cur-pass',label:'Current password',placeholder:'Enter current password'},
                          {id:'new-pass',label:'New password',placeholder:'Min 8 characters'},
                          {id:'conf-pass',label:'Confirm new password',placeholder:'Repeat new password'}].map(f=>(
                          <div key={f.id}>
                            <label htmlFor={f.id} className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
                            <input id={f.id} type="password" placeholder={f.placeholder}
                              className="w-full px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                        ))}
                        <button className="px-6 py-2.5 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors text-sm focus-visible:ring-2 focus-visible:ring-blue-500">
                          Update password
                        </button>
                      </div>
                    </div>

                    {/* 2FA */}
                    <div className="bg-white rounded-2xl border border-gray-200 p-6">
                      <div className="flex items-start justify-between gap-4">
                        <div>
                          <h2 className="font-semibold text-gray-900">Two-factor authentication</h2>
                          <p className="text-sm text-gray-500 mt-1">Add an extra layer of security by requiring a code in addition to your password.</p>
                          <p className="text-xs mt-2 font-semibold" style={{color:twoFA?'#16A34A':'#DC2626'}}>{twoFA?'✓ Enabled':'✗ Not enabled'}</p>
                        </div>
                        <button role="switch" aria-checked={twoFA} onClick={()=>setTwoFA(!twoFA)}
                          className={`relative flex-shrink-0 w-11 h-6 rounded-full transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 ${twoFA?'bg-blue-600':'bg-gray-300'}`}
                          aria-label="Two-factor authentication">
                          <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-transform ${twoFA?'translate-x-6':'translate-x-1'}`} aria-hidden="true"/>
                        </button>
                      </div>
                    </div>

                    {/* Active sessions */}
                    <div className="bg-white rounded-2xl border border-gray-200 p-6">
                      <h2 className="font-semibold text-gray-900 mb-4">Active sessions</h2>
                      <div className="space-y-3">
                        {[{device:'MacBook Pro – Chrome',loc:'San Francisco, CA',time:'Now (current)',current:true},
                          {device:'iPhone 15 – Safari',loc:'San Francisco, CA',time:'2 hours ago'},
                          {device:'Windows PC – Firefox',loc:'New York, NY',time:'3 days ago'},
                        ].map((s,i)=>(
                          <div key={i} className={`flex items-center justify-between p-4 rounded-xl ${s.current?'bg-blue-50 border border-blue-200':'bg-gray-50'}`}>
                            <div>
                              <p className="text-sm font-semibold text-gray-900">{s.device} {s.current&&<span className="badge bg-blue-600 text-white text-xs ml-2">This device</span>}</p>
                              <p className="text-xs text-gray-500 mt-0.5">{s.loc} · {s.time}</p>
                            </div>
                            {!s.current&&<button className="text-xs text-red-600 font-semibold hover:underline focus-visible:ring-2 focus-visible:ring-red-500 rounded">Sign out</button>}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Danger zone */}
                    <div className="bg-red-50 rounded-2xl border border-red-200 p-6">
                      <h2 className="font-semibold text-red-900 mb-2">Danger zone</h2>
                      <p className="text-sm text-red-700 mb-4">Once you delete your account, there is no going back. All your data, courses, and certificates will be permanently deleted.</p>
                      <button className="px-5 py-2.5 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition-colors text-sm focus-visible:ring-2 focus-visible:ring-red-500">
                        Delete account
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Other tabs placeholder */}
              {!['profile','notifications','billing','security'].includes(activeTab) && (
                <div className="bg-white rounded-2xl border border-gray-200 p-16 text-center">
                  <div className="text-5xl mb-4" aria-hidden="true">⚙️</div>
                  <h1 className="text-xl font-bold text-gray-900 mb-2">{sideNav.find(n=>n.id===activeTab)?.label}</h1>
                  <p className="text-gray-500">This section is coming soon.</p>
                </div>
              )}
            </main>
          </div>
          <Footer basePath={BP}/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
