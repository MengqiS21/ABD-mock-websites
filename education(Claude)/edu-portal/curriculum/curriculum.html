<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curriculum – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Courses',href:basePath+'courses/courses.html'},
        {label:'Subjects',href:basePath+'subjects/subjects.html'},
        {label:'Curriculum',href:basePath+'curriculum/curriculum.html',active:true},
        {label:'Plans',href:basePath+'plans/plans.html'},
        {label:'Enterprise',href:basePath+'enterprise/enterprise.html'},
        {label:'Dashboard',href:basePath+'dashboard/dashboard.html'},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href={basePath+'plans/plans.html'} className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Start free</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 rounded-lg">{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-10" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-8">
          {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html'],['Curriculum',basePath+'curriculum/curriculum.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]},
            {t:'Company',ls:[['About','#'],['Contact','#']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-6 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    /* ── Data ── */
    const sidebarData = [
      { subject:'Mathematics', grades:[
        {g:'Grade 6',units:['Number Systems','Ratios & Proportions','Expressions & Equations','Geometry','Statistics']},
        {g:'Grade 7',units:['Proportional Relationships','Number Operations','Expressions','Geometry','Probability']},
        {g:'Grade 8',units:['Number System','Expressions & Equations','Functions','Geometry','Statistics']},
        {g:'Algebra I',units:['Linear Equations','Inequalities','Systems','Quadratics','Functions']},
        {g:'Geometry',units:['Congruence','Similarity','Circles','Trigonometry','Modeling']},
      ]},
      { subject:'Science', grades:[
        {g:'Grade 6',units:['Earth Science','Life Science','Physical Science','Engineering']},
        {g:'Biology',units:['Cells','Genetics','Evolution','Ecosystems','Anatomy']},
        {g:'Chemistry',units:['Atomic Theory','Chemical Bonding','Reactions','Stoichiometry']},
        {g:'Physics',units:['Mechanics','Energy','Waves','Electricity','Modern Physics']},
      ]},
      { subject:'English', grades:[
        {g:'Grade 6–8',units:['Reading Literature','Informational Text','Writing','Language','Speaking']},
        {g:'Grade 9–10',units:['Reading','Writing','Research','Language','Oral Communication']},
        {g:'Grade 11–12',units:['Advanced Reading','Argument Writing','Research Papers','Language Mastery']},
      ]},
    ];

    const lessons = [
      {icon:'🎬',title:'Introduction to Algebraic Expressions',type:'Video',dur:'12 min',standard:'CCSS.MATH.CONTENT.7.EE.A.1'},
      {icon:'📄',title:'What Are Variables and Constants?',type:'Article',dur:'5 min',standard:'CCSS.MATH.CONTENT.7.EE.A.1'},
      {icon:'💻',title:'Simplifying Expressions Practice',type:'Practice',dur:'20 min',standard:'CCSS.MATH.CONTENT.7.EE.A.1'},
      {icon:'🎬',title:'Combining Like Terms',type:'Video',dur:'14 min',standard:'CCSS.MATH.CONTENT.7.EE.A.2'},
      {icon:'📄',title:'The Distributive Property',type:'Article',dur:'7 min',standard:'CCSS.MATH.CONTENT.7.EE.A.2'},
      {icon:'💻',title:'Distributive Property Practice Set',type:'Practice',dur:'25 min',standard:'CCSS.MATH.CONTENT.7.EE.A.2'},
      {icon:'📝',title:'Unit 3 Quiz: Expressions',type:'Quiz',dur:'15 min',standard:'CCSS.MATH.CONTENT.7.EE.A.1–2'},
      {icon:'🎬',title:'Writing Equations from Word Problems',type:'Video',dur:'18 min',standard:'CCSS.MATH.CONTENT.7.EE.B.3'},
      {icon:'💻',title:'Equation Word Problem Practice',type:'Practice',dur:'30 min',standard:'CCSS.MATH.CONTENT.7.EE.B.3'},
      {icon:'🏆',title:'Unit Project: Real-World Equations',type:'Project',dur:'45 min',standard:'CCSS.MATH.CONTENT.7.EE.B.4'},
    ];

    const typeColors = {
      Video:    'bg-blue-50 text-blue-700',
      Article:  'bg-gray-100 text-gray-700',
      Practice: 'bg-green-50 text-green-700',
      Quiz:     'bg-purple-50 text-purple-700',
      Project:  'bg-orange-50 text-orange-700',
    };

    const App = () => {
      const [openSubject, setOpenSubject] = useState(0);
      const [openGrade, setOpenGrade] = useState(0);
      const [activeLesson, setActiveLesson] = useState(null);

      return (
        <>
          <GlobalHeader basePath={BP}/>
          <main id="main-content" className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            {/* Breadcrumb */}
            <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-6">
              <ol className="flex items-center gap-2">
                <li><a href={BP+'index.html'} className="hover:text-blue-600">Home</a></li>
                <li aria-hidden="true">›</li>
                <li><a href={BP+'subjects/subjects.html'} className="hover:text-blue-600">Subjects</a></li>
                <li aria-hidden="true">›</li>
                <li aria-current="page" className="text-gray-900 font-medium">Mathematics · Grade 7</li>
              </ol>
            </nav>

            <div className="flex gap-7 items-start">
              {/* ── Curriculum Sidebar ── */}
              <aside className="hidden lg:block w-64 flex-shrink-0 sticky top-20" aria-label="Curriculum navigation">
                {/* Export tools */}
                <div className="flex gap-2 mb-4">
                  <button className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Download CSV">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    CSV
                  </button>
                  <button className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Print curriculum">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                    Print
                  </button>
                  <button className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Share curriculum">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                    Share
                  </button>
                </div>

                <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                  <div className="px-4 py-3 bg-gray-50 border-b border-gray-200">
                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Standards Navigator</p>
                  </div>
                  {sidebarData.map((subj, si)=>(
                    <div key={si} className="border-b border-gray-100 last:border-b-0">
                      <button onClick={()=>setOpenSubject(openSubject===si?null:si)}
                        className="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-inset"
                        aria-expanded={openSubject===si}>
                        <span className="text-sm font-semibold text-gray-900">{subj.subject}</span>
                        <svg className={`w-4 h-4 text-gray-400 transition-transform ${openSubject===si?'rotate-90':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/>
                        </svg>
                      </button>
                      {openSubject===si && (
                        <div className="bg-blue-50/50">
                          {subj.grades.map((gr, gi)=>(
                            <div key={gi}>
                              <button onClick={()=>setOpenGrade(openGrade===`${si}-${gi}`?null:`${si}-${gi}`)}
                                className="w-full flex items-center justify-between pl-8 pr-4 py-2.5 hover:bg-blue-100/50 transition-colors text-sm focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-inset"
                                aria-expanded={openGrade===`${si}-${gi}`}>
                                <span className={`font-medium ${openGrade===`${si}-${gi}`?'text-blue-700':'text-gray-700'}`}>{gr.g}</span>
                                <svg className={`w-3 h-3 text-gray-400 transition-transform ${openGrade===`${si}-${gi}`?'rotate-90':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/>
                                </svg>
                              </button>
                              {openGrade===`${si}-${gi}` && (
                                <ul className="pl-12 pr-4 py-1 space-y-1">
                                  {gr.units.map((unit, ui)=>(
                                    <li key={ui}>
                                      <a href="#" className="sidebar-link text-xs py-1.5 hover:text-blue-600">{unit}</a>
                                    </li>
                                  ))}
                                </ul>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </aside>

              {/* ── Main Content ── */}
              <div className="flex-1 min-w-0">
                {/* Course header */}
                <div className="bg-white rounded-2xl border border-gray-200 p-6 mb-6">
                  <div className="flex items-start justify-between gap-4">
                    <div>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="badge bg-blue-100 text-blue-700">Mathematics</span>
                        <span className="badge bg-gray-100 text-gray-700">Grade 7</span>
                        <span className="badge bg-green-100 text-green-700">CCSS Aligned</span>
                      </div>
                      <h1 className="text-2xl font-bold text-gray-900 mb-1">Expressions and Equations</h1>
                      <p className="text-gray-500 text-sm">Unit 3 of 5 · 7.EE — Common Core State Standards</p>
                    </div>
                    <button className="hidden sm:flex items-center gap-2 px-4 py-2 text-sm font-medium border border-gray-300 rounded-lg hover:bg-gray-50 text-gray-600 focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Download unit resources">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                      Download
                    </button>
                  </div>

                  <div className="mt-5 p-4 bg-blue-50 rounded-xl">
                    <h2 className="text-sm font-semibold text-blue-900 mb-1">Standard Description</h2>
                    <p className="text-sm text-blue-800 leading-relaxed">
                      Apply properties of operations to add, subtract, factor, and expand linear expressions with rational coefficients. Understand that rewriting an expression in different forms can shed light on the problem and how the quantities in it are related.
                    </p>
                    <p className="text-xs text-blue-600 mt-2 font-mono">7.EE.A.1 · 7.EE.A.2 · 7.EE.B.3 · 7.EE.B.4</p>
                  </div>

                  <div className="mt-5 grid grid-cols-3 gap-4 text-center">
                    {[{n:'10',l:'Lessons'},{n:'~3.5h',l:'Total time'},{n:'2',l:'Projects'}].map(s=>(
                      <div key={s.l} className="bg-gray-50 rounded-xl p-3">
                        <div className="text-xl font-bold text-gray-900">{s.n}</div>
                        <div className="text-xs text-gray-500">{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Learning objectives */}
                <div className="bg-white rounded-2xl border border-gray-200 p-6 mb-6">
                  <h2 className="font-bold text-gray-900 mb-4">Learning Objectives</h2>
                  <ul className="space-y-2">
                    {['Apply properties of operations to algebraic expressions','Identify and combine like terms efficiently','Use the distributive property in complex expressions','Write and solve one-step and two-step equations','Solve real-world problems using linear equations'].map(obj=>(
                      <li key={obj} className="flex items-start gap-2 text-sm text-gray-700">
                        <svg className="w-4 h-4 text-green-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>
                        {obj}
                      </li>
                    ))}
                  </ul>
                </div>

                {/* Lesson list */}
                <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                  <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                    <h2 className="font-bold text-gray-900">Lesson Plan</h2>
                    <div className="flex gap-2">
                      {['All','Video','Practice','Quiz'].map(f=>(
                        <button key={f} className="px-3 py-1 text-xs font-medium rounded-full text-gray-600 border border-gray-200 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500">
                          {f}
                        </button>
                      ))}
                    </div>
                  </div>
                  <ul role="list">
                    {lessons.map((lesson, i)=>(
                      <li key={i} role="listitem">
                        <button
                          onClick={()=>setActiveLesson(activeLesson===i?null:i)}
                          className={`w-full flex items-center gap-4 px-6 py-4 hover:bg-gray-50 transition-colors border-b border-gray-50 last:border-b-0 text-left focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-inset ${activeLesson===i?'bg-blue-50/50':''}`}
                          aria-expanded={activeLesson===i}>
                          <span className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold text-gray-600 flex-shrink-0" aria-hidden="true">{i+1}</span>
                          <span className="text-xl flex-shrink-0" aria-hidden="true">{lesson.icon}</span>
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-medium text-gray-900 truncate">{lesson.title}</p>
                            <p className="text-xs text-gray-400 font-mono mt-0.5">{lesson.standard}</p>
                          </div>
                          <span className={`badge text-xs flex-shrink-0 ${typeColors[lesson.type]||'bg-gray-100 text-gray-700'}`}>{lesson.type}</span>
                          <span className="text-xs text-gray-400 flex-shrink-0 hidden sm:inline">{lesson.dur}</span>
                        </button>
                        {activeLesson===i && (
                          <div className="px-6 py-4 bg-blue-50/50 border-b border-blue-100">
                            <p className="text-sm text-gray-700 mb-3">This lesson covers the standard <strong>{lesson.standard}</strong> through {lesson.type.toLowerCase()} format. Students will engage with {lesson.type==='Video'?'instructor-led video content with pause points and embedded questions':lesson.type==='Practice'?'guided exercises with immediate feedback and hints':lesson.type==='Quiz'?'formative assessment aligned to the standard':lesson.type==='Project'?'a project-based learning task integrating multiple standards':'interactive learning content'}.</p>
                            <div className="flex gap-3">
                              <a href={BP+'study/study.html'} className="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors">Start lesson</a>
                              <button className="px-4 py-2 border border-gray-300 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">Preview</button>
                            </div>
                          </div>
                        )}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
