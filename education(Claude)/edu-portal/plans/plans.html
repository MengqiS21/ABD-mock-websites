<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plans & Pricing – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',100:'#DBEAFE',600:'#2563EB',700:'#1D4ED8'},secondary:{50:'#F5F3FF',600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const AnnouncementBar = () => {
      const [closed, setClosed] = useState(false);
      if(closed) return null;
      return (
        <div className="bg-purple-600 text-white text-sm py-2 px-4" role="alert" aria-live="polite">
          <div className="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div className="flex-1 text-center">🎁 Annual plans now <strong>40% off</strong> — limited time offer for new subscribers!</div>
            <button onClick={()=>setClosed(true)} aria-label="Dismiss announcement"
              className="text-purple-200 hover:text-white text-2xl leading-none flex-shrink-0">×</button>
          </div>
        </div>
      );
    };

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Courses',    href:basePath+'courses/courses.html'},
        {label:'Subjects',   href:basePath+'subjects/subjects.html'},
        {label:'Curriculum', href:basePath+'curriculum/curriculum.html'},
        {label:'Plans',      href:basePath+'plans/plans.html',active:true},
        {label:'Enterprise', href:basePath+'enterprise/enterprise.html'},
        {label:'Dashboard',  href:basePath+'dashboard/dashboard.html'},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-2">
                <a href={basePath+'account/account.html'} className="px-4 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 rounded-lg hover:bg-gray-100">Log in</a>
                <a href="#plans" className="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Get started</a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 rounded-lg">{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-10" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-8">
          {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html'],['Enterprise',basePath+'enterprise/enterprise.html']]},
            {t:'Company',ls:[['About','#'],['Contact','#']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-6 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
          <div className="flex gap-4">{['Privacy','Terms'].map(t=><a key={t} href="#" className="text-sm text-gray-500 hover:text-gray-300">{t}</a>)}</div>
        </div>
      </footer>
    );

    /* ── Plans data ── */
    const plans = [
      {
        name:'Basic',        audience:'For individuals',  price:{monthly:0,annual:0},
        color:'border-gray-200', badge:'',       badgeColor:'',
        cta:'Get started free',  ctaStyle:'border border-gray-300 text-gray-800 hover:bg-gray-50',
        icon:'📖',
        features:['Access 2,000+ free courses','Basic flashcard tools','Community study sets','Mobile app access','5 practice tests/month'],
        missing:['Certificate programs','Offline access','AI study assistant','Priority support','Advanced analytics'],
      },
      {
        name:'Plus',         audience:'For serious learners', price:{monthly:19.99,annual:11.99},
        color:'border-blue-500 ring-2 ring-blue-500', badge:'Most popular', badgeColor:'bg-blue-600 text-white',
        cta:'Start 7-day free trial', ctaStyle:'bg-blue-600 text-white hover:bg-blue-700',
        icon:'⚡',
        features:['Everything in Basic','Unlimited course access','12,000+ courses & paths','Certificate programs','Offline access','Unlimited practice tests','AI study assistant','Priority email support'],
        missing:['Team analytics','LMS integration','Custom branding'],
      },
      {
        name:'Teams',        audience:'For organizations', price:{monthly:29.99,annual:18.99},
        color:'border-purple-500', badge:'Best value', badgeColor:'bg-purple-600 text-white',
        cta:'Start team trial',      ctaStyle:'bg-purple-600 text-white hover:bg-purple-700',
        icon:'🏢',
        features:['Everything in Plus','Up to 50 seats','Team analytics dashboard','LMS integration (LTI)','Custom branding','Admin controls','Bulk seat management','Dedicated success manager','SSO / SAML login'],
        missing:[],
      },
    ];

    const features = [
      {label:'Course access', basic:'2,000+', plus:'12,000+', teams:'12,000+'},
      {label:'Practice tests', basic:'5/month', plus:'Unlimited', teams:'Unlimited'},
      {label:'Certificate programs', basic:'✗', plus:'✓', teams:'✓'},
      {label:'Offline downloads', basic:'✗', plus:'✓', teams:'✓'},
      {label:'AI study assistant', basic:'✗', plus:'✓', teams:'✓'},
      {label:'Team analytics', basic:'✗', plus:'✗', teams:'✓'},
      {label:'LMS integration', basic:'✗', plus:'✗', teams:'✓'},
      {label:'Custom branding', basic:'✗', plus:'✗', teams:'✓'},
      {label:'SSO login', basic:'✗', plus:'✗', teams:'✓'},
      {label:'Support', basic:'Community', plus:'Priority email', teams:'Dedicated CSM'},
    ];

    const faqs = [
      {q:"Can I switch plans at any time?",a:"Yes! You can upgrade, downgrade, or cancel at any time. Changes take effect at your next billing date."},
      {q:"Is there a free trial for paid plans?",a:"Absolutely. Plus plans come with a 7-day free trial. Team plans include a 14-day trial with no credit card required."},
      {q:"What happens to my progress if I cancel?",a:"Your progress and certificates are always saved. If you cancel, you'll retain access until the end of your billing period."},
      {q:"Do you offer student or educator discounts?",a:"Yes — verified students and educators get 60% off any paid plan. Contact us with your institution email to apply."},
      {q:"Can I get a refund?",a:"We offer a 30-day money-back guarantee on all annual plans. Monthly plans can be cancelled before the next billing cycle."},
    ];

    const App = () => {
      const [billing, setBilling] = useState('annual');
      const [openFaq, setOpenFaq] = useState(null);

      return (
        <>
          <AnnouncementBar/>
          <GlobalHeader basePath={BP}/>
          <main id="main-content">
            {/* Hero */}
            <div className="gradient-hero text-white py-16 px-4 text-center">
              <h1 className="text-4xl sm:text-5xl font-extrabold mb-4">Choose your plan</h1>
              <p className="text-blue-100 text-lg mb-8 max-w-xl mx-auto">Start for free. Upgrade when you're ready. No contracts, cancel anytime.</p>

              {/* Billing toggle */}
              <div className="inline-flex items-center bg-white/10 rounded-full p-1 border border-white/20" role="group" aria-label="Billing period">
                {['monthly','annual'].map(b=>(
                  <button key={b} onClick={()=>setBilling(b)} role="radio" aria-checked={billing===b}
                    className={`px-5 py-2 rounded-full text-sm font-semibold transition-all focus-visible:ring-2 focus-visible:ring-white ${billing===b?'bg-white text-blue-700':'text-blue-100 hover:text-white'}`}>
                    {b==='monthly'?'Monthly':'Annual'}
                    {b==='annual'&&<span className="ml-2 badge bg-green-400 text-green-900 text-xs">Save 40%</span>}
                  </button>
                ))}
              </div>
            </div>

            {/* Plan cards — Hero C */}
            <div id="plans" className="max-w-6xl mx-auto px-4 sm:px-6 -mt-8 pb-16">
              <div className="grid md:grid-cols-3 gap-6">
                {plans.map((plan,i)=>(
                  <div key={i} className={`bg-white rounded-3xl border-2 ${plan.color} overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col`}>
                    {plan.badge ? (
                      <div className={`${plan.badgeColor} text-xs font-bold text-center py-2 tracking-wider uppercase`}>{plan.badge}</div>
                    ) : <div className="h-0"/>}
                    <div className="p-7 flex flex-col flex-1">
                      <div className="text-4xl mb-3" aria-hidden="true">{plan.icon}</div>
                      <div className="badge bg-gray-100 text-gray-600 text-xs mb-3 self-start">{plan.audience}</div>
                      <h2 className="text-2xl font-extrabold text-gray-900 mb-1">{plan.name}</h2>
                      <div className="mb-6">
                        {plan.price[billing]===0 ? (
                          <span className="text-4xl font-extrabold text-gray-900">Free</span>
                        ) : (
                          <>
                            <span className="text-4xl font-extrabold text-gray-900">${plan.price[billing]}</span>
                            <span className="text-gray-500 text-sm">/month {billing==='annual'&&<span className="text-green-600 font-medium">billed annually</span>}</span>
                          </>
                        )}
                      </div>

                      {/* Device preview placeholder */}
                      <div className="bg-gradient-to-br from-gray-100 to-gray-50 rounded-2xl h-28 flex items-center justify-center mb-6 border border-gray-100" aria-hidden="true">
                        <span className="text-4xl opacity-60">{i===0?'📱':i===1?'💻':'🖥️'}</span>
                      </div>

                      <ul className="space-y-2.5 mb-8 flex-1">
                        {plan.features.map(f=>(
                          <li key={f} className="flex items-start gap-2 text-sm text-gray-700">
                            <svg className="w-4 h-4 text-green-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>
                            {f}
                          </li>
                        ))}
                        {plan.missing.slice(0,2).map(f=>(
                          <li key={f} className="flex items-start gap-2 text-sm text-gray-400">
                            <svg className="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                            {f}
                          </li>
                        ))}
                      </ul>

                      <button className={`w-full py-3.5 font-bold rounded-xl transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 ${plan.ctaStyle}`}>
                        {plan.cta}
                      </button>
                      {plan.name!=='Basic'&&<p className="text-center text-xs text-gray-400 mt-2">No credit card required</p>}
                    </div>
                  </div>
                ))}
              </div>

              {/* Feature action tiles */}
              <div className="mt-14 grid grid-cols-2 sm:grid-cols-5 gap-4">
                {[{icon:'🔍',label:'Discover',color:'from-blue-500 to-blue-600'},
                  {icon:'📚',label:'Learn',   color:'from-purple-500 to-purple-600'},
                  {icon:'🎯',label:'Practice',color:'from-green-500 to-teal-600'},
                  {icon:'✍️',label:'Create',  color:'from-orange-500 to-red-500'},
                  {icon:'🏆',label:'Certify', color:'from-yellow-400 to-orange-500'}].map(t=>(
                  <button key={t.label} className={`action-tile bg-gradient-to-br ${t.color} text-white text-center flex flex-col items-center gap-2 rounded-2xl p-5 focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2`}>
                    <span className="text-3xl" aria-hidden="true">{t.icon}</span>
                    <span className="font-bold text-sm">{t.label}</span>
                  </button>
                ))}
              </div>

              {/* Feature comparison table */}
              <div className="mt-16">
                <h2 className="text-2xl font-bold text-gray-900 text-center mb-8">Compare all features</h2>
                <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                  <table className="w-full compare-table" aria-label="Feature comparison table">
                    <thead>
                      <tr className="border-b border-gray-200 bg-gray-50">
                        <th className="text-left py-4 px-5 text-gray-700 w-1/2">Feature</th>
                        <th className="text-center py-4 px-5 text-gray-700">Basic</th>
                        <th className="text-center py-4 px-5 text-blue-700">Plus ⭐</th>
                        <th className="text-center py-4 px-5 text-purple-700">Teams</th>
                      </tr>
                    </thead>
                    <tbody>
                      {features.map((f,i)=>(
                        <tr key={i} className="border-b border-gray-100 last:border-b-0">
                          <td className="py-3.5 px-5 text-sm font-medium text-gray-800">{f.label}</td>
                          {[f.basic,f.plus,f.teams].map((v,j)=>(
                            <td key={j} className={`py-3.5 px-5 text-center text-sm ${v==='✓'?'text-green-600 font-bold':v==='✗'?'text-gray-300':'text-gray-700 font-medium'}`}>
                              {v}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Trust signals */}
              <div className="mt-14 grid sm:grid-cols-3 gap-6 text-center">
                {[{icon:'🔒',t:'Secure payments',d:'256-bit SSL encryption. PCI DSS compliant.'},
                  {icon:'↩',t:'30-day guarantee',d:'Not happy? Get a full refund within 30 days.'},
                  {icon:'🌍',t:'Global access',d:'Available in 190+ countries. 50+ languages.'}].map(s=>(
                  <div key={s.t} className="p-6 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div className="text-3xl mb-3" aria-hidden="true">{s.icon}</div>
                    <h3 className="font-bold text-gray-900 mb-1">{s.t}</h3>
                    <p className="text-sm text-gray-500">{s.d}</p>
                  </div>
                ))}
              </div>

              {/* FAQ */}
              <div className="mt-14">
                <h2 className="text-2xl font-bold text-gray-900 text-center mb-8">Frequently asked questions</h2>
                <div className="max-w-2xl mx-auto space-y-3">
                  {faqs.map((faq,i)=>(
                    <div key={i} className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                      <button onClick={()=>setOpenFaq(openFaq===i?null:i)}
                        className="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-gray-50 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-inset"
                        aria-expanded={openFaq===i}>
                        <span className="font-semibold text-gray-900 text-sm pr-4">{faq.q}</span>
                        <svg className={`w-5 h-5 text-gray-400 flex-shrink-0 transition-transform ${openFaq===i?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                        </svg>
                      </button>
                      {openFaq===i && (
                        <div className="px-6 pb-5 text-sm text-gray-600 leading-relaxed border-t border-gray-100 pt-4">{faq.a}</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              {/* Enterprise CTA */}
              <div className="mt-14 bg-gradient-to-r from-gray-900 to-gray-800 rounded-3xl p-10 text-white text-center">
                <h2 className="text-2xl font-bold mb-3">Need 50+ seats or custom enterprise features?</h2>
                <p className="text-gray-300 mb-7">Custom pricing, dedicated support, and compliance tools for large organizations and school districts.</p>
                <a href={BP+'enterprise/enterprise.html'} className="inline-block px-8 py-3.5 bg-white text-gray-900 font-bold rounded-xl hover:bg-gray-100 transition-colors focus-visible:ring-2 focus-visible:ring-white">
                  Contact Enterprise Sales →
                </a>
              </div>
            </div>
          </main>
          <Footer basePath={BP}/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
