<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – EduPortal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8'},secondary:{600:'#7C3AED'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../styles/main.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const BP = '../';

    const GlobalHeader = ({basePath=''}) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const links=[
        {label:'Courses',    href:basePath+'courses/courses.html'},
        {label:'Subjects',   href:basePath+'subjects/subjects.html'},
        {label:'Plans',      href:basePath+'plans/plans.html'},
        {label:'Enterprise', href:basePath+'enterprise/enterprise.html'},
        {label:'Dashboard',  href:basePath+'dashboard/dashboard.html',active:true},
      ];
      return (
        <header className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="flex items-center h-16 gap-4">
              <a href={basePath+'index.html'} className="flex items-center gap-2 flex-shrink-0" aria-label="EduPortal home">
                <div className="w-8 h-8 rounded-lg gradient-brand flex items-center justify-center"><span className="text-white font-bold text-sm">E</span></div>
                <span className="text-xl font-bold text-gray-900 hidden sm:block">EduPortal</span>
              </a>
              <nav className="hidden md:flex items-center gap-0.5 flex-1" aria-label="Primary navigation">
                {links.map(l=><a key={l.label} href={l.href} aria-current={l.active?'page':undefined}
                  className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${l.active?'text-blue-600 bg-blue-50':'text-gray-700 hover:text-blue-600 hover:bg-blue-50'}`}>{l.label}</a>)}
              </nav>
              <div className="hidden md:flex items-center gap-3 ml-auto">
                <button className="relative p-2 text-gray-500 hover:text-blue-600 rounded-lg hover:bg-gray-100 focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Notifications (3 unread)">
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                  <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full" aria-hidden="true"/>
                </button>
                <a href={basePath+'account/account.html'} className="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 text-sm font-medium text-gray-700 focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="My account">
                  <div className="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" aria-hidden="true">JD</div>
                  <span>Jordan D.</span>
                </a>
              </div>
              <button onClick={()=>setMenuOpen(!menuOpen)} aria-label={menuOpen?'Close menu':'Open menu'} aria-expanded={menuOpen}
                className="md:hidden p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  {menuOpen?<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {menuOpen&&<nav className="md:hidden py-3 border-t border-gray-100 space-y-1" aria-label="Mobile navigation">
              {links.map(l=><a key={l.label} href={l.href} className="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-blue-50 rounded-lg">{l.label}</a>)}
            </nav>}
          </div>
        </header>
      );
    };

    const Footer = ({basePath=''}) => (
      <footer className="bg-gray-900 text-gray-400 py-8 mt-auto" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-wrap gap-8 mb-6">
          {[{t:'Learn',ls:[['Courses',basePath+'courses/courses.html'],['Subjects',basePath+'subjects/subjects.html']]},
            {t:'Study',ls:[['Flashcards',basePath+'study/flashcards/flashcards.html'],['Tests',basePath+'study/test/test.html']]},
            {t:'Plans',ls:[['Pricing',basePath+'plans/plans.html']]}].map(col=>(
            <div key={col.t}>
              <h3 className="text-white font-semibold text-sm mb-3">{col.t}</h3>
              <ul className="space-y-2">{col.ls.map(([l,h])=><li key={l}><a href={h} className="text-sm hover:text-white">{l}</a></li>)}</ul>
            </div>
          ))}
        </div>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-5 border-t border-gray-800 flex items-center justify-between">
          <p className="text-sm text-gray-500">© 2024 EduPortal, Inc.</p>
        </div>
      </footer>
    );

    /* ── SVG Progress Ring ── */
    const ProgressRing = ({ pct, size=80, stroke=8, color='#2563EB', label }) => {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - pct/100);
      return (
        <div className="relative inline-flex items-center justify-center" style={{width:size,height:size}}>
          <svg width={size} height={size} aria-hidden="true">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
              className="progress-ring-circle"/>
          </svg>
          <span className="absolute text-sm font-bold text-gray-900" aria-label={label}>{pct}%</span>
        </div>
      );
    };

    /* ── Dashboard data ── */
    const sideNav = [
      {icon:'🏠',label:'Overview',    active:true},
      {icon:'📚',label:'My Courses'},
      {icon:'📊',label:'Progress'},
      {icon:'📅',label:'Calendar'},
      {icon:'🃏',label:'Flashcards'},
      {icon:'🏆',label:'Certificates'},
      {icon:'⚙️',label:'Settings'},
    ];

    const stats = [
      {icon:'📚',label:'Enrolled',  value:'8',   sub:'Active courses', color:'bg-blue-50 text-blue-600'},
      {icon:'⏱️',label:'Study time',value:'47h', sub:'This month',     color:'bg-purple-50 text-purple-600'},
      {icon:'🔥',label:'Streak',    value:'14',  sub:'Days in a row',  color:'bg-orange-50 text-orange-600'},
      {icon:'🏆',label:'Certs',     value:'3',   sub:'Completed',      color:'bg-green-50 text-green-600'},
    ];

    const activeCourses = [
      {title:'Machine Learning A–Z',     inst:'Prof. Ken Zhang',   pct:68, img:'🤖', color:'from-blue-500 to-blue-700',   nextLesson:'Polynomial Regression',    lastStudied:'2 hours ago'},
      {title:'React & TypeScript Pro',   inst:'Yuki Tanaka',       pct:42, img:'⚛️', color:'from-purple-500 to-purple-700',nextLesson:'Custom Hooks Deep Dive',    lastStudied:'Yesterday'},
      {title:'Business Analytics',       inst:'Priya Patel',       pct:91, img:'📊', color:'from-green-500 to-teal-600',  nextLesson:'Capstone Project',          lastStudied:'3 days ago'},
      {title:'UX Design Masterclass',    inst:'Sofia Mendez',      pct:24, img:'🎨', color:'from-orange-500 to-red-500',  nextLesson:'User Research Methods',     lastStudied:'1 week ago'},
    ];

    const recentActivity = [
      {text:'Completed lesson: Linear Regression Deep Dive',         time:'2 hours ago', icon:'✅'},
      {text:'Earned badge: Consistent Learner (14-day streak)',       time:'Today',       icon:'🏅'},
      {text:'Completed quiz: Module 3 Assessment — Score 92%',       time:'Yesterday',   icon:'📝'},
      {text:'Downloaded certificate: Python for Data Science',       time:'3 days ago',  icon:'🏆'},
      {text:'Joined study group: Machine Learning Discussion',       time:'5 days ago',  icon:'👥'},
      {text:'Started course: React & TypeScript Masterclass',        time:'1 week ago',  icon:'🚀'},
    ];

    const calendar = [
      {day:'Mon',date:13,events:['ML Quiz 2pm']},
      {day:'Tue',date:14,events:[]},
      {day:'Wed',date:15,events:['Study session 7pm','Live Q&A 9pm']},
      {day:'Thu',date:16,events:['UX Project due']},
      {day:'Fri',date:17,events:['Certificate ceremony']},
      {day:'Sat',date:18,events:['Practice test']},
      {day:'Sun',date:19,events:[]},
    ];

    const App = () => {
      const [activeSection, setActiveSection] = useState('Overview');
      const [mobileNav, setMobileNav] = useState(false);

      return (
        <div className="flex flex-col min-h-screen">
          <GlobalHeader basePath={BP}/>
          <div className="flex flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6 gap-6">
            {/* Sidebar */}
            <aside className="hidden md:flex flex-col w-56 flex-shrink-0 gap-1" aria-label="Dashboard navigation">
              <div className="bg-white rounded-2xl border border-gray-200 p-4 mb-4">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-lg" aria-hidden="true">JD</div>
                  <div>
                    <p className="font-bold text-gray-900 text-sm">Jordan Davis</p>
                    <p className="text-xs text-gray-500">Plus Member</p>
                    <span className="badge bg-blue-100 text-blue-700 text-xs mt-0.5">⚡ Plus</span>
                  </div>
                </div>
              </div>
              <nav aria-label="Dashboard sections">
                {sideNav.map(item=>(
                  <button key={item.label} onClick={()=>setActiveSection(item.label)}
                    className={`sidebar-link w-full text-left mb-0.5 focus-visible:ring-2 focus-visible:ring-blue-500 ${activeSection===item.label?'active':''}`}
                    aria-current={activeSection===item.label?'page':undefined}>
                    <span aria-hidden="true">{item.icon}</span>
                    {item.label}
                  </button>
                ))}
              </nav>
              <a href={BP+'plans/plans.html'}
                className="mt-auto mx-2 block gradient-brand text-white text-center text-xs font-semibold py-3 rounded-xl hover:opacity-90 transition-opacity focus-visible:ring-2 focus-visible:ring-blue-500">
                🚀 Upgrade to Teams
              </a>
            </aside>

            {/* Main content */}
            <main id="main-content" className="flex-1 min-w-0 space-y-6">
              {/* Welcome bar */}
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-2xl font-extrabold text-gray-900">Good morning, Jordan! 👋</h1>
                  <p className="text-gray-500 text-sm mt-0.5">You're on a <strong className="text-orange-600">14-day streak</strong> — keep it up!</p>
                </div>
                <a href={BP+'courses/courses.html'} className="hidden sm:flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-xl hover:bg-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                  Explore courses
                </a>
              </div>

              {/* Stats */}
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-4" role="region" aria-label="Learning statistics">
                {stats.map(s=>(
                  <div key={s.label} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex items-start gap-4">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl ${s.color}`} aria-hidden="true">{s.icon}</div>
                    <div>
                      <p className="text-2xl font-extrabold text-gray-900">{s.value}</p>
                      <p className="text-xs text-gray-500 mt-0.5">{s.sub}</p>
                    </div>
                  </div>
                ))}
              </div>

              <div className="grid lg:grid-cols-3 gap-6">
                {/* Active courses */}
                <div className="lg:col-span-2">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="font-bold text-gray-900">Continue learning</h2>
                    <a href={BP+'courses/courses.html'} className="text-sm text-blue-600 font-semibold hover:underline">View all →</a>
                  </div>
                  <div className="space-y-4">
                    {activeCourses.map((c,i)=>(
                      <a key={i} href={BP+'courses/detail.html'}
                        className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex items-start gap-4 group hover:border-blue-200 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 block">
                        <div className={`w-12 h-12 rounded-2xl bg-gradient-to-br ${c.color} flex items-center justify-center text-2xl flex-shrink-0`} aria-hidden="true">{c.img}</div>
                        <div className="flex-1 min-w-0">
                          <h3 className="font-semibold text-gray-900 text-sm group-hover:text-blue-600 transition-colors truncate">{c.title}</h3>
                          <p className="text-xs text-gray-500 mb-2">{c.inst}</p>
                          <div className="flex items-center gap-2 mb-1">
                            <div className="flex-1 bg-gray-100 rounded-full h-2" aria-label={`Progress: ${c.pct}%`}>
                              <div className="bg-blue-500 h-2 rounded-full" style={{width:`${c.pct}%`}}/>
                            </div>
                            <span className="text-xs font-semibold text-gray-600">{c.pct}%</span>
                          </div>
                          <div className="flex items-center justify-between text-xs text-gray-400">
                            <span>Next: {c.nextLesson}</span>
                            <span>{c.lastStudied}</span>
                          </div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>

                {/* Right column */}
                <div className="space-y-5">
                  {/* Progress widget */}
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" role="region" aria-label="Monthly progress">
                    <h2 className="font-bold text-gray-900 mb-4">Monthly progress</h2>
                    <div className="flex items-center gap-6">
                      <ProgressRing pct={73} size={90} stroke={9} color="#2563EB" label="73% of monthly goal"/>
                      <div className="space-y-2 text-sm">
                        <div className="flex items-center gap-2">
                          <div className="w-3 h-3 rounded-full bg-blue-500" aria-hidden="true"/>
                          <span className="text-gray-600">Study goal: <strong>73%</strong></span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-3 h-3 rounded-full bg-green-500" aria-hidden="true"/>
                          <span className="text-gray-600">Correct: <strong>88%</strong></span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-3 h-3 rounded-full bg-orange-400" aria-hidden="true"/>
                          <span className="text-gray-600">Incorrect: <strong>12%</strong></span>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-3 h-3 rounded-full bg-gray-300" aria-hidden="true"/>
                          <span className="text-gray-600">~2.5h left</span>
                        </div>
                      </div>
                    </div>
                    <div className="mt-4 grid grid-cols-3 gap-2 text-center text-xs">
                      {[{n:'47',l:'hrs studied'},{n:'23',l:'lessons done'},{n:'92%',l:'avg score'}].map(s=>(
                        <div key={s.l} className="bg-gray-50 rounded-xl p-2">
                          <div className="font-bold text-gray-900">{s.n}</div>
                          <div className="text-gray-400">{s.l}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Mini calendar */}
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" role="region" aria-label="This week's schedule">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="font-bold text-gray-900">This week</h2>
                      <span className="text-xs text-gray-500">Jan 13–19</span>
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                      {calendar.map(day=>(
                        <div key={day.day} className="text-center">
                          <p className="text-xs text-gray-400 mb-1">{day.day}</p>
                          <div className={`w-7 h-7 rounded-full mx-auto flex items-center justify-center text-xs font-semibold ${day.date===15?'bg-blue-600 text-white':'text-gray-700 hover:bg-gray-100'} ${day.events.length>0&&day.date!==15?'ring-2 ring-blue-200':''}`}
                            aria-label={`${day.day} Jan ${day.date}${day.events.length?' – '+day.events.length+' event(s)':''}`}>
                            {day.date}
                          </div>
                          {day.events.length>0&&<div className="w-1.5 h-1.5 bg-blue-400 rounded-full mx-auto mt-1" aria-hidden="true"/>}
                        </div>
                      ))}
                    </div>
                    <div className="mt-4 space-y-2">
                      {calendar.filter(d=>d.events.length).flatMap(d=>d.events.map(e=>({day:d.day,date:d.date,event:e}))).slice(0,3).map((e,i)=>(
                        <div key={i} className="flex items-center gap-2 text-xs">
                          <span className="badge bg-blue-50 text-blue-700">{e.day} {e.date}</span>
                          <span className="text-gray-600 truncate">{e.event}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Quick links */}
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" role="region" aria-label="Quick actions">
                    <h2 className="font-bold text-gray-900 mb-3">Quick study</h2>
                    <div className="grid grid-cols-2 gap-2">
                      {[{icon:'🃏',label:'Flashcards',href:BP+'study/flashcards/flashcards.html',color:'bg-purple-50 text-purple-700'},
                        {icon:'📝',label:'Practice test',href:BP+'study/test/test.html',color:'bg-green-50 text-green-700'},
                        {icon:'📚',label:'Study hub',href:BP+'study/study.html',color:'bg-blue-50 text-blue-700'},
                        {icon:'📜',label:'Curriculum',href:BP+'curriculum/curriculum.html',color:'bg-orange-50 text-orange-700'}].map(lk=>(
                        <a key={lk.label} href={lk.href}
                          className={`flex flex-col items-center gap-1.5 p-3 rounded-xl hover:opacity-80 transition-opacity ${lk.color} focus-visible:ring-2 focus-visible:ring-blue-500`}>
                          <span className="text-2xl" aria-hidden="true">{lk.icon}</span>
                          <span className="text-xs font-semibold">{lk.label}</span>
                        </a>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* Recent activity */}
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" role="region" aria-label="Recent activity">
                <h2 className="font-bold text-gray-900 mb-4">Recent activity</h2>
                <ul className="divide-y divide-gray-50">
                  {recentActivity.map((a,i)=>(
                    <li key={i} className="flex items-center gap-3 py-3">
                      <span className="text-xl flex-shrink-0" aria-hidden="true">{a.icon}</span>
                      <span className="text-sm text-gray-700 flex-1">{a.text}</span>
                      <span className="text-xs text-gray-400 flex-shrink-0">{a.time}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </main>
          </div>
          <Footer basePath={BP}/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
