<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketFlow - Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#2563eb",
              ink: "#0f172a",
              soft: "#f8fafc"
            },
            boxShadow: {
              card: "0 10px 35px rgba(15, 23, 42, 0.08)"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-100 text-ink">
    <div id="root"></div>

    <script type="text/babel">
      const navLinks = [
        { href: "index.html", label: "Home" },
        { href: "products.html", label: "Products" },
        { href: "product.html", label: "Product Detail" },
        { href: "cart.html", label: "Cart" },
        { href: "account.html", label: "Account" }
      ];

      function Header({ active }) {
        return (
          <header className="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center gap-3 px-4 py-4 sm:px-6">
              <a href="index.html" className="text-2xl font-black tracking-tight text-brand">MarketFlow</a>
              <div className="hidden flex-1 items-center rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 md:flex">
                <input className="w-full bg-transparent text-sm outline-none" placeholder="Search products, brands, categories..." />
              </div>
              <nav className="flex gap-1 overflow-x-auto text-sm font-medium">
                {navLinks.map((item) => (
                  <a key={item.href} href={item.href} className={`whitespace-nowrap rounded-lg px-3 py-2 ${active === item.href ? "bg-brand text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                    {item.label}
                  </a>
                ))}
              </nav>
            </div>
          </header>
        );
      }

      function Footer() {
        return (
          <footer className="mt-14 border-t border-slate-200 bg-white">
            <div className="mx-auto max-w-7xl px-4 py-8 text-sm text-slate-500 sm:px-6">
              <p className="font-semibold text-slate-700">MarketFlow Marketplace</p>
              <p className="mt-1">Fast checkout, global shipping, and curated product collections.</p>
            </div>
          </footer>
        );
      }

      function ProductDetailPage() {
        return (
          <>
            <Header active="product.html" />
            <main className="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-2">
              <section className="overflow-hidden rounded-2xl bg-white shadow-card">
                <img src="https://images.unsplash.com/photo-1572569511254-d8f925fe2cbb?auto=format&fit=crop&w=1400&q=80" alt="Wireless Earbuds" className="h-full w-full object-cover" />
              </section>

              <section className="rounded-2xl bg-white p-6 shadow-card">
                <p className="text-xs font-semibold uppercase tracking-wide text-brand">Audio / Best Seller</p>
                <h1 className="mt-2 text-3xl font-black">Wireless Earbuds Pro</h1>
                <p className="mt-3 text-slate-600">Crisp immersive sound, 30-hour battery, and noise isolation packed into a travel-friendly case.</p>
                <p className="mt-4 text-3xl font-black text-brand">$79</p>

                <ul className="mt-6 space-y-2 text-sm text-slate-600">
                  <li>Bluetooth 5.3 with low-latency mode</li>
                  <li>Dual microphones for clear voice calls</li>
                  <li>Sweat-resistant build for workouts</li>
                </ul>

                <div className="mt-7 flex flex-wrap gap-3">
                  <a href="cart.html" className="rounded-lg bg-brand px-6 py-3 text-sm font-semibold text-white">Add to Cart</a>
                  <a href="products.html" className="rounded-lg border border-slate-300 px-6 py-3 text-sm font-semibold">Back to Products</a>
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<ProductDetailPage />);
    </script>
  </body>
</html>
