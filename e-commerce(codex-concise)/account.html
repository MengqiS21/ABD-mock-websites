<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketFlow - Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#2563eb",
              ink: "#0f172a",
              soft: "#f8fafc"
            },
            boxShadow: {
              card: "0 10px 35px rgba(15, 23, 42, 0.08)"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-100 text-ink">
    <div id="root"></div>

    <script type="text/babel">
      const navLinks = [
        { href: "index.html", label: "Home" },
        { href: "products.html", label: "Products" },
        { href: "product.html", label: "Product Detail" },
        { href: "cart.html", label: "Cart" },
        { href: "account.html", label: "Account" }
      ];

      function Header({ active }) {
        return (
          <header className="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center gap-3 px-4 py-4 sm:px-6">
              <a href="index.html" className="text-2xl font-black tracking-tight text-brand">MarketFlow</a>
              <div className="hidden flex-1 items-center rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 md:flex">
                <input className="w-full bg-transparent text-sm outline-none" placeholder="Search products, brands, categories..." />
              </div>
              <nav className="flex gap-1 overflow-x-auto text-sm font-medium">
                {navLinks.map((item) => (
                  <a key={item.href} href={item.href} className={`whitespace-nowrap rounded-lg px-3 py-2 ${active === item.href ? "bg-brand text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                    {item.label}
                  </a>
                ))}
              </nav>
            </div>
          </header>
        );
      }

      function Footer() {
        return (
          <footer className="mt-14 border-t border-slate-200 bg-white">
            <div className="mx-auto max-w-7xl px-4 py-8 text-sm text-slate-500 sm:px-6">
              <p className="font-semibold text-slate-700">MarketFlow Marketplace</p>
              <p className="mt-1">Fast checkout, global shipping, and curated product collections.</p>
            </div>
          </footer>
        );
      }

      function AccountPage() {
        return (
          <>
            <Header active="account.html" />
            <main className="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-3">
              <section className="rounded-xl bg-white p-5 shadow-card lg:col-span-2">
                <h1 className="text-3xl font-black">My Account</h1>
                <p className="mt-2 text-slate-500">Manage profile, addresses, and order preferences.</p>

                <div className="mt-6 grid gap-4 sm:grid-cols-2">
                  <div>
                    <label className="text-sm font-semibold">Full Name</label>
                    <input className="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" defaultValue="Alex Carter" />
                  </div>
                  <div>
                    <label className="text-sm font-semibold">Email</label>
                    <input className="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" defaultValue="alex@example.com" />
                  </div>
                </div>

                <button className="mt-6 rounded-lg bg-brand px-5 py-3 text-sm font-semibold text-white">Save Changes</button>
              </section>

              <aside className="rounded-xl bg-white p-5 shadow-card">
                <h2 className="text-lg font-semibold">Quick Links</h2>
                <div className="mt-4 space-y-2 text-sm">
                  <a href="products.html" className="block rounded-lg bg-slate-100 px-3 py-2 hover:bg-slate-200">Continue Shopping</a>
                  <a href="cart.html" className="block rounded-lg bg-slate-100 px-3 py-2 hover:bg-slate-200">View Cart</a>
                  <a href="product.html" className="block rounded-lg bg-slate-100 px-3 py-2 hover:bg-slate-200">Featured Product</a>
                </div>
              </aside>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<AccountPage />);
    </script>
  </body>
</html>
