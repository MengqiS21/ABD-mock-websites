<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketFlow - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#2563eb",
              ink: "#0f172a",
              soft: "#f8fafc"
            },
            boxShadow: {
              card: "0 10px 35px rgba(15, 23, 42, 0.08)"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-100 text-ink">
    <div id="root"></div>

    <script type="text/babel">
      const navLinks = [
        { href: "index.html", label: "Home" },
        { href: "products.html", label: "Products" },
        { href: "product.html", label: "Product Detail" },
        { href: "cart.html", label: "Cart" },
        { href: "account.html", label: "Account" }
      ];

      function Header({ active }) {
        return (
          <header className="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center gap-3 px-4 py-4 sm:px-6">
              <a href="index.html" className="text-2xl font-black tracking-tight text-brand">MarketFlow</a>
              <div className="hidden flex-1 items-center rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 md:flex">
                <input className="w-full bg-transparent text-sm outline-none" placeholder="Search products, brands, categories..." />
              </div>
              <nav className="flex gap-1 overflow-x-auto text-sm font-medium">
                {navLinks.map((item) => (
                  <a key={item.href} href={item.href} className={`whitespace-nowrap rounded-lg px-3 py-2 ${active === item.href ? "bg-brand text-white" : "text-slate-600 hover:bg-slate-100"}`}>
                    {item.label}
                  </a>
                ))}
              </nav>
            </div>
          </header>
        );
      }

      function Footer() {
        return (
          <footer className="mt-14 border-t border-slate-200 bg-white">
            <div className="mx-auto max-w-7xl px-4 py-8 text-sm text-slate-500 sm:px-6">
              <p className="font-semibold text-slate-700">MarketFlow Marketplace</p>
              <p className="mt-1">Fast checkout, global shipping, and curated product collections.</p>
            </div>
          </footer>
        );
      }

      function HomePage() {
        const featured = [
          { name: "Smart Fitness Watch", price: "$149", image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80" },
          { name: "Portable Speaker", price: "$89", image: "https://images.unsplash.com/photo-1589003077984-894e133dabab?auto=format&fit=crop&w=800&q=80" },
          { name: "Minimal Desk Lamp", price: "$42", image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?auto=format&fit=crop&w=800&q=80" },
          { name: "Travel Backpack", price: "$69", image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" }
        ];

        return (
          <>
            <Header active="index.html" />
            <main className="mx-auto max-w-7xl px-4 py-8 sm:px-6">
              <section className="overflow-hidden rounded-2xl bg-gradient-to-r from-brand to-cyan-500 p-8 text-white shadow-card sm:p-12">
                <p className="text-xs uppercase tracking-[0.25em] text-blue-100">Spring Campaign</p>
                <h1 className="mt-3 max-w-2xl text-3xl font-black sm:text-5xl">Everything You Need in One Modern Marketplace</h1>
                <p className="mt-4 max-w-xl text-blue-100">Discover trending tech, home essentials, and lifestyle picks with next-day delivery.</p>
                <div className="mt-6 flex gap-3">
                  <a href="products.html" className="rounded-lg bg-white px-5 py-3 text-sm font-semibold text-brand">Shop Now</a>
                  <a href="account.html" className="rounded-lg border border-white/50 px-5 py-3 text-sm font-semibold">Join Free</a>
                </div>
              </section>

              <section className="mt-10">
                <div className="flex items-center justify-between">
                  <h2 className="text-2xl font-bold">Featured Picks</h2>
                  <a href="products.html" className="text-sm font-semibold text-brand">See all</a>
                </div>
                <div className="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                  {featured.map((item) => (
                    <article key={item.name} className="overflow-hidden rounded-xl bg-white shadow-card">
                      <img src={item.image} alt={item.name} className="h-44 w-full object-cover" />
                      <div className="p-4">
                        <h3 className="font-semibold">{item.name}</h3>
                        <p className="mt-1 text-sm text-slate-500">Top-rated and in stock</p>
                        <div className="mt-3 flex items-center justify-between">
                          <span className="text-lg font-bold text-brand">{item.price}</span>
                          <a href="product.html" className="rounded-lg bg-slate-900 px-3 py-2 text-xs font-semibold text-white">View</a>
                        </div>
                      </div>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
    </script>
  </body>
</html>
