<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Politics — The Pulse</title>
  <meta name="description" content="Political news, analysis, and coverage of Congress, the White House, elections, and global governments." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { serif: ['"Playfair Display"', 'Georgia', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="bg-white">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="../components/components.js" data-presets="react"></script>

  <script type="text/babel" data-presets="react">
    window.BASE_PATH = '../';

    /* Senate Vote Tracker */
    const VoteTracker = () => {
      const votes = [
        { bill: 'Climate & Infrastructure Act', yeas: 58, nays: 42, status: 'PASSED', date: 'Today' },
        { bill: 'Digital Privacy Protection Act', yeas: 51, nays: 49, status: 'PASSED', date: 'Yesterday' },
        { bill: 'Border Security Appropriations', yeas: 48, nays: 52, status: 'FAILED', date: '3 days ago' },
        { bill: 'AI Governance Framework', yeas: 72, nays: 28, status: 'PASSED', date: '1 week ago' },
      ];
      return (
        <aside className="sidebar-widget" aria-label="Recent Senate votes">
          <div className="sidebar-widget-header">Senate Vote Tracker</div>
          <div className="sidebar-widget-body p-0">
            {votes.map((v) => (
              <div key={v.bill} className="p-3 border-b border-slate-100 last:border-0">
                <div className="flex items-start justify-between gap-2 mb-2">
                  <p className="text-xs font-semibold text-slate-800 leading-tight flex-1">{v.bill}</p>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded flex-shrink-0 ${v.status === 'PASSED' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {v.status}
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-500 rounded-full" style={{ width: `${(v.yeas / 100) * 100}%` }} aria-hidden="true" />
                  </div>
                  <span className="text-xs text-green-600 font-bold">{v.yeas}Y</span>
                  <span className="text-xs text-red-600 font-bold">{v.nays}N</span>
                </div>
                <time className="text-xs text-slate-400 mt-1 block">{v.date}</time>
              </div>
            ))}
          </div>
        </aside>
      );
    };

    /* Political Beat filters */
    const BEATS = ['All', 'Congress', 'White House', 'Supreme Court', 'Elections', 'Foreign Policy', 'State & Local'];

    const BeatFilter = ({ active, onChange }) => (
      <div className="border-b border-slate-200" role="tablist" aria-label="Filter by political beat">
        <div className="max-w-screen-2xl mx-auto px-4 flex gap-0 overflow-x-auto">
          {BEATS.map((b) => (
            <button
              key={b}
              role="tab"
              aria-selected={active === b}
              onClick={() => onChange(b)}
              className={`flex-shrink-0 px-4 py-3 text-xs font-semibold border-b-2 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 ${
                active === b ? 'border-red-600 text-red-600' : 'border-transparent text-slate-500 hover:text-slate-800'
              }`}
            >
              {b}
            </button>
          ))}
        </div>
      </div>
    );

    /* Poll Widget */
    const PollWidget = () => (
      <aside className="sidebar-widget" aria-label="Latest polling data">
        <div className="sidebar-widget-header">Approval Ratings</div>
        <div className="sidebar-widget-body">
          {[
            { label: 'Presidential Approval', approve: 43, disapprove: 51 },
            { label: 'Congress Approval', approve: 21, disapprove: 74 },
          ].map((poll) => (
            <div key={poll.label} className="mb-4 last:mb-0">
              <p className="text-xs font-semibold text-slate-700 mb-2">{poll.label}</p>
              <div className="flex gap-1 h-5 rounded overflow-hidden">
                <div className="bg-blue-500 flex items-center justify-center" style={{ width: `${poll.approve}%` }}>
                  <span className="text-xs text-white font-bold">{poll.approve}%</span>
                </div>
                <div className="bg-red-500 flex items-center justify-center flex-1">
                  <span className="text-xs text-white font-bold">{poll.disapprove}%</span>
                </div>
              </div>
              <div className="flex justify-between mt-1 text-xs text-slate-400">
                <span>Approve</span>
                <span>Disapprove</span>
              </div>
            </div>
          ))}
          <p className="text-xs text-slate-400 mt-3">Source: Pulse/Gallup poll — ±2.5% margin of error</p>
        </div>
      </aside>
    );

    /* Capitol Hill Page Header */
    const PoliticsHeader = () => (
      <div className="bg-gradient-to-r from-red-900 via-red-800 to-slate-900 py-8 px-4">
        <div className="max-w-screen-2xl mx-auto">
          <p className="text-red-300 text-xs font-bold uppercase tracking-widest mb-2">Politics</p>
          <h1 className="headline-lg text-white">Capitol Hill & Beyond</h1>
          <p className="text-red-200 mt-2 body-base">Covering Congress, the White House, elections, and the policies shaping your world.</p>
        </div>
      </div>
    );

    const App = () => {
      const [beat, setBeat] = React.useState('All');
      const politicsStories = ALL_STORIES.filter(s => s.category === 'politics');
      const mixedStories = ALL_STORIES.slice(0, 8);

      return (
        <PageLayout currentCategory="politics">
          <PoliticsHeader />
          <LiveTicker />
          <BeatFilter active={beat} onChange={setBeat} />

          <section className="max-w-screen-2xl mx-auto px-4 py-8">
            <div className="flex gap-8">
              {/* Main content */}
              <div className="flex-1 min-w-0">

                {/* Lead story */}
                <article className="mb-8 pb-8 border-b border-slate-100">
                  <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                    <div className="md:col-span-3 rounded-xl overflow-hidden aspect-video bg-slate-100">
                      <img src={politicsStories[0]?.mediaUrl} alt="" className="w-full h-full object-cover" loading="eager" />
                    </div>
                    <div className="md:col-span-2 flex flex-col justify-center">
                      <div className="flex items-center gap-2 mb-3">
                        <span className="badge-breaking">BREAKING</span>
                        <span className="cat-label cat-politics">Politics</span>
                      </div>
                      <a href={R('article/article.html')}>
                        <h2 className="headline-md hover:text-red-600 transition-colors">{politicsStories[0]?.title}</h2>
                      </a>
                      <p className="body-sm text-slate-500 mt-3">{politicsStories[0]?.summary}</p>
                      <div className="flex items-center gap-2 text-xs text-slate-400 mt-4">
                        <span className="font-semibold text-slate-600">{politicsStories[0]?.author}</span>
                        <span>·</span>
                        <time>{politicsStories[0]?.publishTime}</time>
                        <span>·</span>
                        <span>{politicsStories[0]?.readLength}</span>
                      </div>
                      <a href={R('article/article.html')} className="btn btn-primary mt-4 self-start">
                        Read Full Story
                      </a>
                    </div>
                  </div>
                </article>

                {/* Grid */}
                <div className="section-header">
                  <span className="section-header-accent" style={{ background: '#B91C1C' }} />
                  <h2 className="section-header-title">Latest in Politics</h2>
                </div>
                <StoryGrid stories={politicsStories.concat(mixedStories).slice(0, 6)} columns={3} showSummary={true} />

                {/* Second story — NYT-style horizontal */}
                <div className="mt-8">
                  <div className="section-header">
                    <span className="section-header-accent" style={{ background: '#B91C1C' }} />
                    <h2 className="section-header-title">Supreme Court</h2>
                  </div>
                  {politicsStories.concat(mixedStories).slice(1, 5).map((story) => (
                    <StoryCard key={story.id} story={story} layout="horizontal" size="sm" />
                  ))}
                </div>

                <FeatureBanner story={politicsStories[1] || ALL_STORIES[8]} />
              </div>

              {/* Sidebar */}
              <aside className="hidden xl:block w-80 flex-shrink-0">
                <SidebarModule type="live-blog" />
                <VoteTracker />
                <PollWidget />
                <SidebarModule type="newsletter" />
                <SidebarModule type="ad" />
              </aside>
            </div>
          </section>

          <SubscriptionModule variant="inline" />
        </PageLayout>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
