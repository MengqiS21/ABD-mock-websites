<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senate Passes Historic Climate Bill — The Pulse</title>
  <meta name="description" content="The sweeping legislation aims to decarbonize the power sector by 2035 and rebuild crumbling road and bridge infrastructure across the nation." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { serif: ['"Playfair Display"', 'Georgia', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="bg-white">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="../components/components.js" data-presets="react"></script>

  <script type="text/babel" data-presets="react">
    window.BASE_PATH = '../';

    const ARTICLE = {
      id: 1,
      title: "Senate Democrats Unveil $2 Trillion Climate and Infrastructure Package",
      category: 'politics',
      categoryLabel: 'Politics',
      summary: "The sweeping legislation aims to decarbonize the power sector by 2035 and rebuild crumbling road and bridge infrastructure across the nation.",
      mediaType: 'image',
      mediaUrl: 'https://picsum.photos/seed/politics1/1200/675',
      author: 'Sarah Mitchell',
      authorBio: 'Sarah Mitchell is a senior political correspondent at The Pulse, covering Congress and domestic policy. She has reported from Washington for 14 years.',
      authorImg: 'https://picsum.photos/seed/auth1/80/80',
      publishTime: '2 hours ago',
      updatedTime: '45 minutes ago',
      readLength: '6 min read',
      tags: ['senate', 'climate', 'infrastructure', 'legislation'],
      isBreaking: true,
      engagementMetrics: { views: '148K', comments: 923, shares: 3200 }
    };

    const ARTICLE_BODY = [
      {
        type: 'lead',
        text: 'WASHINGTON — In a landmark 58-42 vote that defied expectations, the United States Senate passed the most sweeping climate and infrastructure legislation in American history Thursday evening, sending a $2 trillion package to the House of Representatives after months of contentious negotiations.',
      },
      {
        type: 'paragraph',
        text: 'The Climate and Infrastructure Investment Act — a sprawling legislative package spanning over 2,400 pages — includes $800 billion for clean energy investments, $600 billion for transportation and bridge repair, $300 billion for broadband internet expansion, and $150 billion for workforce development programs.',
      },
      {
        type: 'pullquote',
        text: "\"This is the most significant investment in the future of our planet and our economy since the New Deal. Future generations will look back at this moment and know we chose to act.\"",
        attribution: "Senate Majority Leader Patricia Dunleavy",
      },
      {
        type: 'paragraph',
        text: "The bill's passage marks a major legislative victory for the administration following a bruising year of failed negotiations. Four Republican senators crossed party lines to join all 54 Democratic members in voting for the bill, providing the bipartisan margin that proponents argued was necessary for long-term policy stability.",
      },
      {
        type: 'paragraph',
        text: 'The energy provisions would require utilities to source 80% of their electricity from clean sources by 2030, rising to 100% by 2035. The transportation section directs $120 billion specifically to repair the 45,000 structurally deficient bridges identified in last year\'s infrastructure assessment — a figure that shocked engineers when it was revealed.',
      },
      {
        type: 'image',
        src: 'https://picsum.photos/seed/caption1/900/500',
        caption: 'Senate Majority Leader Patricia Dunleavy speaks during a press conference following the passage of the Climate and Infrastructure Act. (AP Photo / Elise Amendola)',
      },
      {
        type: 'heading',
        text: 'Opposition and Concerns',
      },
      {
        type: 'paragraph',
        text: "Republican opponents argued the bill's $2 trillion price tag would fuel inflation and represents an unprecedented expansion of federal power into energy markets. \"We are mortgaging our grandchildren's future on an ideological experiment,\" said Senator Robert Hale of Texas, who led the opposition.",
      },
      {
        type: 'paragraph',
        text: 'Several moderate economists have also raised concerns about the speed of the clean energy transition, arguing that grid reliability risks are underestimated in the bill\'s projections. The nonpartisan Congressional Budget Office estimated the bill would add $1.1 trillion to the deficit over 10 years, after accounting for new tax revenues.',
      },
      {
        type: 'heading',
        text: 'What Comes Next',
      },
      {
        type: 'paragraph',
        text: 'House Speaker Linda Cartwright said she expects a floor vote within three weeks. Progressive members of her caucus have signaled support, though a handful of moderate Democrats in swing districts have expressed concern about the bill\'s deficit impact. The White House has launched an aggressive public campaign to build support ahead of the vote.',
      },
      {
        type: 'paragraph',
        text: 'If passed by the House, the president is expected to sign the bill at a ceremony on the South Lawn, with leaders from all four dozen industry groups that backed the legislation invited to attend.',
      },
    ];

    /* Article Byline */
    const ArticleByline = ({ article }) => (
      <div className="flex items-center gap-4 py-4 border-b border-slate-100">
        <img src={article.authorImg} alt={`Portrait of ${article.author}`}
          className="w-12 h-12 rounded-full object-cover border border-slate-100" />
        <div className="flex-1">
          <a href="#" className="font-semibold text-sm text-slate-800 hover:text-red-600 transition-colors">
            {article.author}
          </a>
          <p className="text-xs text-slate-500 mt-0.5">{article.authorBio.split('.')[0]}</p>
        </div>
        <div className="text-right text-xs text-slate-400">
          <p><time dateTime="">{article.publishTime}</time></p>
          <p className="mt-0.5">Updated {article.updatedTime}</p>
        </div>
      </div>
    );

    /* Article actions bar */
    const ArticleActions = ({ article }) => (
      <div className="flex items-center gap-3 py-3 border-b border-slate-100">
        <button className="btn btn-ghost text-xs gap-1.5 px-3 py-1.5" aria-label="Share article">
          <IconShare /> <span>{article.engagementMetrics.shares.toLocaleString()}</span>
        </button>
        <button className="btn btn-ghost text-xs gap-1.5 px-3 py-1.5" aria-label="Bookmark article">
          <IconBookmark /> Save
        </button>
        <div className="ml-auto flex items-center gap-3 text-xs text-slate-400">
          <span>👁 {article.engagementMetrics.views} reads</span>
          <span>·</span>
          <span>{article.readLength}</span>
        </div>
      </div>
    );

    /* Breadcrumb */
    const Breadcrumb = ({ article }) => (
      <nav aria-label="Breadcrumb" className="text-xs text-slate-400 py-3 border-b border-slate-100">
        <ol className="flex items-center gap-2">
          <li><a href={R('index.html')} className="hover:text-red-600 transition-colors">Home</a></li>
          <li aria-hidden="true" className="text-slate-300">›</li>
          <li><a href={R(`${article.category}/${article.category}.html`)} className="hover:text-red-600 transition-colors">{article.categoryLabel}</a></li>
          <li aria-hidden="true" className="text-slate-300">›</li>
          <li className="text-slate-600 truncate max-w-xs" aria-current="page">{article.title}</li>
        </ol>
      </nav>
    );

    /* Article body renderer */
    const ArticleBody = ({ blocks }) => (
      <div className="prose max-w-none" style={{ maxWidth: '680px', margin: '0 auto' }}>
        {blocks.map((block, i) => {
          if (block.type === 'lead') return (
            <p key={i} className="body-lg font-semibold text-slate-800 leading-relaxed mt-6" style={{ fontSize: '1.125rem', fontWeight: 600 }}>
              {block.text}
            </p>
          );
          if (block.type === 'paragraph') return (
            <p key={i} className="body-base text-slate-700 leading-relaxed mt-4" style={{ marginTop: '1.25rem', lineHeight: 1.75 }}>
              {block.text}
            </p>
          );
          if (block.type === 'heading') return (
            <h2 key={i} className="font-serif font-bold text-xl mt-8 mb-3 text-slate-900">{block.text}</h2>
          );
          if (block.type === 'pullquote') return (
            <blockquote key={i} className="my-8 pl-6 border-l-4 border-red-500">
              <p className="font-serif text-xl text-slate-800 leading-snug italic">{block.text}</p>
              <footer className="mt-3 text-sm text-slate-500 font-semibold not-italic">— {block.attribution}</footer>
            </blockquote>
          );
          if (block.type === 'image') return (
            <figure key={i} className="my-8">
              <img src={block.src} alt={block.caption} className="w-full rounded-lg" loading="lazy" />
              <figcaption className="text-xs text-slate-400 mt-2 leading-relaxed">{block.caption}</figcaption>
            </figure>
          );
          return null;
        })}
      </div>
    );

    /* Article Tags */
    const ArticleTags = ({ tags }) => (
      <div className="flex flex-wrap gap-2 mt-8 pt-6 border-t border-slate-100" aria-label="Article tags">
        {tags.map((tag) => (
          <a key={tag} href="#"
            className="px-3 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded-full hover:bg-red-50 hover:text-red-600 transition-colors">
            #{tag}
          </a>
        ))}
      </div>
    );

    /* Author Bio Card */
    const AuthorBio = ({ article }) => (
      <div className="mt-10 p-6 bg-slate-50 rounded-xl border border-slate-100">
        <div className="flex gap-4">
          <img src={article.authorImg} alt={`Portrait of ${article.author}`}
            className="w-16 h-16 rounded-full object-cover border-2 border-white shadow-sm flex-shrink-0" />
          <div>
            <p className="text-xs text-slate-400 font-bold uppercase tracking-wide mb-1">About the Author</p>
            <a href="#" className="font-bold text-slate-800 hover:text-red-600 transition-colors">{article.author}</a>
            <p className="text-sm text-slate-500 mt-1 leading-relaxed">{article.authorBio}</p>
            <a href="#" className="text-xs text-red-600 font-semibold mt-2 inline-block hover:underline">More articles by {article.author.split(' ')[0]} →</a>
          </div>
        </div>
      </div>
    );

    /* Comments CTA */
    const CommentsCTA = ({ count }) => (
      <div className="mt-10 p-6 border border-slate-200 rounded-xl">
        <div className="flex items-center justify-between gap-4">
          <div>
            <h3 className="font-semibold text-slate-800">Join the conversation</h3>
            <p className="text-sm text-slate-500 mt-1">{count.toLocaleString()} comments — sign in to comment or reply.</p>
          </div>
          <a href={R('account/account.html')} className="btn btn-secondary flex-shrink-0">Sign In to Comment</a>
        </div>
      </div>
    );

    /* Related stories widget */
    const RelatedStories = ({ stories }) => (
      <aside className="sidebar-widget" aria-label="Related stories">
        <div className="sidebar-widget-header">Related Stories</div>
        <div className="sidebar-widget-body p-0">
          {stories.map((story) => (
            <StoryCard key={story.id} story={story} layout="minimal" />
          ))}
        </div>
      </aside>
    );

    /* Reading progress bar */
    const ReadingProgress = () => {
      const [progress, setProgress] = React.useState(0);
      React.useEffect(() => {
        const update = () => {
          const el = document.documentElement;
          const scrollTop = el.scrollTop;
          const scrollHeight = el.scrollHeight - el.clientHeight;
          setProgress(scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0);
        };
        window.addEventListener('scroll', update, { passive: true });
        return () => window.removeEventListener('scroll', update);
      }, []);
      return (
        <div
          role="progressbar"
          aria-valuenow={Math.round(progress)}
          aria-valuemin="0"
          aria-valuemax="100"
          aria-label={`Article reading progress: ${Math.round(progress)}%`}
          style={{ position: 'fixed', top: 0, left: 0, width: `${progress}%`, height: '3px', background: '#EF4444', zIndex: 1000, transition: 'width 50ms' }}
        />
      );
    };

    const App = () => {
      const relatedStories = ALL_STORIES.filter(s => s.category === 'politics' || s.category === 'world').slice(0, 5);
      const moreStories = ALL_STORIES.slice(5, 9);

      return (
        <PageLayout currentCategory="politics">
          <ReadingProgress />

          <div className="max-w-screen-2xl mx-auto px-4">
            <Breadcrumb article={ARTICLE} />
          </div>

          {/* Article content area */}
          <section className="max-w-screen-2xl mx-auto px-4 py-6">
            <div className="flex gap-10">
              {/* Main article */}
              <article className="flex-1 min-w-0" aria-label="Article content">

                {/* Badges */}
                <div className="flex items-center gap-2 mb-4">
                  <span className="badge-breaking">BREAKING</span>
                  <span className={`cat-label cat-${ARTICLE.category}`}>{ARTICLE.categoryLabel}</span>
                </div>

                {/* Headline */}
                <h1 className="headline-xl max-w-3xl">{ARTICLE.title}</h1>

                {/* Deck / summary */}
                <p className="body-lg text-slate-500 mt-4 max-w-2xl">{ARTICLE.summary}</p>

                {/* Byline */}
                <div className="max-w-2xl mt-6">
                  <ArticleByline article={ARTICLE} />
                  <ArticleActions article={ARTICLE} />
                </div>

                {/* Hero image */}
                <div className="mt-6 rounded-xl overflow-hidden aspect-video bg-slate-100 max-w-3xl">
                  <img src={ARTICLE.mediaUrl} alt="U.S. Senate chamber during the vote on the Climate and Infrastructure Investment Act"
                    className="w-full h-full object-cover" loading="eager" />
                </div>
                <p className="text-xs text-slate-400 mt-2 max-w-3xl">
                  The Senate chamber fills as the final vote on the Climate and Infrastructure Investment Act is called. (Getty Images / Pool)
                </p>

                {/* Inline ad */}
                <div className="max-w-2xl my-6">
                  <div className="ad-placeholder" style={{ minHeight: '90px' }}>
                    <div className="text-center">
                      <p className="sponsored-label mb-1">Advertisement</p>
                      <p className="text-xs text-slate-400">728×90</p>
                    </div>
                  </div>
                </div>

                {/* Article body */}
                <ArticleBody blocks={ARTICLE_BODY} />

                {/* Tags */}
                <div className="max-w-2xl">
                  <ArticleTags tags={ARTICLE.tags} />
                </div>

                {/* Author bio */}
                <div className="max-w-2xl">
                  <AuthorBio article={ARTICLE} />
                </div>

                {/* Comments */}
                <div className="max-w-2xl">
                  <CommentsCTA count={ARTICLE.engagementMetrics.comments} />
                </div>

                {/* More to read */}
                <div className="mt-12 max-w-3xl">
                  <div className="section-header">
                    <span className="section-header-accent" />
                    <h2 className="section-header-title">More to Read</h2>
                  </div>
                  <StoryGrid stories={moreStories} columns={2} showSummary={true} />
                </div>
              </article>

              {/* Sidebar */}
              <aside className="hidden xl:block w-80 flex-shrink-0" aria-label="Article sidebar">
                <RelatedStories stories={relatedStories} />
                <SidebarModule type="live-blog" />
                <SidebarModule type="newsletter" />
                <SidebarModule type="ad" />
              </aside>
            </div>
          </section>

          <SubscriptionModule variant="inline" />
        </PageLayout>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
