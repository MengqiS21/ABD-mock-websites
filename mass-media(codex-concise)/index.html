<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Ledger | Home</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#b91c1c"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const topStories = [
        {
          title: "Flooded ports delay Atlantic supply corridors as insurers raise risk pricing",
          summary: "Shipping analysts report prolonged disruptions across three major freight hubs.",
          link: "article.html"
        },
        {
          title: "Voters in six nations reject austerity-first coalitions in weekend ballot",
          summary: "A bloc of center-left parties gained momentum with pro-wage campaigns.",
          link: "world.html"
        },
        {
          title: "How newsroom AI tools are changing local accountability reporting",
          summary: "Editors are drafting strict disclosure rules while scaling investigations.",
          link: "opinion.html"
        },
        {
          title: "Central banks signal coordinated caution after sudden commodity rebound",
          summary: "Markets adjusted as policymakers hinted at slower interest-rate cuts.",
          link: "article.html"
        }
      ];

      function HomePage() {
        return (
          <NewsPortal.SiteShell
            active="index.html"
            breaking="Emergency summit scheduled for Monday after overnight cyberattack on regional power operators."
          >
            <section className="grid gap-6 lg:grid-cols-3">
              <article className="news-card rounded-3xl border border-stone-200 bg-white p-6 lg:col-span-2">
                <p className="text-xs font-bold uppercase tracking-[0.2em] text-accent">Lead Story</p>
                <h1 className="font-editorial mt-3 text-4xl font-bold leading-tight text-stone-900 sm:text-5xl">
                  Inside the Quiet Diplomatic Race to Control Next-Decade Climate Financing
                </h1>
                <p className="lede mt-4 max-w-3xl text-lg text-stone-700">
                  Delegations from emerging and developed economies are redrawing lending rules before the next treaty cycle,
                  reshaping how adaptation money reaches vulnerable cities.
                </p>
                <div className="mt-6 flex flex-wrap gap-3">
                  <a href="article.html" className="rounded-full bg-stone-900 px-5 py-2 text-sm font-semibold text-white hover:bg-stone-700">Read Feature</a>
                  <a href="subscribe.html" className="rounded-full border border-stone-300 px-5 py-2 text-sm font-semibold text-stone-700 hover:bg-stone-100">Support This Work</a>
                </div>
              </article>

              <aside className="news-card rounded-3xl border border-stone-200 bg-white p-6">
                <p className="text-xs font-bold uppercase tracking-[0.2em] text-stone-500">Morning Brief</p>
                <ul className="mt-4 space-y-4 text-sm text-stone-700">
                  <li>Asia equities stabilize after two sessions of energy-led selloffs.</li>
                  <li>US labor data shows hiring steady while wage growth cools.</li>
                  <li>Public broadcasters announce joint election misinformation desk.</li>
                  <li>New treaty draft targets deep-sea mining transparency requirements.</li>
                </ul>
              </aside>
            </section>

            <section className="mt-8">
              <div className="mb-4 flex items-center justify-between">
                <h2 className="font-editorial text-3xl font-bold text-stone-900">Top Stories</h2>
                <a href="world.html" className="text-sm font-semibold text-stone-700 hover:text-stone-900">View world desk</a>
              </div>
              <div className="grid gap-4 sm:grid-cols-2">
                {topStories.map((story) => (
                  <article key={story.title} className="news-card rounded-2xl border border-stone-200 bg-white p-5">
                    <h3 className="font-editorial text-2xl font-semibold leading-snug text-stone-900">{story.title}</h3>
                    <p className="mt-2 text-sm text-stone-600">{story.summary}</p>
                    <a href={story.link} className="mt-4 inline-flex text-sm font-semibold text-accent hover:text-red-800">Continue reading</a>
                  </article>
                ))}
              </div>
            </section>
          </NewsPortal.SiteShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
    </script>
  </body>
</html>
