<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Ledger | Opinion</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#b91c1c"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const columns = [
        {
          author: "Lena Ibarra",
          title: "Democracy needs boring infrastructure more than dramatic campaign slogans",
          summary: "Election integrity depends on staffing, procurement discipline, and transparent system audits."
        },
        {
          author: "Theo Marsh",
          title: "The case for public-interest algorithms in local news distribution",
          summary: "Platform incentives can reward verified civic reporting without suppressing open debate."
        },
        {
          author: "Nadia Khan",
          title: "What CEOs still miss about the economics of workplace flexibility",
          summary: "Output data suggests hybrid models outperform rigid return mandates in knowledge sectors."
        }
      ];

      function OpinionPage() {
        return (
          <NewsPortal.SiteShell
            active="opinion.html"
            breaking="Editorial board releases special package on election integrity and civic trust."
          >
            <section className="news-card rounded-3xl border border-stone-200 bg-white p-6 sm:p-8">
              <p className="text-xs font-bold uppercase tracking-[0.2em] text-accent">Opinion</p>
              <h1 className="font-editorial mt-3 text-4xl font-bold leading-tight text-stone-900 sm:text-5xl">Argument, Analysis, and Contrarian Views</h1>
              <p className="mt-4 max-w-2xl text-stone-700">Columns from staff writers and guest contributors focused on policy, technology, business, and civic life.</p>
            </section>

            <section className="mt-7 space-y-4">
              {columns.map((piece) => (
                <article key={piece.title} className="news-card rounded-2xl border border-stone-200 bg-white p-6">
                  <p className="text-xs font-bold uppercase tracking-[0.15em] text-stone-500">By {piece.author}</p>
                  <h2 className="font-editorial mt-2 text-3xl font-semibold leading-snug text-stone-900">{piece.title}</h2>
                  <p className="mt-3 text-stone-600">{piece.summary}</p>
                  <a href="article.html" className="mt-4 inline-flex text-sm font-semibold text-accent hover:text-red-800">Read full column</a>
                </article>
              ))}
            </section>
          </NewsPortal.SiteShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<OpinionPage />);
    </script>
  </body>
</html>
