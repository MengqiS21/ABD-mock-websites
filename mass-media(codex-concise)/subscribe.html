<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Ledger | Subscribe</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#b91c1c"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const plans = [
        { name: "Digital", price: "$6 / month", detail: "Unlimited articles, app access, and daily newsletters." },
        { name: "Editorial+", price: "$11 / month", detail: "Digital plan plus Sunday deep-dive briefings and podcasts." },
        { name: "Newsroom Circle", price: "$19 / month", detail: "All benefits plus quarterly editor Q&A and event invites." }
      ];

      function SubscribePage() {
        return (
          <NewsPortal.SiteShell
            active="subscribe.html"
            breaking="Reader-supported journalism funds investigations, document reviews, and on-ground reporting."
          >
            <section className="news-card rounded-3xl border border-stone-200 bg-white p-6 sm:p-8">
              <h1 className="font-editorial text-4xl font-bold text-stone-900 sm:text-5xl">Subscribe to The Daily Ledger</h1>
              <p className="mt-4 max-w-3xl text-stone-700">
                Join a reader community that keeps independent journalism sustainable. Cancel anytime.
              </p>
            </section>

            <section className="mt-7 grid gap-4 md:grid-cols-3">
              {plans.map((plan) => (
                <article key={plan.name} className="news-card rounded-2xl border border-stone-200 bg-white p-6">
                  <h2 className="font-editorial text-3xl font-semibold text-stone-900">{plan.name}</h2>
                  <p className="mt-2 text-2xl font-bold text-accent">{plan.price}</p>
                  <p className="mt-3 text-sm text-stone-600">{plan.detail}</p>
                  <button className="mt-5 rounded-full bg-stone-900 px-4 py-2 text-sm font-semibold text-white hover:bg-stone-700">Choose Plan</button>
                </article>
              ))}
            </section>

            <section className="mt-7 news-card rounded-2xl border border-stone-200 bg-white p-6">
              <h2 className="font-editorial text-3xl font-semibold text-stone-900">Already a subscriber?</h2>
              <p className="mt-2 text-stone-700">Use your account to unlock premium stories across World, Opinion, and Investigations.</p>
              <a href="article.html" className="mt-4 inline-flex text-sm font-semibold text-accent hover:text-red-800">Read premium sample</a>
            </section>
          </NewsPortal.SiteShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<SubscribePage />);
    </script>
  </body>
</html>
