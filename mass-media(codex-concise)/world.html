<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Ledger | World</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#b91c1c"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const worldDesk = [
        {
          region: "Europe",
          title: "Coalition talks reopen in Brussels as migration bill stalls",
          summary: "Negotiators are prioritizing asylum processing reforms and budget-sharing targets."
        },
        {
          region: "Africa",
          title: "Water corridor project secures blended funding from three development banks",
          summary: "Engineers estimate 40 million residents could gain new drought resilience coverage."
        },
        {
          region: "Americas",
          title: "Cross-border rail pact advances with freight and passenger expansion clauses",
          summary: "Transport ministries approved phased timelines through 2031 and shared oversight."
        },
        {
          region: "Asia-Pacific",
          title: "Island states push rapid loss-and-damage mechanisms at climate assembly",
          summary: "Delegates are seeking automatic triggers for emergency financing during extreme events."
        },
        {
          region: "Middle East",
          title: "Energy exporters test settlement tools in non-dollar contracts",
          summary: "Pilot transactions hint at broader experimentation with currency diversification."
        },
        {
          region: "Global",
          title: "WHO warns vaccine logistics gaps could widen after freight disruptions",
          summary: "The agency called for urgent cold-chain coordination across regional hubs."
        }
      ];

      function WorldPage() {
        return (
          <NewsPortal.SiteShell
            active="world.html"
            breaking="Peace delegates confirm late-night progress in ceasefire monitoring framework discussions."
          >
            <section className="news-card rounded-3xl border border-stone-200 bg-white p-6 sm:p-8">
              <p className="text-xs font-bold uppercase tracking-[0.2em] text-accent">World Desk</p>
              <h1 className="font-editorial mt-3 text-4xl font-bold leading-tight text-stone-900 sm:text-5xl">Global Politics, Economics, and Diplomacy</h1>
              <p className="mt-4 max-w-3xl text-stone-700">
                Dispatches and analysis from correspondents tracking elections, conflict zones, trade routes, and climate governance.
              </p>
            </section>

            <section className="mt-7 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
              {worldDesk.map((story) => (
                <article key={story.title} className="news-card rounded-2xl border border-stone-200 bg-white p-5">
                  <p className="text-xs font-bold uppercase tracking-[0.15em] text-stone-500">{story.region}</p>
                  <h2 className="font-editorial mt-2 text-2xl font-semibold leading-snug text-stone-900">{story.title}</h2>
                  <p className="mt-3 text-sm text-stone-600">{story.summary}</p>
                  <a href="article.html" className="mt-4 inline-flex text-sm font-semibold text-accent hover:text-red-800">Open report</a>
                </article>
              ))}
            </section>
          </NewsPortal.SiteShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<WorldPage />);
    </script>
  </body>
</html>
