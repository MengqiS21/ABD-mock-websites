<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Ledger | Article</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#b91c1c"
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="shared.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function ArticlePage() {
        return (
          <NewsPortal.SiteShell
            active="article.html"
            breaking="Leaked policy draft reveals emergency reserve plans for critical semiconductor supply chains."
          >
            <article className="news-card rounded-3xl border border-stone-200 bg-white p-6 sm:p-10">
              <p className="text-xs font-bold uppercase tracking-[0.2em] text-accent">Investigation</p>
              <h1 className="font-editorial mt-3 text-4xl font-bold leading-tight text-stone-900 sm:text-5xl">
                How Coastal Cities Are Rewriting Budget Rules to Survive Climate Migration
              </h1>
              <p className="mt-4 text-sm font-semibold uppercase tracking-[0.12em] text-stone-500">By Mira Patel | 14 minute read</p>

              <div className="font-editorial mt-8 space-y-6 text-xl leading-relaxed text-stone-800">
                <p>
                  City councils once treated sea walls and emergency shelters as exceptional spending. That assumption is collapsing.
                  In ten major coastal municipalities, adaptation costs are now part of base annual budgets, competing directly with transit,
                  housing, and education allocations.
                </p>
                <p>
                  Interviews with finance directors reveal a common strategy: move climate spending from one-time grants into dedicated,
                  multi-year resilience portfolios. The shift offers predictability for contractors and residents, but it also forces painful
                  tradeoffs over tax policy and municipal debt ceilings.
                </p>
                <p>
                  The next challenge is governance. Without standardized accounting rules, taxpayers struggle to compare how effectively
                  different cities use adaptation funds. Several treasurers told The Daily Ledger they support mandatory disclosure templates
                  to restore public trust and reduce political volatility around emergency appropriations.
                </p>
              </div>
            </article>

            <section className="mt-8 grid gap-4 md:grid-cols-3">
              <a href="world.html" className="news-card rounded-2xl border border-stone-200 bg-white p-5 hover:bg-stone-50">
                <p className="text-xs font-bold uppercase tracking-[0.15em] text-stone-500">Next</p>
                <h2 className="font-editorial mt-2 text-2xl font-semibold text-stone-900">Explore World Coverage</h2>
              </a>
              <a href="opinion.html" className="news-card rounded-2xl border border-stone-200 bg-white p-5 hover:bg-stone-50">
                <p className="text-xs font-bold uppercase tracking-[0.15em] text-stone-500">Analysis</p>
                <h2 className="font-editorial mt-2 text-2xl font-semibold text-stone-900">Read Editorial Perspectives</h2>
              </a>
              <a href="subscribe.html" className="news-card rounded-2xl border border-stone-200 bg-stone-900 p-5 text-white hover:bg-stone-700">
                <p className="text-xs font-bold uppercase tracking-[0.15em] text-stone-300">Support</p>
                <h2 className="font-editorial mt-2 text-2xl font-semibold">Become a Member</h2>
              </a>
            </section>
          </NewsPortal.SiteShell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<ArticlePage />);
    </script>
  </body>
</html>
