  { icon: '🌍', label: 'Language' },

                <span>{label}</span>

        </div>

            <a href="courses.html" className="btn btn-secondary">View all courses →</a>

                <div className="path-desc">{p.desc}</div>

        </div>

        </div>
      </section>

    </Meridian.Shell>

}

ReactDOM.createRoot(document.getElementById('root')).render(<HomePage />);
