<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian – Study Tool</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <style>
    .flashcard-inner { position: relative; width: 100%; min-height: 220px; transition: transform 0.5s; transform-style: preserve-3d; }
    .flashcard-inner.flipped { transform: rotateY(180deg); }
    .flashcard-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem; text-align: center; }
    .flashcard-front { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: #fff; }
    .flashcard-back { background: #fff; border: 2px solid #4f46e5; color: #0f172a; transform: rotateY(180deg); }
    .quiz-option { width: 100%; text-align: left; padding: 0.85rem 1.1rem; border-radius: 8px; border: 1.5px solid var(--rule); background: #fff; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.6rem; }
    .quiz-option:hover:not(:disabled) { border-color: var(--indigo); background: var(--indigo-lt); }
    .quiz-option.correct { border-color: var(--emerald); background: var(--emerald-lt); color: var(--emerald); font-weight: 600; }
    .quiz-option.wrong { border-color: var(--rose); background: #fff1f2; color: var(--rose); font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Flashcard Decks ─────────────────────────────────────────────────────────
const DECKS = {
  'Python Fundamentals': [
    { q: 'What does the `len()` function return?', a: 'The number of items in an object (list, string, tuple, etc.).' },
    { q: 'What is a Python list comprehension?', a: 'A concise syntax to create lists: `[expr for item in iterable if condition]`' },
    { q: 'What is the difference between `==` and `is`?', a: '`==` checks value equality; `is` checks object identity (same memory reference).' },
    { q: 'What does `*args` mean in a function definition?', a: 'It allows the function to accept any number of positional arguments as a tuple.' },
    { q: 'What is a Python dictionary?', a: 'An unordered collection of key-value pairs. Keys must be unique and immutable.' },
    { q: 'What does `None` represent in Python?', a: 'The absence of a value or a null value. It is the only instance of NoneType.' },
  ],
  'ML Concepts': [
    { q: 'What is overfitting?', a: 'When a model learns the training data too well, including noise, and performs poorly on unseen data.' },
    { q: 'What is the bias-variance tradeoff?', a: 'The tension between underfitting (high bias) and overfitting (high variance); minimizing total error requires balancing both.' },
    { q: 'What does a confusion matrix show?', a: 'A table showing TP, FP, TN, FN — used to evaluate classifier performance.' },
    { q: 'What is gradient descent?', a: 'An optimization algorithm that iteratively adjusts model parameters in the direction that minimizes the loss function.' },
    { q: 'What is regularization?', a: 'A technique to prevent overfitting by adding a penalty term to the loss function (L1/Lasso, L2/Ridge).' },
  ],
  'Pandas Quick Reference': [
    { q: 'How do you read a CSV file in Pandas?', a: '`pd.read_csv("filename.csv")` returns a DataFrame.' },
    { q: 'How do you select a single column from a DataFrame?', a: '`df["column_name"]` or `df.column_name` — returns a Series.' },
    { q: 'What does `df.dropna()` do?', a: 'Removes rows (by default) containing any NaN values.' },
    { q: 'How do you group data in Pandas?', a: '`df.groupby("column").agg(func)` — splits data, applies function, combines results.' },
    { q: 'What is `df.merge()`?', a: 'Combines two DataFrames on a key column, similar to SQL JOIN.' },
  ],
};

// ── Quiz questions ───────────────────────────────────────────────────────────
const QUIZ_QUESTIONS = [
  { q: 'Which Python data structure maintains insertion order and allows duplicates?', options: ['Set', 'Dictionary', 'List', 'Tuple'], correct: 2 },
  { q: 'What is the output of `type(3.14)` in Python?', options: ['int', 'float', 'double', 'number'], correct: 1 },
  { q: 'In machine learning, what does "training data" refer to?', options: ['Data used to test final performance', 'Data the model learns patterns from', 'Data generated by the model', 'Data for hyperparameter tuning'], correct: 1 },
  { q: 'Which Pandas method shows basic statistics (mean, std, count)?', options: ['df.info()', 'df.head()', 'df.describe()', 'df.shape()'], correct: 2 },
  { q: 'What does `import numpy as np` do?', options: ['Creates a new module', 'Imports NumPy under the alias np', 'Installs NumPy', 'Removes existing NumPy'], correct: 1 },
];

// ── Flashcard mode ───────────────────────────────────────────────────────────
function FlashcardMode({ deck, cards }) {
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [known, setKnown] = React.useState(new Set());
  const [reviewing, setReviewing] = React.useState(false);

  const card = cards[idx];
  const progress = Math.round((known.size / cards.length) * 100);

  function next() { setFlipped(false); setTimeout(() => setIdx((idx + 1) % cards.length), 50); }
  function prev() { setFlipped(false); setTimeout(() => setIdx((idx - 1 + cards.length) % cards.length), 50); }
  function markKnown() { setKnown(prev => { const s = new Set(prev); s.add(idx); return s; }); next(); }
  function markUnknown() { setKnown(prev => { const s = new Set(prev); s.delete(idx); return s; }); next(); }

  return (
    <div style={{ maxWidth: '640px', margin: '0 auto' }}>
      {/* Progress */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
        <span style={{ fontSize: '0.82rem', color: 'var(--muted)' }}>Card {idx + 1} of {cards.length}</span>
        <span style={{ fontSize: '0.82rem', fontWeight: 600, color: 'var(--emerald)' }}>✓ {known.size} known</span>
      </div>
      <div className="progress-track" style={{ marginBottom: '1.5rem' }}>
        <div className="progress-fill emerald" style={{ width: `${progress}%` }} />
      </div>

      {/* Card */}
      <div className="flashcard" onClick={() => setFlipped(!flipped)} style={{ marginBottom: '1.5rem', cursor: 'pointer', userSelect: 'none' }}>
        <div className={`flashcard-inner${flipped ? ' flipped' : ''}`} style={{ minHeight: '220px' }}>
          <div className="flashcard-face flashcard-front">
            <div style={{ fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', opacity: 0.6, marginBottom: '1rem' }}>Question</div>
            <p style={{ fontSize: '1.1rem', fontWeight: 600, lineHeight: 1.5 }}>{card.q}</p>
            <div style={{ marginTop: '1.25rem', fontSize: '0.75rem', opacity: 0.55 }}>Tap to reveal answer ↑</div>
          </div>
          <div className="flashcard-face flashcard-back">
            <div style={{ fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--indigo)', marginBottom: '1rem' }}>Answer</div>
            <p style={{ fontSize: '1rem', lineHeight: 1.65, color: 'var(--ink-2)', fontFamily: "'Lora', serif", fontStyle: 'italic' }}>{card.a}</p>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center', flexWrap: 'wrap' }}>
        <button onClick={prev} className="btn btn-secondary">← Prev</button>
        <button onClick={markUnknown} className="btn" style={{ background: '#fff1f2', color: 'var(--rose)', border: '1.5px solid #fecdd3', fontWeight: 600 }}>✗ Still Learning</button>
        <button onClick={markKnown} className="btn btn-emerald">✓ Got It</button>
        <button onClick={next} className="btn btn-secondary">Next →</button>
      </div>

      {/* Hint */}
      <p style={{ textAlign: 'center', fontSize: '0.75rem', color: 'var(--subtle)', marginTop: '1rem' }}>
        Click the card to flip · Use ✓ / ✗ to track progress
      </p>
    </div>
  );
}

// ── Quiz mode ────────────────────────────────────────────────────────────────
function QuizMode() {
  const [qIdx, setQIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);

  const q = QUIZ_QUESTIONS[qIdx];

  function pick(i) {
    if (selected !== null) return;
    setSelected(i);
    if (i === q.correct) setScore(s => s + 1);
  }

  function next() {
    if (qIdx < QUIZ_QUESTIONS.length - 1) {
      setQIdx(qIdx + 1);
      setSelected(null);
    } else {
      setDone(true);
    }
  }

  if (done) return (
    <div style={{ maxWidth: '480px', margin: '0 auto', textAlign: 'center' }}>
      <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>{score >= 4 ? '🏆' : score >= 2 ? '👍' : '📖'}</div>
      <h3 style={{ fontSize: '1.5rem', fontWeight: 800, marginBottom: '0.5rem' }}>Quiz Complete!</h3>
      <p style={{ fontSize: '1.1rem', color: 'var(--muted)', marginBottom: '1.5rem' }}>
        You scored <strong style={{ color: 'var(--indigo)' }}>{score}</strong> out of {QUIZ_QUESTIONS.length}
      </p>
      <div className="progress-track" style={{ marginBottom: '1.5rem' }}>
        <div className="progress-fill" style={{ width: `${(score / QUIZ_QUESTIONS.length) * 100}%` }} />
      </div>
      <p style={{ fontSize: '0.88rem', color: 'var(--muted)', marginBottom: '2rem' }}>
        {score === QUIZ_QUESTIONS.length ? 'Perfect score! Ready to move on.' : score >= 3 ? 'Good work — review the ones you missed.' : 'Keep studying with flashcards then try again.'}
      </p>
      <button onClick={() => { setQIdx(0); setSelected(null); setScore(0); setDone(false); }}
        className="btn btn-primary btn-lg">Retry Quiz</button>
    </div>
  );

  return (
    <div style={{ maxWidth: '560px', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem', fontSize: '0.82rem', color: 'var(--muted)' }}>
        <span>Question {qIdx + 1} of {QUIZ_QUESTIONS.length}</span>
        <span>Score: <strong style={{ color: 'var(--emerald)' }}>{score}</strong></span>
      </div>
      <div className="progress-track" style={{ marginBottom: '1.75rem' }}>
        <div className="progress-fill" style={{ width: `${((qIdx + (selected !== null ? 1 : 0)) / QUIZ_QUESTIONS.length) * 100}%` }} />
      </div>
      <div style={{ background: 'var(--white)', border: '1px solid var(--rule)', borderRadius: 'var(--r-lg)', padding: '1.75rem', marginBottom: '1.25rem' }}>
        <p style={{ fontSize: '1.05rem', fontWeight: 600, lineHeight: 1.5, color: 'var(--ink)' }}>{q.q}</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '0.6rem', marginBottom: '1.5rem' }}>
        {q.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (selected !== null) {
            if (i === q.correct) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          }
          return (
            <button key={i} className={cls} onClick={() => pick(i)} disabled={selected !== null}>
              <span style={{ width: '1.4rem', height: '1.4rem', borderRadius: '50%', border: '1.5px solid currentColor', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.72rem', fontWeight: 700, flexShrink: 0 }}>
                {String.fromCharCode(65 + i)}
              </span>
              {opt}
              {selected !== null && i === q.correct && <span style={{ marginLeft: 'auto' }}>✓</span>}
              {selected === i && i !== q.correct && <span style={{ marginLeft: 'auto' }}>✗</span>}
            </button>
          );
        })}
      </div>
      {selected !== null && (
        <div style={{ textAlign: 'right' }}>
          <button onClick={next} className="btn btn-primary btn-lg">
            {qIdx < QUIZ_QUESTIONS.length - 1 ? 'Next Question →' : 'See Results'}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Main page ─────────────────────────────────────────────────────────────────
function StudyPage() {
  const [mode, setMode] = React.useState('flashcards');
  const [deck, setDeck] = React.useState('Python Fundamentals');
  const deckNames = Object.keys(DECKS);

  return (
    <Meridian.DashShell active="dashboard.html" sideActive="study">
      <div style={{ maxWidth: '860px', margin: '0 auto' }}>
        {/* Header */}
        <div style={{ marginBottom: '2rem' }}>
          <h1 style={{ fontSize: '1.7rem', fontWeight: 800, marginBottom: '0.35rem' }}>Study Tool</h1>
          <p style={{ color: 'var(--muted)', fontSize: '0.9rem' }}>Reinforce what you've learned with flashcards and quizzes.</p>
        </div>

        {/* Mode tabs */}
        <div style={{ display: 'flex', gap: '0', borderBottom: '1px solid var(--rule)', marginBottom: '2rem' }}>
          {[['flashcards', '🃏 Flashcards'], ['quiz', '📝 Quick Quiz'], ['notes', '📓 My Notes']].map(([key, label]) => (
            <button key={key} onClick={() => setMode(key)}
              style={{ padding: '0.7rem 1.25rem', border: 'none', background: 'none', cursor: 'pointer', fontSize: '0.88rem', fontWeight: mode === key ? 700 : 500, color: mode === key ? 'var(--indigo)' : 'var(--muted)', borderBottom: `2px solid ${mode === key ? 'var(--indigo)' : 'transparent'}`, transition: 'all 0.15s' }}>
              {label}
            </button>
          ))}
        </div>

        {mode === 'flashcards' && (
          <div>
            {/* Deck selector */}
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '2rem', alignItems: 'center' }}>
              <span style={{ fontSize: '0.8rem', fontWeight: 600, color: 'var(--muted)' }}>Deck:</span>
              {deckNames.map(d => (
                <button key={d} onClick={() => setDeck(d)}
                  className={`chip${deck === d ? ' active' : ''}`}>{d}</button>
              ))}
            </div>
            <FlashcardMode deck={deck} cards={DECKS[deck]} />
          </div>
        )}

        {mode === 'quiz' && (
          <div>
            <div style={{ background: 'var(--indigo-lt)', border: '1px solid rgba(79,70,229,0.15)', borderRadius: 'var(--r-md)', padding: '1rem 1.25rem', marginBottom: '2rem', display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
              <span>ℹ️</span>
              <span style={{ fontSize: '0.85rem', color: 'var(--indigo)' }}>
                5 questions · Python & Data Science · Select the best answer
              </span>
            </div>
            <QuizMode />
          </div>
        )}

        {mode === 'notes' && (
          <div style={{ maxWidth: '640px', margin: '0 auto' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h3 style={{ fontWeight: 700 }}>My Notes</h3>
              <button className="btn btn-primary btn-sm">+ New Note</button>
            </div>
            {[
              { title: 'Gradient Descent intuition', course: 'ML A–Z', date: 'Feb 28', preview: 'The key insight is that we move "downhill" in the loss landscape by computing the gradient with respect to each parameter...' },
              { title: 'Pandas cheatsheet', course: 'Python Bootcamp', date: 'Feb 25', preview: 'df.groupby() is like SQL GROUP BY. Always use agg() to specify what aggregation to apply...' },
              { title: 'Overfitting checklist', course: 'ML A–Z', date: 'Feb 20', preview: 'Signs of overfitting: training accuracy >> val accuracy, loss curves diverge, predictions are overconfident...' },
            ].map(n => (
              <div key={n.title} style={{ background: 'var(--white)', border: '1px solid var(--rule)', borderRadius: 'var(--r-md)', padding: '1.1rem 1.25rem', marginBottom: '0.75rem', cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--indigo)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--rule)'}
              >
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.35rem' }}>
                  <span style={{ fontWeight: 600, fontSize: '0.9rem' }}>{n.title}</span>
                  <span style={{ fontSize: '0.72rem', color: 'var(--muted)' }}>{n.date}</span>
                </div>
                <span className="badge badge-indigo" style={{ marginBottom: '0.4rem' }}>{n.course}</span>
                <p style={{ fontSize: '0.82rem', color: 'var(--muted)', lineHeight: 1.55 }}>{n.preview}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    </Meridian.DashShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StudyPage />);
</script>
</body>
</html>
